body:
  text: 林登州集卷一明林弼撰四言詩北山堂詩有序汪君世良居開化之北山常構堂以奉二親既入為天官不得承顔朝夕因命畫者作北山堂圗并記其别時之景蓋思之切故以是而寓其情庶幾一目之頃少抒惓惓云爾序而詩之者既詳且切豫讀之有感於中因推詩人之緒而為之言瞻彼北山其下有堂堂有甘㫖吾親是將胡為乎來于鍾之阜鍾有北山匪我之舊我思北山思之永歎庭有長椿堂有藂萱椿之茂矣萱之秀矣悠悠我思曷云覯止有圗有詩莫慰我思北山之歸我心則夷自古在昔以忠為孝朂爾世良是則是效元帥觀公平寇詩元受天命率土悉臣三陲晏帖孰謂凶人閩徼之絶橫生矛槖大肆羣疑將吮民血蝟鋒螳斧推威過隅蟻聚烏合至於我郛錦股紅首跳踉呶吼謂此孤墉可以計誘桓桓觀公實維分藩奮臂一呼貌虎髯掀公曰勿暴以駭我師猛兕在柙半就梟夷逆酋匪茹悉衆來赴修我戈矛我備以豫盜未至郊士已越關載戰載捷如飛如翰爭先逐北狼㚄駑踣戎府大開以受訊馘盜之方熾我民無所盜之既平我民安堵如枯而蘇如涸而濡孰生我人公仁之敷公曰噫嘻匪豫之勳皇仁逺屆帝德好生民食而祝我公之粟民居而思我公之屋願公壽康登庸廣堂匪澤一郡式福多方狂斐小子幸際燕喜爰述誦言遂歌泮水五言古題陽山蒼檜圗瞻彼陽山岡蔚有蒼檜樹密葉含清暉繁枝泫零露秋蘭隔芳洲春草迷長路游子兮歸來山空嵗云暮次韻顧孟仁遊雲洞之作端居感流序躍馬城東道卉木競華滋山水政清好於焉息塵營聊復事冥討細泉響巖竇幽禽囀林堡憑髙一長嘯坐覺天地小登臨二三友况復富詞藻側塞林中花丰茸原上草物情方向榮樂事當及早古來賢達士閲世猶昏曉豈無大藥資弱流隔蓬島所以日飲酒愁腸頓如掃憶昔雪齊翁故山早投老風磴遊目多雲龕容膝少人歸山寂寂空宇塵渺渺念此重躑躅凄然亂懷抱人生若山水繁沃倐枯槁深谷尚為陵大陸乃成沼塵跡當焉如而不終雜擾浩歌振林壑大白浮皓皓毋令磊磈胸徒自嬰苦惱滄波復東注白日忽西倒帝鄉邈難期征帆送飛鳥安得凌風翰肅肅升蒼昊贈張子明奉使歸維揚幕府張佳士乃是張公孫華裾照秋水彩筆輝朝暾不作山澤癯弓劒思髙騫東風紫騮馬白日薇花垣草檄氊雪合擊楫江水渾既殪豺與虎復潛蛟與黿魯連貨無取介子功不言長揖謝上官振袂歸故園揚子夜月櫂竹西春雨尊於焉得真樂暫爾忘塵喧南山霧隱豹北海風搏鵾時哉奮髙舉萬里賔帝閽野翁吟野翁本儒士頗有山水緣葛巾石壁挂藜杖春雲穿文章不自衒質實全其天深嗟流俗人二氏習已堅親死不土葬焚尸骨已捐野翁泣為言五避禮所先焚棄固足罪拘忌亦可憐流俗聞此語涕泗皆澘漣純孝能錫類人心本同然彼哉濁世人心跡與書懸髙價售名譽捷徑媒寵權諄諄教孝義野翁真世賢喜王子充赴召翰林聖皇啓明運日月麗中天幽微靡不燭草野無遺賢夫君樂嘉遁邈在金華川一室坐虛白十載窮太𤣥翳翳舍西桑涓涓屋頭泉君子思括囊志士催著鞭鶴書白日下束帛何戔戔光華喜云近獻納知所先江右暫借潤漳南重安邊三月已報政千里如解懸當寧深眷注求舊資周旋金閨昔通籍石室今紬編絲綸王言布黼黻人文宣真儒幸徵庸疲民思惠鮮而我惜逺别中心抱悁悁士生貴大施外職徒縈牽及兹飾鴻業百世當無前玉堂有餘暇早寄新詩篇題周伯虎採蘭詩光風泛崇蘭流芬散中林草木被餘薰山水發清音蕭艾一何繁霜露日已深伊誰愛芳質於焉間冲襟獨有君子人皎皎同貞心采之未盈掬價重雙南金逝將紉華佩逺鄙瓊與琛重將鼓遺操邈繼南風琴淳風未云喪振古猶斯今虞姬怨君王萬人敵賤妾萬人憐昔有絲蘿托願言金石堅云胡竟失勢恩情不終全騅馬驕不逝楚歌聲四喧君心為妾苦妾身為君捐嗟君氣如虹創業未八埏恨妾命如葉事主無百年逰魂遂驚塵怨血濺流泉妾死亦已矣君行當勉旃江東地雖小星火亦可燃願身化孤燕隨渡烏江船旅感三章洪武丁巳春同吳太史伯宗再奉使安南得疾道中有作十月歸次劒江疾稍愈稿呈劉伯序今晨秋節至涼風動庭柯美人白團扇臨風發清歌歌聲出雲表哀響亦何多落花不上枝逝水無回波妾顔亦易改君恩當奈何其二驅車秣吾馬萬里涉逺道逺道多險艱行李何草草晨征夕未息川陸漫浩浩行役豺虎區此身不自保明當脫塵羈優游以終老其三長風吹明月流光入髙樓起坐彈鳴琴清聲滿樓頭一曲操將歸四座增離憂吾身匪金石衰謝宜歸休為郎已白首馮唐更何求送周伯章之宜陽令有序曩余令豐城知伯章周君之賢欲薦之而伯章以親老辭今年春以太守王侯舉來京師上御華蓋殿親賜問焉已而授宜陽令嗟乎士患無所立不患有司之不明聖世之或遺也伯章抒其素蘊見於設施譬猶刃發於硎矢出於服隨刃而解應弦而中吾知其無所滯也故於其行賦此以贈峩峩嵩髙山泱泱洛川水山有柏與松水有魴與鯉之人藴竒抱一出宰百里騎馬嵩洛間仰髙玩清泚宜陽古赤縣瘡痍猶未起子行職承宣况乃明政理努力答聖朝卓魯豈専美安慶府連山亘城西長江走城東岡阜紛起伏波濤爭怒雄泛覽古舒國永懷青陽公余闕字廷心元忠臣一旅餘敝卒千載當兵衝狂瀾日以潰砥柱嗟獨崇弱矢繼蒿剡急檄通蠟筒謀身貴食肉殉國思匪躬慷慨望西拜烈日明丹衷封墓昭聖德建祠勵臣忠百年等一死千古留清風疇能識公心願起文山翁白沙山放舟匡廬陰遙望揚瀾曲湖寬衆水鍾江窄雙峽束剛風吹白沙草木失青緑初疑雲滿山又似雪連谷深壑尚為陵滄波或成陸矧兹沙力微日與風相逐我聞大磧西風沙常起伏深者壕塹鑿髙者岡阜築此事奚足疑泚筆書所矚歐陽文忠公修文忠俊邁才身值熙盛世侃侃樹忠節堂堂決大義文章擅家法浮靡振時弊四賢稱慶厯重輕實公繫補衮成天功荷槖禆國是平章五代史炳若春秋義天方昌斯文公獲申厥志臺閣詎為寵郡縣豈云棄所思在稷契君臣堯舜似六一漫自名醉翁聊自記汝南終老心西江敦本意風流與文采至今光後裔我來鄭公鄉懷賢增仰企崇祀屬多故揭䖍慨無地低頭拜東山千仞鬱蒼翠文信國公天祥信國英特才身值叔季時士類既推首相業良在兹鞠躬盡勞瘁天必濟艱危是時北風競腹膂離四肢青蓋已洛陽黃豓猶海湄大厦梁棟傾孰云一木支江閩戰屢衄星火勤王師妻子豈暇顧國家苦憂思一死不得遂兩縛焉足辭皇天暗白日大地崩四維益州運告終回溪翅空埀義節臣所仗成功天實為文山髙峩巍文水清漣漪忠魂識故路古屋遺荒基哀哉吟嘯集千載有餘悲和熙陽太史廬陵道中作我本山林人偶作江海客及兹指南征頗苦炎暑劇溽雨暗江浦潦水日已積飛流出髙樹栖苴在絶壁舟小畏湍駛石亂驚峽窄仰觀氷雪屋俯瞰黿鼉宅涉險豁壯心弔古悲陳跡江干彼何神縹眇留廟脊嵗時走巫祝牲酒紛狼籍我行不暇禱風至即挂席但令飲量寬何恤吟骨瘠蒼莽江雲秋霏微山日夕候吏致殷勤慰我逺行役吾生當有營匡時可無策天王今聖明萬里如咫尺外服廣懷柔內治深綜核幸復際雍熙焉能守迂僻山豹隱霧文溟鵾振風翮納納乾坤大皎皎日月白願成越裳書庶以禆丘索端溪端溪西南流兩峽為之門萬石矗天起有若渴驥奔上無尺寸土草木春不繁焉知外犖確中有竒氣存嵌竇互聨絡水泉散清溫𤣥液入山骨靈質開雲根磨刀割紫玉玉膩刀無痕文房一得之重價千金論我來正長夏山雨溪水渾採尋竟無所惆悵日已昏居人為我言毋俾役者煩取石恆在冬水縮地氣暄百夫入深窈一二或可捫鸜眼自生潤未數瑶與琨吾生食破硯此物為田園歸途倘或致終感磨礲恩廣西舟中連山峽長江千里不一斷南通交廣域西接雍桂管竹樹深蔽蔚湍瀨多激悍林居雜衆猺水處絶羣蛋喜人怒為獸撫循貴寬簡皇天祚明運穢濁均滌浣曽未煩戈兵先已入圗版畬耕與野蠶民喜無躡短我行持使節道路絶阻蹇頗聞北來士遊宦愁僻逺十人九物故嵐瘴嗟滿眼蝮蛇長於人蜮蟲毒於蝘蝑蚿㸃醯醬紅宿不敢飯苦言何戚戚中心因悺悺天地共一域風氣各有限朔南殊俗習川陸異物産江險不可堙山髙不可挽土風固云惡善調亦已罕飲食當慎節起居在和衎心清體則夷氣正神自散修短有命存達人常坦坦山果紅堪羞江魚白堪饌閒來惟酒杯醉後即茗碗臨風歌此詩聞者當一莞嘉魚亭次韻危亭敞華構飛闌俯層城羣峰多古色雙溪有餘清憑髙恣遐眺竹樹如將迎蒼梧一何逺縹眇孤雲橫願言往從之塵土在襟纓嘉魚躍潛鱗幽鳥鳴新聲兹土雖信美我行亦有程詩招何水曹酒乞阮步兵朗吟叫仙翁拂劍同南征回首望逺島萬里弱流平峒中婦使有自南還者艤舟龍州江干見二婦焉一婦喜色見顔面一婦哭甚悲詢之則皆以被掠入峒一得贖歸其一未贖者也使憐其陷於獠也以白金三兩贖之將以給歸其親婦竊念家久無問不知親存亡否且於獠夫未忍忘情夜遂遁去使不復問噫使亦義人哉作峒中婦為述其事種樹莫種柳花飛不近枝生子莫生女骨肉終棄遺嗟嗟峒中婦失身隨獠夷父母與兄弟八年不相知東家有鄰女今朝得贖歸一歸一未返慟哭淚滿衣官船誰家郎問之為㱆欷婦泣且再拜蠻音致哀辭郎呼獠來前我贖免孤悲白金入獠懷健婦留江湄中宵竊心計故家或衰微親在猶足賴親歿將何依獠夫固匪良枕席久無違捩然夜奔去忍爾背恩私捐金實郎心重報寧汝期人情易反覆婦性輕别離古來丈夫士尚甘志節虧君看蘇李泣遺恨河梁詩播村隘溪洞有餘險播村扼南夷徑小石齒交樹古藤腳埀亂竹無人伐槁折何離披林杪天一竅雲密不得窺舉步即脅息間關風磴危日夕未出隘我僕皆告疲嗟爾戍守人創殘百戰遺餘生亦何幸際此明盛時厥里隘疏雨度密樹秋暑未能清入林足雲氣隔竹多水聲十步一涉澗苔石紛縱橫僕夫失腳屢況乃流潦盈陰木總自斃怪禽時一鳴逺客在畏道落日豺虎驚前村喜近驛曖曖烟火明解鞍不暇食佇立嗟吾生獠處隘山行已厭倦况復多扼塞日南僻逺地實藉此為國暑雨溪谷盈深樹崖崦窄斷虹收晚照百里帶暝色獠人瞻使軺方舟齊衆力為言前朝初此地交兵革至今空山中鬼哭陰雨夕所願職貢修吾儂甘服役龍州溪亭小集有作旅懷感留滯朋情增鬱陶及兹晤語際少慰道路勞危亭入窈窕秋色何蕭騷野菊披山徑幽蘭滿江臯俯視霜露繁仰觀天宇髙清歌發華席凝眸送輕舠山川悲九辨塵土嘆二毛何以不飲酒徒用心忉忉流光亦易失行樂隨所遭君看龍江水東流日滔滔又得含字季秋氣始肅風日猶清酣林亭愜幽賞復此停征驂涼柯商素發夕景嵐翠含興適恣沈飲喧逺諧極談安得凌風翼遐舉南天南贈張坦扶祖櫬歸閩靡靡嵗年邁肅肅鴻鴈飛霜露凄以下遊子悵懷歸江水東南流浮雲西北馳念子方在疚星辰中路違屏營把征袂涕泗紛交頤子行勿夷猶努力及壯時表表樹先德榮名以為期重登飛來寺得來字招提翳蒼峽棟宇何雄哉飛樓壓雲起危亭俯江開樹古閲變化徑側緣崔嵬晴峰儼如人為我度水來清心入幽迥曠視遺紛埃飄蕭風外竹的皪霜際梅孤嘯發靈籟微吟盡深杯豈無出塵想奈此征鞍催仰觀崕石刻其人骨已苔悠悠山水暉行行重徘徊韶州謁虞帝廟快雪過青澗初霞隱丹岡登臺望韶石乃在江之陽薄言薦蘋藻再拜瞻宫墻當寧儼遺像巍巍埀衮裳二女肅觀內四臣森侍傍緬邈懷明德伊昔勤省方薰弦播淳音遐服被餘光儀鳳已髙逝神虬尚深藏濯纓虞泉清振衣越山蒼千載過化地詠歸矢無忘采蘭山之椒為達道監邑賦采蘭山之椒山深路逶迤澗石嚙我足松露沾我衣愛此芳菲質步深遂忘疲有美絶代人宛在水之湄貌服肅修靚皎若幽蘭姿舉衽效瓊贈庶以永所思從兹結芳佩嵗晏無相違畦樂軒種蔬東湖上雨過青甲長乾坤動生意萬物生輝光凌晨荷鋤斸毋使蔬根傷採之供朝饌庶飽藜藿腸豈無食肉者珍羞滿前行吾生安所分此樂詎能忘權氏春暉堂皎皎三春暉萬彚均煦育深恩類母慈拊畜還顧復所以純孝人名堂表衷曲堂前樹芳萱堂後種慈竹顧惟寸草心效報將安足春酒泛朝霞彩衣炫晴旭百年愛日誠葵藿信同欲太史行采詩凱風篇再續璜溪漁隱為姜用晦作湯湯磻溪水邈在渭之陽淺有鰥與鮒深有鱮與魴伊人事直釣乃獲玉中璜姬與吕為輔青齊國以昌寥寥千載後有孫育于姜璜溪學漁隱牧野慕鷹揚君子慎所履用舍隨行藏願持丹書篇獻之明聖皇聽竹軒廛居邇闤闠入耳皆市囂偶坐竹軒中便覺塵慮消好風自南來萬竿戛青霄秋聲落庭宇天籟鏘瓊瑶灑灑雨初入霏霏雪紛飄蛟龍舞黃咸鳳鳥儀虞韶愛日堂親年僅滿百子有千萬期蒼蒼東隅日忽忽薄崦嵫所以孝子心眷焉惜餘暉長繩願終繫長戈願常揮庶俾桑榆景永照斑斕衣陟屺軒朱君純孝人宦遊古豐水有母在髙堂鶴髮埀兩耳海雲天一方家山地千里水湄開小軒日夕歌陟屺啞啞夜啼烏返哺故林裏眷惟寸草心效報將曷已顯揚實大孝溫清乃常理願言鸞誥榮千載光信史賦得采石送子昭歸金溪江干艤蘭櫂言登采石山上有蛾眉亭下有千丈灣偏懷謫仙人昔游水雲間玉堂不可留翩然御風還君今勇辭歸於焉越河關呼酒一酹之陳迹重躋攀雲林鬱嵯峨金川淡潺湲去去甘棄置逍遙樂餘閒題愛慤軒卷凄風動亭樹驚烏啼故林之子在逺道永懷寸草心音容若著存悲愴孰能任仰觀昊天髙俯視滄海深曷以報罔極涕淚在衣襟林登州集卷一
