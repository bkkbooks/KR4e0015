body:
  text: 林登州集卷十四明林弼撰集序壺山圖詩序壺山圖者進士賈君克勤圖其居邑之勝也大河之東其山最多而太行為大太行雄絶跨數州縣而壺關據其要其中一峯若壺然千巖萬壑傍環角立有若擁矢待投之狀此壺山攬結一邑之秀而圖之所以作也他日克勤持以示弼曰吾聞游子懷故鄉身在異國雖山水信美曽不足以慰其心焉某也宦遊四方萍蹤梗迹昔彼而今此每一興懷則家山數千里釣游之水丘桑梓之井落松楸之墟壠瞭焉在目也因命善畫者寫是圖庶幾展玩之頃如見壺山勝概之舊而暫忘鄉井之思也詩而歌者凡若干篇矣子先世晉人而游歷所至太行之雄壺山之勝子之所悉也序是圖者非子其誰哉嗟夫人皆有君之思而君先得人心之所同然則玩是圖者孰不為之感歎詠歌而不能自己乎昔狄懷英登太行望白雲而思親舍壺山之圖蓋同是思非徒愛其勝而已吾將與子繇孟津泝大河歷九折之坂訪三老之故墟徜徉於李願之盤谷以遂子榮歸之願以尋我舊游之跡將有在於後日至是雖以圖為芻狗可也克勤笑曰請書此言以俟報德菴詩序報德菴者括蒼管增所作以報其親之德也增兄弟四人長定次禧次某增其季也好老氏學遂脫俗為道士蚤喪父事母孝養備至他日以父墓逺弗便祭掃乃謀諸兄别卜地於所居道觀之東鳳凰山龜潭之原而遷柩葬焉虛左為母夀壙復於墓傍築舍若干楹設主其中晨夕香燈以為展敬之所即所謂報德菴者也定方為欽天監掾朝之大夫士聞之莫不善定之兄弟而尤嘉增雖在方外而於事親之道能惓惓以致其謹也咸為詩歌以述其事請豫序之嗟夫老子人中之龍非真遺世絶俗者柱史不足以行其道故卷而懷之終於隱處而不見後世學其道者脫略世故過為詭異殆將絶倫紀棄綱常以遊於方之外立於物之表嗚呼是果老子之所謂道者哉增也學老氏之學而不為世之習事親之道葬祭之禮不敢纎毫之或怠民彛物則之天人皆有之夫豈不信矣乎雖然親之德未易報也詩曰欲報之德昊天罔極天之生物萬有不齊形而色之羽而儀之華而實之或洪或纎或髙或下或變或化凡為物者孰能效報於天之萬一哉父母之恩如天罔極人子思報之心雖切而其恩廣大不知所以為報也然則如之何亦盡吾所得為者而已管氏兄弟其殆庶於此乎故喜而為之書以告為子者浣花漁者詩序吏部主事張君積中其先蜀人大父雙蕉公宦遊松江因占籍焉積中思蜀之不得遂歸也築草堂江上讀書賦詩其中稍休則乘小舟釣游五湖三澤間因以浣花漁者自號其言曰地不必同景則無異人不必同志則有似吾惟先里之思前哲之慕則松江亦浣溪之水而吾草堂則子美之居也昔者君子隱居以求志不以漁釣為可賤夫亦即其所處而樂其所有事云爾磻溪之釣非失時也嚴瀨之釣非忘勢也一出而溥其澤於天下使夫溺者拯屯者亨出之有其道也一處而髙其節於千載使夫頑者廉懦者立處之有其道也吾才不逮古人而竊有志焉大夫士聞其言偉其志而歌詠之積成軸矣來命弼序弼惟浣花之名不忘水木本源之義漁釣肥遁雖樂其樂而束帛之賁即為時出積中忠孝之學於是乎在矣君年方富將大設施於時岸花水竹之懷蓴羮鱸鱠之興固未得以直遂也他日功業既成角巾歸第當携漁童樵青求所謂𤣥真子江湖散人者而與游焉余倘未及耄尚能買魚酤酒以登草堂歌少陵之詩以助君之一莞也夢彩堂詩序昔老萊子年七十父母猶存常著五彩斑斕衣為嬰兒戲於親側後世孝子莫不歆羡而慕效之或取以名堂或為圖或為詩以寓其孺慕之意然使人子常在親側得以戲彩於庭闈之間以為父母之歡斯固天下之至樂也其或游宦行役逺在他方思欲效老萊之為而不可得朝焉夕焉念念不置遂至形於夢寐則其心有不能自己者此武夷丁仲純氏夢彩堂之所為作也仲純之言曰某也年及壯矣在父母具慶下定省溫凊之不違甘㫖滫瀡之足養晨夕左右不知樂之為樂也一旦隨計吏入京師縻升斗之祿不得承顔今歷六寒暑矣寒思暖吾親之席也暑思扇吾親之枕也遙望武夷之雲恨臂不羽飛墜親側夢寐之頃一見吾親焉儼若戲彩之歡也蘧然而覺則身在他鄉心怦怦然作惡者數日某以夢語友汪季清因為作夢彩堂圖大夫士從而詩之子幸序其端庶幾少慰豫心也弼聞周官太卜之屬占六夢其一曰思夢仲純戲綵之夢蓋出於思者也人之精神與天地隂陽流通故晝之所為夜之所夢各以類應矧人子之精神與父母相為流通者耶雖然仲純年未及萊子而二親之年未及於萊子之父母也八袠而望九九袠而望百他日三釡之榮輕輿就養吾知仲純戲綵之樂未渠央也夢彩云乎哉玉雪齊序隴西李彥清雅性介潔雖居紛華不易其素也嘗曰物生天地間各有形色求其介潔之至不以窮冬寒沍而易其形色者惟竹梅為然因命黃仲章氏寫竹與梅為圖又以謂竹之貞於玉為有似也梅之白於雪為有似也故比德於竹梅而取譬於玉雪以名其軒居焉夫比德於竹而取譬於玉則持節之貞介者於是而有得矣比德於梅而取譬於雪則處心之潔白者於是而有得矣雖然竹固有似於玉也然昔人嘗以蒼雪目之則雖謂竹為雪可也梅固有類於雪也然昔人嘗以寒玉喻之則雖謂梅為玉可也彥溫蓋兼取之矣晉王子猷好竹曰不可一日無此君宋林君復好梅香影之句膾炙人口彥溫兼二子之所好將欲效子猷之風致歟則聖朝貴責實而不清虛之尚也將欲效君復之隱遁歟彥溫方揚聲振節於時未得以直遂也其亦切磋琢磨以成如圭如璧之德甘苦辛酸以成調和鼎鼐之功而以傅說衛武自期待庶乎無愧玉雪之名竹梅之實矣㑹川樓詩序㑹川樓者廬陵蕭漢飛所作以㑹文友而進士李祁書以名之也他日元户部瑄記之而為之詩者又若干篇漢飛復徴余言為序余嘗泝江西之源蓋發自郴經橫浦與章貢合流東下數州之水千派萬委悉入於江廬陵蓋其總㑹也名樓之意雖即其地之勝抑亦有㫖也哉余聞漢飛少游湖海間貴遊豪士多以氣誼交洎歸桑梓則日與文人墨客相講學觴咏歡洽殆庶幾以文㑹友之義此樓之所以作而李先生之所以名也易不云乎麗澤兌君子以朋友講習友之相資有類麗澤文士之合并豈不有類㑹川哉然川之㑹不于江而止必至於海而後已也至於海則江亦一川也君子之取友近而一鄉遠而一國又遠而天下譬則小川之㑹大川大川之㑹于海則其大也至矣禹之行水也決九川以距四海濬畎澮以距川言繇小而之大也漢飛知講學㑹友之益不以友一鄉之善士為足而必廣及天下則所友益遠所講益明夫子川上之㫖孟子放於四海之意將思過半矣弼也不敏他日登斯樓握手道舊故獲厠文㑹之列余雖老尚能泚筆川上以寫斯樓山水之勝姑書此為序以效規勉之萬一南雲詩序國子樓叔魚氏以在館久而思親之切因題其寓室曰南雲或者疑之曰雲東西南北之物也其變也無定體其行也無定在南之言不亦膠乎余曰否否夫望雲而思親事出狄梁公仁傑公居懷在太行之南故登太行見白雲孤飛曰吾親舍其下雲而曰南固本於是乎且子東而親西則望雲於西子西而親東則望雲於東南北亦然斯固無足疑者叔魚家㑹稽而身在京師則所望宜在於南雲矣學文之餘休沐之暇登北山而望南雲雲在目則心在親恨身不得與雲俱飛而墜親側其中之所感蓋有油然而不可遏者矣南之言非膠於名也乃其實也雖然國子給事省部者多不次擢用叔魚方將躋仕中外游歷四方以施其所藴之素以廓其所見之大吾知是雲之望不徒在於南也昔者孝子之詩以凱風自南為比蓋以南風之化養萬物猶子之鞠育於親也南雲之覆燾於下亦猶親之拊畜於子也叔魚之意或有得於此乎曰非所及也然先生之言則善矣請書為諸詩之序雲山惜别圖序古人於離别最鍾情焉蓋相聚之殷一旦分袂以去為親友者眷戀踟蹰不忍相舍其為情良苦矣故臨岐之際必有所贈以將其意若繞朝之鞭王祥之刀江淹之賦或折栁或賦詩皆以寓其惜别之懷云爾後世或圖别時之景與地以為贈則其情益凄且切矣余友鄭君景山居南昌兵亂流離僑居蒲坂凡草年始得還鄉井省墳墓未幾復歸于蒲親友姜叔範輩以歡㑹不久而復去也因以雲山惜别為圖而賦詩其上徵余序余觀是圖其景與地蓋倣佛西山南浦之勝非特留者有雲山萬里之情將使去者一展而玩之必有甚不能堪者淵明停雲之詩子美雲樹之句何莫非是圖之情也豫於雲山之别情所同也故序此圖不辭題胡敏中哀唁詩序至正十年庚寅唐臣將試藝有司行至莆楓亭驛聞先母陳疾且殆倉皇狼狽兼程走歸二日母竟見背呼天號慟萬死莫贖胡君敏中來弔與余相持哭盡哀聞者莫不感悼既克襄事敏中復唁豫以詩曰露冷慈幃二十秋蘆花風起幾番愁夕陽溪上雙鳬宿得似當時傍母不又詩曰棘闈催赴君恩重中路歸來念母深萱草堂前五更露西風吹作淚沾襟情愴語哀讀者莫不悲咽流涕嗚呼孰無父母俱存者知樂之為樂未必知哀之為哀必罹荼毒痛苦者然後知之真而感之深也知之真者情之不容僞也感之深者言之不能己也非知無感非情無言敏中蚤喪母知哀之為哀矣其所感者宜何如耶故發乎情而情愴形於言而言哀二詩之作蓋庶幾蓼莪之遺音也時斬焉衰絰方寸亂裂久未及和今祥禫既踰因記其舊作而用韻以答之諸公又從而列和焉人心之同然者於是乎不誣也余既録詩若干首而引其端復成長哀賦附於篇後併以寓終天憂感之意竹山黃氏族譜序譜牒非古乎曰古也書契以來世次之有考者皆是也黃帝二十五子得姓十四其所以别生分類者必有其道矣司馬公作史記其紀傳敘載之詳非有考而然乎然則在國為史在家為譜紀於國者固皆序於家者為之也晉人矜門第始重譜牒李唐又甚焉郡縣族姓至分甲乙五季紛亂士大夫家譜牒亡者十九宋興稽遺綴缺其失真者亦已多矣豫章黃氏始祖繇秀徙婺至􅀈徙豐城沇江贍又居分寧雙井五世而生太史山谷先生庭堅有諱升者居豐城竹山則太史之從昆弟也擢科躋仕世有其人十世孫曰瓊字尚英能自力學以濟世美每懼有愧前人因序族之世次釐為譜圖蓋深念乎水木本源之義而又以示夫後之子孫俾知前人之所以顯大者實繇於世德之積有不可誣者其立心亦仁矣夫茍仁以立心則雖服窮親盡猶一日也支分派别猶一人也豈以遠近疏戚貴富賤貧而異其情哉他日作紀傳者或有取於是則太史之澤愈續而不斬矣尚英朂諸航溪朱氏族譜序余令豐城嘗以事過航橋里愛其山水回環融結詢之傍曰此朱氏所居其族大以繁今九世矣他日進士自省君來見余恂恂儒者其諸孫公路每以公事至邑余見其雅飭有禮則歎曰詩書之澤厥有自哉今年冬公路持其所譜族系示余蓋自念一府君五傳至明道始貴盛為豐城望族公路為明道曽孫能與諸祖父樹門户以不墜先業實朱氏賢子侄也於乎宗法之廢久矣君子猶幸於族譜而得其遺意焉夫親盡服窮則䆮疏矣有譜以序之則雖支分派别而一本共原之義猶敦同姓之親也其於古人别生分類之意殆庶幾乎此余於朱氏不能不興慕羡之心也繼自今若子若孫繩繩於方來者能以公路之心為心則登是譜為無愧人將歷指曰是能揚祖之風紹先之業朱之門其不愈大矣乎余嘉公路用心之仁故為書此於譜左用以朂其後人焉方氏族譜序方氏古諸侯方雷之後周方叔為南征大將軍始獨姓方而雷遂為别姓蔓衍源分繼繼繩繩族大以繁則自古田令廷範始有子六人五子仁載官至禮部郎中上柱國再世為隋泉州長史達自泉徙莆于後分為三族唐季以來子孫擢科躋仕襲芳趾美代不乏人宋著作郎儀屯田員外郎慎言廣東經略大琮皆達之裔也文章政行具載傳志元初水軍萬户副使某戍清江鎮遂占籍焉長子榮卿徙居九江次正卿襲父職生安道仍襲職戍舊鎮與弟道謙皆居清江榮卿生漢祥繇九江徙武昌材識為時輩推重晚以武功授巡簡生彥彰少孤克樹立隱約無進取意生子四曰鼎鼐􅕔􅀢皆知學而鼐尤秀發善文辭繇郡庠選入胄監擢給事中轉通政司知事以勤敏稱他日以其宗譜示弼曰鼐系實出閩今四遷矣兵餘舊譜俱失今所書者四世爾副使之上不能詳也深懼失水木本源之義而不足為人之子孫也先生居閩而宦游大江之西於吾族之所從來必有考者幸為我序之豫嘗讀亡友進士方君德至家譜而往來清江與父老言論猶能有道副使公之事者今於鼐之言而有感焉嗚呼因生賜姓胙土命氏聖人為天下思子孫無窮之訓故建譜而立大宗小宗之法諸侯分命其卿或取王父之字世功之官世食之邑以為序族所以别親疏辨貴賤順少長可謂明且備矣後世封建法壞宗法不明士大夫能遡流窮源為之譜牒以不忘其本始者蓋亦鮮矣時異世殊一旦遺失則子孫無考有能譜其所知而缺其所未知不屑屑於妄宗顯達之族而必求其本源之實若鼐者可不謂之賢子孫哉余嘉其心之仁而惜其上世之未詳也故為述莆族之一二以書于譜後庶他日有考焉張氏墓祭卷序古者諸侯有國大夫有家士有職故宗法有定制諸侯有籍田卿以下有圭田士有祿故廟祭有常禮記曰别子為祖繼别為宗繼禰為小宗又曰士有田則祭無田則薦其禮制蓋可稽矣封建廢而班爵無制則宗法隨以壞井田廢而班祿無制則廟祭繇以缺故有爵位視公侯一日秩滿無尺寸之土升斗之祿者宗法之行廟祭之舉尚無望於此况其下者乎是故宗法雖壞有能篤親親之恩而序族有譜廟祭雖缺有能致奉先之孝而墓祭有田君子有取焉以其得古人遺意也若長泰張氏七世有墓墓各有田嵗有二祭祭則昭穆序列燕則尊卑旅酬歡然而有恩燦然而有文其庶幾古人之遺意者與張氏世系厥有自來代有聞人著在史牒而自徙長泰山前七世而下得合譜序族嵗時㑹祭則自諱公義府君始東軒先生又能昭前之光明而丕衍之故世譜有序墓域有圖祭田有載其心之所存蓋將使後之人知尊尊親親之義則雖千條萬葉猶一本也千派萬委猶一源也夫本植則末愈茂源濬則流愈長吾知張氏之澤未艾也東軒以儒起家二幕漳郡其數世之澤至是而始振云古雪軒詩序雪何始乎曰古也自有天地即有此雪變化成象非一日矣曰古此雪也今亦此雪也雖謂之今可也奚古之泥曰今必有古也言古則今可兼舉矣李白氏常以古月今月言之矣非古無以徴今也然則日月星辰雨露風雷皆古也奚獨於雪而疑之吁豈惟物哉事亦宜然汙尊壞飲禮之古也籩豆罍爵之飾於今者實本是也簣桴土鼓樂之古也五音六律之節於今者實本是也古人今人之師也古道今人所履也古雪獨不足尚哉夫子於川上而知逝者如斯往過來續往則古之謂也來則今之謂也古往已盡而今來無窮則前日之今即今日之古也今日之今又後日之古也以差殊而觀今古夫豈可哉西北地髙而多寒岷山之雪旋融旋結其為春與夏澌者皆其餘也古雪固自若也昔人嘗有太古雪千秋雪之咏以其雪之積也吳郡曽君行斯為綿州同府綿距岷近雪山嘗入眼因顔其軒曰古雪士大夫文而詩之彬彬如也豫來守登行斯為司李公餘之暇常以諸作見示豫謂行斯名軒雖因其地而意實深且逺也使徒因地則今日居登將復易其名耶夫天地之氣清而白者莫雪若也而又謂之古則其至清而至白者也行斯居官亷慎介然無所移其有得於至清者與皭然無所汙其有得於至白者歟名軒之意吾知有在於古雪之外也吾與行斯相聚久相得歡又讀諸君詩若文陽春白雪加以古調聊與談今古之際若此他日歸來倘未及耄携古琴一張古書數卷與吾子探古音論古道於古雪軒中安知吾與子不古人若也林登州集卷十四
