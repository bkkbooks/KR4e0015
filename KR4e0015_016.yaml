body:
  text: 林登州集卷十六明林弼撰記南圃記距漳南五十里有水曰南溪溪之傍地曠肥沃皆稻田也稍依山則為圃種菜麥萟蔬茹瓜果之所植圃之利居農之十二三焉友人蔡君宗禮居於是而不能圃日與圃者游有荷鋤而斸者君亦效而斸之有抱甕而灌者君亦效而灌之久覺圃之可樂也因自號曰南圃既而用薦來京師授筠連尹簿書期㑹之煩徴需牒訴之勞其心固未嘗一日清且燕也而南圃之思往來于懷數數焉不能忘因請豫言記之昔聖人以不如老圃答樊須之問蓋恐其局小人之陋而不知大人之事也然隱約之士若漢隂丈人陶靖節之儔皆托於力圃以寓其棲遲偃息之樂其心之所存蓋有在於抱甕荷鋤之外者焉賢者之隱處也其時不可為故潔其身而去之方今主聖臣良旁求俊彥以熙治功雖巖栖野處之士莫不奮勵踴躍為明時出思有設施自見於世奚隱士足云哉豫聞筠連民雜居夷獠吏胥時侵漁之君招􅝘安集教之以禮夷皆感服趨役邑田多荒君詢其繇曰舊有堰滀水以灌田今堰廢故田荒君以義倡之率先邑民築石為堰數日而成連嵗大稔凡所營辦進民計之正數之外不餘科一錢民皆信服夫禮以化之義以服之信以孚之三者皆大人之事而君能行之較石隱之徒自别他日年及休致退居田里南圃之間蘆蔔生兒而芥有孫余來溪上尚能效何曽同子一飽也介菴記廣信徐君彥明隱處田野恬淡自樂於紛華寵利無所嗜好交游不雜取豫不茍因自號介菴以見志其壻胡彥榮入為中書請豫記之豫謂介之義有二曰貞介則有堅確之意曰亷介則有分辨之意然必守於已者致其堅確然後接於物者知所分辨蓋合內外之道也在豫之六二曰介于石當上下豫樂之時能以中正自守其介如石則所守之堅確者也孟氏論栁下惠不以三公易其介蓋言其和而不流故遺佚不怨厄窮不憫則所取之分辨者也徐君隱居自樂不慕華寵其貞介者與不雜交游不苟取豫其亷介者與豫聞彥榮之始來京師也徐君送之郊戒之曰凡為仕者必亷以律己敬以慎事恪恭乃職而無慕乎外庶不辱身不辱里邑聞其言者莫不感嘆以為有得於貞介亷介之㫖故以是而訓其壻昔樂廣人稱其冰清其壻衛玠人稱其玉潤彥榮能以徐君之言而實踐之則冰翁玉壻將再睹于今日矣書此言以為記或得介菴之實乎懶雲居記金華柴義方言於弼曰某性緩而懶嘗築居永康白雲山中朝焉夕焉獨坐一室靜觀白雲無心出岫悠悠揚揚相娛而相忘因自謂雲之懶亦猶豫之懶也遂以懶雲生自號人因于室者也人以是名室能外此乎遂名吾室曰懶雲居室有古琴一張時出而撫之悠揚之音猶雲之態也室以是名物又能自外乎併名吾琴曰懶雲琴子能為記之否豫曰否否弼聞知者不凝滯於物子何以子之懶而名雲以懶并以名爾室與琴耶豈栁子以愚自命而遂以愚其溪愚其谷者耶夫雲之未出固懶矣及其既出則未嘗懶也琴之未動固懶矣及其既動亦非懶也且子昔之居是室也固可以懶為習今出而仕矣雲蒸龍變㑹際其時茍故態未除不幾於怠以廢事乎緩以失機乎弛而不知所以張乎義方曰不然夫雲卷舒有時而出處無心吾雖以懶纍雲而不敢終纍於雲也雲既不纍豈吾居吾琴之遂纍乎弼曰有㫖哉義方殆不競於世而亦不忘於世者也子其從雲為雨以成澤物之功然後退居而室以自安撫而琴以自樂雖終於懶可也義方笑曰吾志也請書子言以為記筠軒記竹可比德故君子多愛之自詩人托淇澳之竹以美衛武公後世修德之士慕而效之其亦景行前哲之盛心乎即竹而論之其心虛類君子之謙不自滿者焉其節直類君子之守不自失者焉其色蒼而不改類君子之有常不為流俗所移者焉宜夫修德之士有取於此也姑蘇顧氏清修士也為中書掾即寓舍闢小軒種竹數十竿退則閉户清坐與竹相對怡然無塵慮之內縈也因以筠名其軒間請豫記之夫古人之所愛者亦多矣蘭愛於屈蓋自况其清也菊愛於陶蓋自况其逸也蓮愛於周蓋自况其潔也晉世好竹者多有竹林之賢焉有竹溪之逸焉宋蘇長公嘗作緑筠軒歌豫聞筠者竹之堅者也顧氏清修自持業比德於竹其尚堅乃操以無愧於竹之筠窮而益工老而益壯即衛武公何多讓焉遂書此以為記嘉慶堂記顧氏為崑山望族植善樹德凡數世矣本蕃條茂流慶後人今户部尚書元禮君起家為名法從二親年未及六袠兩以推恩錫封朝之公卿榮之因名其堂曰嘉慶君請余言為之記夫高堂具慶固人子之所深願致身津要晉錫絲綸亦人之所同欲而有不可必得者蓋皆係於天而非人之所能為也今顧氏兩俱無憾則其為嘉慶也孰有過於此哉夫慶有本善與德之所致也顧氏自其曽大父以來周人之急人有所欲必委曲成之大父及父皆隱約田里間至君而益昌以大蓋食祖父之報如持劵取償天之福善人者果不可必歟深耕穊種則豐穰可卜一樹而一穫者也植善樹德則昌大可期一樹而百穫者也豫聞君嘗以出使發同事之奸上結主知遂䝉寵擢蓋其心正其氣充有確乎不可拔者故雖暫以故去而簡在帝心起二地官而升今官嘉慶之來夫豈無自而然哉嗟乎慶非一端也父母俱存則曰具慶積善全昌則曰餘慶君年方富已踐華要具慶榮于今而餘慶衍于後他日大用於朝疏封祖曽其為嘉慶又當何如也蒼碧軒記漢徐髙士後人永愚甫居東湖之北偏嘗即隙地闢軒數椽引水為池植竹為林清意逌然若出塵外因顔之曰蒼碧蓋取水竹之在目者子漢竒孫景南讀書軒中又再世矣他日景南語豫曰吾祖生值盛際所與游者皆海內賢士大夫固未嘗屑屑於考槃也而軒以是名其必有以也夫敢質諸子豫曰水有源竹有本祖之義也豫固知若祖之所慕尚者也東京多節義之士而炳幾識勢脫然於利害得喪之外則亦有髙士焉其清而不汚堅而不屈非水與竹不足以喻之也吾意永愚之居其軒也覩夫竹之蒼也則生芻一束徴辟不赴其節之堅者於是而可想矣覩夫水之碧也則獨寐寤歌處脂不潤其操之清者於是而可想矣夫必有所慕而後有所尚所慕者人所尚者物是軒之名而豈茍哉抑豫聞景南以才諝薦于朝竟以親老辭歸軒之水竹眷然不忘可謂能繼前人之志而無忝髙士之稱矣濬家澤之逺揚祖風之長安知是軒不與孺子之亭嫓美乎軒中多古書及近代諸老雄文名墨不悉録云九疊山房記九疊山房者松江髙君明德養親讀書之所也松江水國得山則勝概集焉九疊距郡十里許峰巒秀拔溪谷深窈泉甘而土肥明德築居其下中為堂以奉二親旁闢地為軒山色葱蘢攬竒挹爽常在几席君與弟衍養親之暇則游心典籍羣經諸子積架盈箱客至則相與論難商確深理奧義必求其至而後己或日昃未食夜分不寐蓋其志篤其力勤故其學以成也吏部知其賢擢為曹掾明德以溫凊之久曠也山房之思往來于懷而時寓意於詩文間考功主事張君談修因為篆書四大字復徴豫言記之噫世之人孰不知事親也而竭其力以致養者鮮矣孰不知讀書也而肆其力以窮理者鮮矣致養之未至未足為能孝者也窮理之未至未足為知道者也明德致孝於親而勉學於己蓋得聖人餘力學文之意而知本末之分矣君盛名方起以所藴之學而達於設施其光明俊偉之業必有可卜於後者語曰顯親揚名孝之大也九疊之山將藉子生色毋徒為山房惓惓之思矣燕壘齊記上古多巢居故有以橧巢為氏者人而巢居與物奚相逺哉鳥之巢於木者衆矣惟燕雀則於人之屋雀則瓦隙取枯草墜羽藉以為巢燕則銜泥為壘於楣梲之間拮据卒瘏纍日而成猶之人也既勤垣墉而塗塈茨無論其大小廣狹唯求其安焉然則人之居猶燕之壘也四明莊君九疇善學工文辭而以清介自持不纍於物名其所居之齊曰燕壘請豫記之蓋君嘗謫居濠上築小室為墅而以燕壘名之既而起為咸陽令居官舍中堂髙而室奧簾崇而廡逺則又曰容膝易安亦奚異於向之燕壘哉夫人唯苦於豐約之過計也茍為不計則雖蓽門圭竇不為卑也華堂廣厦不為髙也繩樞甕牖不以為朴雕梁畫棟不以為侈何者其志不以是而移也燕處於華屋而泥壘不易焉豈以富貴而移貧賤之心哉世固有王公之貴晉楚之富穹然其居煥然其廬偃然自以為安也一旦富貴之窮人已去而燕獨歸則曽燕之不若也豈不重可感耶莊君之居以燕壘名不以彼此而易其心亦可謂達矣夫燕春來而秋去有類於知時者焉雖近於人而不䙝於人有類於知敬者焉君豈有取於是耶知時而敬則斯壘之安將無適而不可也夀萱堂記雲間周氏伯謙與弟伯讓事母夫人王氏孝左右承顔必得其歡嵗戊戌夏母感疾五日不食醫巫罔功伯謙憂懼不知所出乃夜禱於天割臂肉置粥中以食母疾尋愈既而伯謙出任京師伯讓獨侍養于家癸丑之夏母感暑不食者七日疾轉劇伯讓籲天懸燈于身燃之頃之母疾亦瘥今母年八十餘既夀且康因名所居之堂曰夀萱堂他日君謂弼曰子幸記之余惟孝子之事親猶忠臣之事君也君有難則臣致其身以赴之義固應耳親疾既殆子倣徨無措茍可以療其疾雖髮膚豈愛焉蓋子之身即親之身也以吾親之身而事吾親其孝念之發惻怛懇至宜其感格天心而親夀以延也遡伯謙之禱今二十有二年伯讓之禱亦七年矣以二子之身而益母二紀之夀過此以往將及期頥而未艾也天之福善人豈不彰彰哉余聞萱佩之宜男有母之義焉食之忘憂有樂之義焉故樹萱於北堂而朝夕致培植之力猶事親於髙堂而晨昏謹定省之節也周氏伯仲競爽孝養如一母也亦可以樂而忘憂矣余雖未獲升堂拜母竊慕君之孝感聞於逺近故為述其事而記之以勵天下之為子者伯謙名某今為吏部郎中朝著有稱云林登州集卷十六
