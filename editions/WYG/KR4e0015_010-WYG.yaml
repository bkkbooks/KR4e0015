body:
  text: 林登州集巻十明林弼撰送序送張𤣥畧之夷陵校官序元世吾閩以儒業顯者固不乏人然延平張氏實啓而先之張氏升以童子入胄監遂􅆒歴中外官至儒學提舉子𤣥畧習家學益演迤而宏廓之治舉子業值元季不復求售有司隠約山野間晉寧魏先生文憲文學偉士也知𤣥畧之賢遂妻以女𤣥畧以提舉公死節江西僑居者乆之余令豐城與𤣥畧數相見既而𤣥畧奉櫬歸葬别去且十年思欲一聚首而不可得今年秋𤣥畧以有司之薦來京師予忝職儀曹獲道舊故甚驩上方注意學校造成人材銓曹以𤣥畧明經學遂以為夷陵學正𤣥畧來别曰願有言以告我也噫予何言哉君學積於己而淑於人舉而措之固無難者予何言哉昔陽城以忠孝教諸生後世稱其知本𤣥畧傳家忠孝固所謂身教者矣諸生之取則孰有大於此者哉夷陵歐陽文忠公嘗為令以過化之學之行而勵後進則它日文風之盛将稱夷陵矣予與魏公篤忘年之交而提舉公素所景慕者故於𤣥畧之行喜而序之庶㡬朋友規益之誼也送袁時習之沔陽學正序學正教職也師道之立人材之成繫焉蓋職教得其人則師道立矣師道立則人材之成易矣非其人則反是古之教人者有小學焉六藝之文洒掃應對進退之節是已有大學焉窮理正心修己治人是己小學學其事大學學其理而措於事今之為教蓋兼之矣有經學焉有射學律學焉有書學算學焉日書而月課之季呈而嵗攷之稍成則登于成均一或有需則㧞而甲之用之急則成之必速也成之速則造就之必勤也職教者可不加之意乎然則教職雖易而實難四明袁君時習宋正獻公爕之諸孫也父石隱先生璉嘗立義塾以教其族及里之子弟篤學實踐鄉人化之時習於家學泝源而衍委者也今年秋以明經舉授沔陽學正見予於禮部恂恂然禮甚䖍也氣甚和也予竊言曰是可稱教職而立師道矣人材之成其無負於朝廷之所注意者乎噫室必成於梓匠車必成於輪輿以其藝之精而業之専在是也時習尚精爾藝専爾業以舉爾職庶乎學之克施而後進之知所勵也時習作曰諸大夫士方以道之所經分題賦詩以為䝉也贈請書先生之言以為序送祝季清歸省序三衢祝季清為國子之二年以歸省告循故事也國學為白禮部予忝幕職見其來牘則嘆曰昔在有唐之世成均之教亦云舉矣然諸生歸省之無其制必待陽城為司業然後行之城既行之猶有三年不歸而被斥者于以見聖天子孝治之盛軼乎有唐之君而今日人心士習有非唐世之所能及也且古者三物之教六徳為首六行次之六藝又次之先徳行者本也後文藝者末也矧夫孝實徳行之本也歟今茍不以尚行為本而惟文藝是趨則失其為學之要矣故二載之上許令歸省著為定制使夫知盡為人子則知盡為人臣也季清思定省温清之曠節甘㫖滫􅔱之闕養即告以歸盖不待司業諄諄之誨而後能也綵衣趨堂春酒介夀親朋閭里之畢集其為樂蓋可想矣天子需賢若渴而於國子尤注意焉季清調膳之暇其速歸館以待寵擢柯山之㳺慎勿乆留於觀奕也送蔡孔昭再令上饒序國家以九等考庶官之績考上中者皆俾復職蓋用漢守令乆任法也夫任乆則民信民信則政洽政洽則職舉矣於考績其庶㡬乎吾友蔡孔昭曩以有司之薦為儀封丞陞上饒令上饒為廣信附郭縣當往來孔道徴需之繁力役之頻牒訴送迎之勞視它邑為最劇孔昭以退然一儒生處之不大聲色不事苛刻而令亦行事亦集郡上其考中今年冬入覲既考復職上饒故事復職官賜宴於禮部孔昭來言曰某昔辱先生之教今宰百里愧無善政叨沐恩寵亦云厚矣願先生賜一言庶以為規夫政貴有恒始勤而終怠則事廢矣先寛而後猛則民怨矣子之再令亦惟以昔之所施者施之不矯情求異惟循其常而加慎焉則民安子之政如一日也余歴職郡縣所自勉者不過若是故為子言之未知然乎否也送吴起濳歸養序吴起濳氏泉出也洪武八年秋有㫖徴郡縣學弟子員能通一經者進胄監起濳中選來京師在館逾年以親老無它昆弟乞歸養胄監允其請給事中林君廷綱謂予曰起濳亦能子矣今之言歸先生幸有言以贈之庶㡬鄉里之誼也肆惟聖明龍興禮羅賢俊列于庶職草野不遺而於胄監尤加之意蓋以茂才之在是也故凡國子多不次陞擢或任方靣或司風紀或位朝著咸自奮勵思有以設施於時補報於上在館之士朝夕待用猶望鴻鵠而援弓􅗤其心已躍如矣而起濳泊然無進取意惟念親之不寘蓋以親重於仕而學莫先於此也故惓惓焉以歸侍告雖拖朱曵紫戲綵之歡不易也累茵列鼎調膳之樂不移也嗟夫若起濳者可不謂之孝子哉予忝寸禄而親去我矣起濳之歸而親逮養雖未得禄猶足樂也筍江之魚泉山之酒吾知足為甘㫖之奉矣它日求忠臣於孝子之門舍起濳將奚適哉予嘉起濳厚於事親而薄於禄仕也故於其歸序以送之送董文昭教浦城序自洛學既南徽國朱文公集諸儒之大成道學之明炳如日星矣真文忠公雖後出而能發明朱子之學若讀書記大學衍義諸書至今為學者所宗為有國所崇方之孟氏明夫子之道蓋世雖異而事畧同焉建之浦城實文忠之故里也文忠公之學家傳人誦非一日矣故論道南之淵源則始於劒而盛於建而浦城又建之一理窟也皇上重於育才於學官必慎擇焉吏部既試其才必覆試于禮部以觀其學然後授以教職蓋以師道之在是而模範之必正也予友董文昭種學積文亦既有年今年冬以有司之薦來京師禮部試其文吏部上之遂以為浦城教諭予忝禮曹因其來别告之曰文公先生昔守吾漳北溪陳先生安卿實得其傳文公晚嵗四方弟子益進公倦於講説惟使質於安卿公但首肯而已文昭生北溪先生之里而㳺文公之鄉教文忠公之邑益當思所為教以無愧於前修以無負於皇上至意庶乎人材可成而教職可稱也朂之哉蘇郡倅王君復職序今天下劇郡姑蘇實稱最焉官於是者非明敏練逹之士則事廢而職曠職曠則身危矣故官難其人而為其官者恒病其職之難稱也王君文質倅其郡閲一考矣故事當入覲文質至京師吏部書其考上既而賜宴禮部遂復職焉余甞考殿最之法唐世已詳然郡縣之廣劇不能移於簡難不能移於易自今論之錢榖之徴造作之需牒訟之造南北之簡劇相倍蓰焉而南郡之簡劇亦有相什伯焉官之材有優劣處於簡劇也有難易而惟以稱不稱第其髙下則北之稱者必不稱於南而南之不稱皆北之稱者也殿最者果於是而可定乎矧夫蘇郡又南職之最難稱者乎王君不以職之難而克稱之繇一考而至三考皆舉此而措之夫何難能乎哉倅以佐守者也為佐能是守獨不能是耶文質循兹以往吾知無難為之官無難處之事故於其歸書此以送之送翁毅𢎞歸省序成均為首善之地而儲材以待用焉斯天子之所重而天下之所觀法者也郡縣學弟子員能通一經逹一藝者即貢成均未數嵗吏部試其學即官之上以其速成未足為逹士也於是選有學能文者四十三人命博士専教之期以學博才宏而成其器之大今年春有㫖俾各歸省人賜衣二襲楮弊若干緡又賜其父母人二縑奉以來者月有給焉於是諸生咸相激厲以為天子之恩賜侈矣作飬之意深矣吾徒可不知所以自力以真儒自期以補報為念哉清源翁毅𢎞入為國子将二年矣在倫軰中嶄然見頭角首預兹選至是得告來言别曰某辱與先生同為閩人今焉歸省吾親先生幸賜一言庶為鄉里之光也噫士之為學必志真儒國家以是望子而子亦以是而自勉矣予復何言哉傳曰夫學則殖不學将落子年富力强能殖其學他日躋仕中外文足以潤色於鴻業政足以禆益於盛治則有以副聖天子之至望而顯於親者不徒今日之榮為已足也朂之哉送陳一原復職聊城序余昔過聊城愛其民俗之厚官事之簡則歎曰太公之風孟子之化猶有存者歟鄒衍淳于髠説辯之習亦既息矣乎魯仲連之重義不取猶有勵於後世也歟他日余友陳一原簿其邑秩滿入覲詢其民俗則視昔澆矣詢其官事則視昔劇矣蓋重兵駐其地則供需為難邑負郭而當孔道則應接為煩民貧而事不時習則大府之譴呵日至簿之職亦不易稱矣公務旁午一原一以平易剖决之若層冰春釋渙然而無壅若大斧斫木盤根錯節應刃而解繇是大府書以上考沿檄至吏部允之錫宴南宫復職北還予忝儀曹因其來别而言曰昔者者聖人委吏乗田猶屑為之惟思其職之稱云爾子之職稱矣今復其職母易爾心改爾政民安子於前豈不安子於後乎敬以持之誠以孚之則雖乆而民愈信而事愈集矣君晉安人宋侍御史某之後領洪武五年鄉薦同年皆職近侍臺憲一原以親老辭八年復起為今職云送林純夫職教龍溪序予去家十餘年親友多零落老者皆為土中人壮者老而少者壮矣雖一二來見目予老醜率瞪視移時然後一笑人生聚散不常嵗月易邁此古人所以興離羣索居之歎也今年春友生林純夫用薦來京師見予於儀曹年已壮修容而豐髯禮度而氣和則為之喜曰是殆無凡近之習而可進於髙明矣既而吏部試以經學俾職教龍溪龍溪純夫之鄉邑也校官諸生之望法也一言一行不循乎理則長者有議而後進必厭於心蓋道立則教立範正則器正漳雖介海濵然晦庵朱文公實過化焉北溪陳先生安卿東湖王先生子合皆其髙第弟子道學之傳一脈不墜其教人之法具有成訓子能興而行之則諸生之成材也可卜矣國家選材先實行而後文辭子知所重則教職之稱何難焉予老矣倘遂乞身歸里之願尚能與子尚論聖賢道徳以續夫二先生之緒毋謂今人不可齊古人也誰謂華髙企其齊而純夫其朂諸送程仕貴歸省序上臨御之十年有㫖國子嘗被差遣者中書試其業官之令各歸省然後之官臨漳程仕貴方分教宿州以無他兄弟乞歸飬有司謂在令甲父母年七十許一子侍老而仕貴親年未及弗允仕貴再以歸省請允之仕貴喜動顔色以為雖未得請而暫得歸覲一承親顔亦上人之賜也其友洪朝宗氏來言於余曰仕貴里生也嘗受學於尊公三谿先生今兹有行盍亦有言以華其歸乎於戲天經地義民行則之孝實百行之本也孝行於家則忠移於國仁推於民愛及於物誠獲於上信孚於下皆是道也仕貴學古以入官方将見於設施報國必思所以忠撫民必思所以仁也澤民必思所以愛也上有所統也必思所以獲其心下有所臨也必思所以孚其情是豈有待於他求哉亦舉斯心加諸彼而已今日不遺其親即他日之不後其君也蒞政臨民既行其學親及期頤然後歸侍吾知仕貴請雖未允於前而終允於後矣忠孝之胥盡徳業之交修余於仕貴望之予非無仕貴之思也而風木之感無窮之痛有不忍言者視仕貴歸省之樂其歎慕當何如耶仕貴第為我問故山梅竹還無恙否倘沐聖恩獲賜骸骨尚得盤桓於三逕也送韓君子煜之官海門序洪武丁巳春弼再奉㫖與禮部員外郎吴伯宗順慶府照磨韓君子煜同使安南越四月至其國其王煒郊迎璽書至宫北靣拜跪受上賜如禮遣貢方物奉表陳謝濵行煒遣陪臣持黄金若干兩為贈弼與二君峻辭郤之子煜曰嫌疑必慎亟取紙筆俾臣具状領回復語其執政以郤之之故要在上不失聖朝之體下不失逺人之心萬里瘴鄉山川險惡而吾三人同心一力以事王事行則方舟聮轡寝則共室對床相聚之殷而相與之厚未嘗一事之或違一言之或戾也既復命當路以韓君為能超遷海門令予與吴君送之龍江之滸酌之酒而告之曰郡縣選材慎重至矣有地百里有民萬室利病得興而除之强弱得抑而扶之亦足以行其志矣君自弱冠登仕版已籍有聲稱今兹作邑譬猶駕輶車就熟路不待王良造父之御一日之間迅馳千里有不足言矣海濵之民雖習頑獷可以義化又地居畿輔政聲之逹易於上聞吾知子煜入為朝著之羽儀也必矣諸大夫士贈詩凡若干首遂書余言以為序送史子𤣥之忻城丞序餘杭史君子𤣥僑吾閩二十餘年矣其所與游者皆清介茂㧞之士弼雖樸鈍亦忝定交焉知其博學多藝能樂恬淡而厭紛華也洪武己酉弼被㫖徴至京師叨職銓曹補外任與子𤣥則别且十載四方之士或被徴薦雖巖穴草野不遺也有若子𤣥之賢而有司不之舉予竊惑焉今年春或有言子𤣥于朝者有司懼獲蔽賢之譴即遣計吏偕以來吏部試其文上御華蓋殿親賜問焉已而授慶遠之忻城丞來告别曰願有言也予謂士㧞草萊即擢郡縣亦云重矣子𤣥優學逹政以所藴之素見於設施必能無愧於其職矣忻城邑小而地僻民雜猺獠政貴撫循子𤣥茍不鄙夷其民道之以禮樂之教将見化頑獷為良善轉呻吟為謳歌百里之内翕然安集則下之有以行其學上之有以副聖天子之徳意矣弼聞朋友之義貴相規益故於君之行序此言以為贈林登州集巻十
