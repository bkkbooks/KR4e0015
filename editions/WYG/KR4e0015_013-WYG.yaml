body:
  text: 林登州集巻十三明林弼撰集序陽山蒼檜圖詩序宋氏子子宣髫齓有遠志弱冠客遊四方嘗以武功爲監當官尋引去則盡去游俠之習每與文人墨客相徃來予友錢塘馬性之淮南顧孟仁皆情分寡合聞子宣在門則倒屣迎之觴詠歡洽移日其爲人可知矣子宣之言曰昔余未有知也孟浪江海間學之未力况於仕以行之乎陽山之麓有先廬焉環廬有檜數百株先人手植也吾雖欲騁桑蓬之志而不能不興松檟之思每登髙望逺則陽山之蒼林茂樹瞭焉若在心目今將歸葺故廬以奉先祀愛䕶植檜以無斬先人之手澤庶㡬失於前者或可得於後也予曰子宣其知本哉詩曰維桑與梓必恭敬止子宣於先檜瞻而思之愛而䕶之豈不曰先人逺矣見其手澤猶見先人也其純孝之念油然而生推是心也則忠君仁民無適不可子宣勉乎哉子宣方年富異日聳壑昻霄以備棟梁榱桷之用則於是檜爲無忝將不徒愛而䕶之之足尚也性之孟仁作而曰子言可規請書于檜隱圖後用以爲子宣贈栁江送别圖詩序栁江送别圖者漳士贈趙居貞之别也别而圖之何曰時也時而栁江何曰地也時則情寓地則景存情與景㑹圖不容己矣况别之時與地乎江文通賦曰春草碧色春水緑波送君南浦傷如之何此時此地也此景此情也感而發於一時孰與異日之無已乎予觀是圖逺而風帆沙鳥近而汀雲浦樹凡栁江谿山之勝莫不毫分縷析蓋目一時之景而心無己之情者也居貞居清凉山中必日展而玩之曰栁色依依吾友别我之時也江水瀰瀰吾友别我之地也友之所以贈我者何朂我者何吾不忘乎所以自勉也若然則是圖也庶㡬仁者之意非啻贈鞭贈劒之云者矣居貞温陵舊閥善學工文辭故漳士愛之於其行既裒詩於圖左遂屬某為之序梁山樵唱集序梁山樵唱者古定倪君孟明樂府集也君蚤嵗自大江以南游揚州歴覽燕趙齊魯之墟嵩岱河洛之雄僑京師十數年鉅公聞人定文字交貴游豪士氣誼相許其偉邁奮發醖藉風致一寓樂府故或追事弔古以舒情泄憤或嘲花誚栁以賞心行樂其意雄其詞婉其聲渾和壯厲有中州作者氣大爲酸齋貫公玉霄滕公稱賞洎來漳愛梁山泉石之勝卜築其下酒酣耳熱浩歌一曲樵夫牧子皆狎聞之而知其譜因名曰梁山樵唱云一日出示余余雖不審其聲而粗識其語意知其足以鳴國家治平之盛與陽春白雪集並行於世也然余聞長短句者詩之餘也雖南北之聲不同其爲詩之餘也則一君能詩得李杜家法具在别集是編特其緒耳知孟明者當不專於是也華川王先生詩序古人之詩本乎情而以理勝故惟温厚平易而自有餘味後世之詩局於法而以辭勝故雖艱險竒詭而意則淺矣夫三百篇者詩人情性之正而形於溫厚平易之言也後世能言之士有極力追倣不能及者則固非無法也非無辭也其法非後世之所謂法其辭非後世之所謂辭也蓋情之所發者正理之所存者順則形於言也自有其法自有其辭有不待於强爲者也惟能有得於古人之法之辭則後之作者皆可以與之方駕並驅而無愧矣華川王先生子充甫以文名海内而詩聲復出間出其集示余長篇短章徃徃有古法上遡風雅下擬漢魏與李杜韋栁輩頡頏後先情真而法嚴理臻而辭工余固知其非茍作也近世以詩名家若范江西虞蜀郡楊浦城諸公皆有以鳴乎治平之盛而黄文獻公獨以平實流麗爲本華川蓋得其心授之微者也夫平實則理勝而有温厚平易之氣矣流麗則辭亦勝而無艱險竒詭之病矣詩之爲詩殆不出乎此也先生文集若干巻宋太史景濓胡先生仲申既序之矣而囑唐臣後更名弼序其詩之集余於詩所造者淺不足以知先生而辭不獲命故書此以求質焉秋山髙隱圖序景之可樂者在秋居之可樂者在山得其景與居之樂而歸隱焉亦可謂髙士也已古楊謝元初氏學老氏之學者也遊方之外名山大川既足厭而目飫則曰吾隱者也游非有求於世亦適吾志焉耳𤣥髮以出今種種矣盍亦歸故山以修吾初服耶林君梅隱聞其言而髙之爲作圖命以今名請余序首簡余曰夫隱心隱而已矣心隱則雖遊亦隱也市廛亦山林也何必歸隱秋山而後爲髙哉原初曰秋於時爲清山於物爲靜吾教以清靜爲宗梅隱善名吾隱者吾將歸隱以清靜吾身心焉庶㡬有得於秋山之意也余曰是可敘已博陵林唐臣既敘重繫以詩喜雨詩序天下之喜大而公者其惟喜雨乎喜或在於一身或在於一家或繫乎一國而雨則澤乎天下者也其爲喜不既大乎有以禄位而喜以夀康而喜喜於燕享喜於際遇空谷而喜足音破敵而喜折屐足或一人之私一時一事之偶然孰與無一地之不被其澤無一人之不快於心者乎故曰雨之喜天下之公也傳曰若時雨降民大悦所謂喜之大而公者歟至正癸夘春三月不雨農作方時而田不可耕秧不可蒔溪澗且涸原隰若焚札瘥已兆南靖尹朱侯元賔蹙然曰旱莫苦於春春莫甚於三月吾受百里生人之寄農事無所施則民命無以存吏職將何以稱乎乃闔門蔬素誠以致禱檄龍於湫雩祀山川百神翌日雲興雷奮雨大作三日而後止於是涸者濡枯者起民之望者如渴而飲饑而食咸曰是我尹之雨也相與欣忭鼓舞不能自己來請於余曰雲漢憂旱形於詩六月喜雨書於春秋凢以繫乎天與民也吾儕小人將志斯喜於亭焉則吾尹重勞我力也詩之書之則吾民之賤無以信於簡册也子幸爲我志是喜庶幾有以白侯之德慰我之心焉嗟夫古諸侯祭封内山川誠以能出雲致雨以澤民也縣尹爲古子男爵而封域之廣蓋過之境之旱亁水溢實於山川有繫焉者也朱侯不雨而誠禱宜其應之不爽歟朱侯可謂知所職矣邑之士子裒詩謡若干首以爲侯美余嘉侯能誠於懼災民能義以愛上也書此以爲序塊漚集序塊漚集者賈君彦芳自名其所爲詩也余嘗異其所以名君笑而不言余曰子之得於幽且遐者吾固不能知姑以吾之所及者爲子言可乎今夫山土之至髙者也自其一塊言之則塊亦山也海水之至深者也自其一漚言之則漚亦海也三百篇者崑崙也渤澥也漢魏李杜喬嶽也大川也崑崙喬嶽固不以一塊爲加損然一塊之助亦所不棄也渤澥大川固不以一漚爲餘欠然一漚之溢亦所不辭也塊反於土漚反於水雖不足爲髙深而謂無資於髙深焉不可也向使古人之詩極其髙深後人舉不足以得其一二則雖皆無作可也然則一篇之佳亦古人之一塊一句之善亦古人之一漚也吾觀彦芳之詩長篇得古意短律合近體殆有造於髙深者而集以塊漚名蓋卑以志崇淺以圖濬而心不自畫焉者也誰謂華髙企其齊而誰謂河廣一葦杭之積卑以爲髙滀淺以爲深吾於塊漚焉卜之矣彦芳謝曰非所及也然可朂吾怠請書集首以爲序梅隱詩序昔者吾宗和靖先生隱西湖之孤山環屋植梅吟嘯其中蓋託梅以隱者也宗人林文奎氏雅性好梅時執筆爲梅寫真心景前哲因以梅隱自號間謂余曰此吾一家言也子能爲我序所以廣余以未達之㫖乎哉復之曰和靖託梅以隱夫人能知也抑孰知梅爲花隱者君子寔取之以自况也菊芳老圃蘭秀深林謂之隱者可也然而未爲隱之至也梅其隱之至者歟菊蘭隱於秋而梅乃隱於冬當霜饕雪餮之餘羣卉搖落萬植委槁梅也秉其貞白孤芳獨潔卓然自見退不隱乎泉石荒寒之濵進不慕乎桃李紛華之場易曰天地閉賢人隱此梅得隱之時而於幽人貞士嘉遯之義爲有契其所取之也固宜然則託梅以隱未爲知梅之深者也知梅之善隱而與之俱隱則人與梅一矣雖然和靖之得於梅也以詩子之得於梅也以畫雖所得不同而所以得者則未始有間也香影一聨模寫入神膾炙人口子之慘澹經營模寫形似其得趣之深亦不减前人矣古人謂詩有聲畫畫爲無聲詩梅之隱也殆於詩畫而顯矣梅隱之號朱先生原道林先生清原常序而歌之而張公師䕫又圖之矣兵餘悉化去復徵予言予重違其請故既述其託隱於梅之意併以梅之善隱者廣其義焉夏指揮遊赤松觀詩序赤松觀者金華洞天之絶勝也昔上駐蹕是州以其地爲淛東要郡命夏侯仲毅鎮臨其所侯靜中而寛外又以無事遂得放情山水間每遇佳時勝日良賔清友必遊赤松遊必有作人能傳誦之洪武庚戌春與淛省鎮撫李君同游爲詩二首清婉流麗大夫士倚而歌之既成軸矣余被㫖以來得而讀之則作而曰皇上神武克綏四方以治道不專在是誕敷文德熙而洽之以武臣而詩書禮樂焉是務蓋有得乎德意之微矣思昔戎事方殷逺近警急雖山水之勝一登一眺有不遑及矧詠而紀之者乎古人謂政治得失詩可以觀讀侯之詩金華之治於是乎見矣故因其巻之成書此以爲序夏指揮春日倡和詩序輕裘緩帶羊叔子之在鎮也雅歌投壺祭征虜之在軍也孔子曰有武備必有文事予於指揮夏公而有徴於古矣公作鎮金華幕府多暇日與諸生游從講求忠國仁民之術既則觴詠以娛於獻酬交錯之頃而成賡倡迭和之篇太原籧君彦敬裒而爲巻徴予引其端予嘗觀古人之詩在盛際者其辭樂在衰世者其辭苦今朝廷清明海宇寧一如日之旦如時之春明良賡歌於内而治音逺播於外讀是詩者當於麟趾騶虞求之叔子征虜未足爲公期也白雲孤飛圖序孝子思親之心惟於登髙望逺之時爲最切蓋所履既高則所見益逺雖雲山千里如在目前其思念之切有非常時之可比者矣古人陟岵陟屺而瞻望父母良以此也唐狄梁公登太行山見白雲孤飛曰吾親舎其下悵望乆之夫雲之漠然若非人心之所存也其孤飛也未必下直於親舎也特以登髙望逺而思親之切故彷彿想像而若有見親舎之所在耳後世孝子行役在外違定省温凊之節不得展承顔養志之敬而無以少慰其孝思之心於是即望雲爲故實或爲圖或爲詩以寓其意于以見孝思者人心之所同初不以古今彼此而有間也噫雲雖無心而孝子則有心也雲之孤飛亦違顔之有似也狄公望雲於一時圖而詩之則非一日之可言矣豐城鄔烈翁氏純孝士也游宦汝蔡間母以老故弗獲迎養而思慕不置因命善畫者作白雲孤飛圖諸大夫士從而詠歌之來徴序余嘗令其邑知鄔君之孝稱於人人故序而不辭熊太古詩集序豫章熊先生太古以其詩之集二授弼一曰燹餘一曰熙真燹餘蓋兵後集失而僅記其舊作彚爲編熙真則先生嘗避兵龍虎山得道家丹經玉訣之學因寓興於冲虚髙逸之表者也弼讀終巻則嘆曰古音邈矣猶幸於先生之詩見之集中詩多五言燹餘巻端數十首真有漢魏作者家法熙真若干首綽乎晉人之風於景純之游仙子昻之感遇相頡頏後先者也夫四言肇於唐虞而盛於周五言昉於周之行露等篇而盛於漢魏晉宋七言權輿於張衡之四愁魏文之燕歌而大盛於李唐之世然漢魏以來五言七言皆古體也至唐則流於聲律而爲近體矣然則五言本三百篇而漢去古未逺作者固當以是爲準的也余嘗謂詩爲文之一而與文並立雖體製不同而同歸乎古文無古人之氣骨則不臻於雄渾奥雅之妙詩無古人之音節則徒爲穠纎靡麗而無温厚平易之懿矣詩體與世變相乘必光嶽氣完然後可以復古周漢之世氣之完也氣完則音完然後可爲治世之音燹餘之詩作於元之盛時熙真之作雖當變故而寔我皇明開一統之初也氣完音完宜其詩之渾和雅厚無愧古之作者詩不可必世之傳而世不能不傳余於先生之詩有以必其傳而世之傳之有不容遂已者矣故因先生自號合名其集曰巢雲而書此於巻端琴隱軒序古之隱者不暇擇其地惟即所處而樂其常焉若尹之於耕傅之於築吕之於屠釣百里奚寗戚之於飯牛君平隱於卜子陵隱於山孺子隱於市伯倫隱於酒君復隱於梅夫暇擇所隱哉身之所處樂之所在也後世若伯牙之儔蓋善琴者也其志在髙山流水子期知之子期死而伯牙遂破其琴噫琴趣得於己知不知在人何至於破琴乎吾惟自知吾趣不求人之知而與琴俱隱可也胡君朝輔雅志好琴嘗蓄琴一張於書軒之内閒居獨處或鼓一再行以自適趣初不求人之知也因自書琴隱於軒之前楹請予説之夫君子之道惟自修於内而不計於外故視内者重則視外者輕而凡用舎窮達無所徃而不自得伊吕之徒固皆以此自樂其樂也下數子者亦豈能外是以爲心哉琴有道之器也朝輔而知好之固足以見其性情之正矣自知其趣其厚己者歟不求人知其薄人者歟君曰昔陶潛琴無絃豈有望於知音者哉吾將以陶爲師故以琴爲隱也朝輔文定公裔孫常用薦爲校官今以親老授徒爲養無復仕進意人多其行云望雲軒詩序昔者狄梁公仁傑登太行見白雲孤飛曰吾親舎其下悵望乆之雲移乃去後世孝子行役宦遊於外思慕其親率以望雲爲故實而名其僑居之舎夫亦寓其思親之切有不能自己者爾然余嘗謂望雲而指親舎則所望猶不甚逺若親在數千里外而亦以望雲爲言則其情尤可悲矣予聞狄公懐人也於太行爲近故雲在望而親舎亦在望蓋目在雲而心則親也心之所思深則目之所望逺而况於近乎秦川張君與賢謂弼曰某來京師將及十寒暑而親老在堂弗獲一歸省每登鍾山望孤雲則吾親舎瞭然心目間信乎古人先得我心之同然也因名吾僑軒曰望雲庶㡬目焉少慰吾心焉耳朝之大夫士有知予心者咸爲詩而歌之先生幸序其端嗟夫秦川去京師僅數百里子之望秦川之雲亦猶狄公望懐州之雲也雖未得奉晨昏候温凊而音問之易達甘㫖之可致視親舎之逺者其於夢雲之頃心思之切又當何如也其心旌之搖搖者盖將與雲俱徃矣與賢之望雲豈非同是心哉與賢盛名方起異日躋膴仕食厚禄輕輿迎養日在親側以怡以愉至是則雲不必望軒不必名詩不必作可也林登州集巻十三
