body:
  text: 林登州集卷十七明林弼撰記燕坑朱氏􅈞峰祠記􅈞峰字子方備萬其子也仕至大學士叔服備萬子也仕至興化敎官今縉雲縣丞敬業叔服子也家必有廟而郷先生歿得祀于郷所以崇孝而廣敬也祀於家親親也祀于郷尊賢也親親尊賢父師之道立矣豐城朱氏自洞雲先生家學已有原委􅈞峰先生又從㑹而濬之至備萬君涵渟衍迤益湥以宏君思世傳有自建堂以祀其祖洞雲翁父􅈞峰翁又推而及於從祖雪澗碧泉月澗翁郷之人士以數君子之徳之學淑其祖若父以及其子孫義難專祠於家因命其祠曰精舎時而致敬藏祀視舎音式萌禮有加焉備萬既自記之而搢紳韋衣之士又序而述之矣弼竊謂備萬之建祠葢祀於家之義郷人士共祠焉則固祀於郷之意也備萬不敢忘親親之孝郷人士不敢忘尊賢之敬使夫後之人目擊而道存孝敬之念愈傳而愈逺是舉也有三善焉故為書此于諸作之左聴雪篷記天變化而成象日以暄之風以散之雨以潤之凢有聲色之可接者皆人之所共聞見也然所遇之時不同則耳目之所接者容有異焉日或畏其炎也風或畏其寒也雨或苦其浸滛也然於冬則為愛日於夏則為凱風於及時則為甘雨莫不喜見而樂聞者亦人情之常然也乃若雪之為物𤣥冬之寒沍六隂之凝結其容栗如其氣洌如固衆人之所同畏也而君子則喜聴之聴之於竹樹聴之於窻户無不可者而必聴之於舟之篷也何哉葢景之至清者莫雪若而雪聲之至清者莫篷若君子之所取其在於斯乎予友豐城劉君伯序謂弼曰吾嘗隆冬歴彭蠡過匡廬泊舟五老峰下遇雪大作湖山綿亘萬頃同縞夜卧舟中雪紛披撩亂撲篷之聲淅淅焉灑灑焉若春蟲之食葉石泉之落澗欹枕之頃魂夣俱清因思王子猷命舟訪戴安道葢不異於此時而景與心㑹清興之發自有不容己者宜乎後世尚其風致而以為美談也繇是心不能忘因名吾齋居曰聴雪篷子幸為我記之予謂伯序嘗歴舘閣出守外郡泝長河浮滄海其聴雪於篷下非一矣于斯時也必曰天其以是為豐年之瑞乎吾民或有不免於饑寒者乎其心固惓惓以國以民為憂也今乃隱約弗見而以聴雪為意豈遂忘向者之言耶抑予所謂所遇不同而所接有異者耶君曰用舎出處各有其道用而出也則為嚙氊之蘇武坎墉之李愬舎而處也則為袁安之高卧孫康之映讀是雪之聴在此猶在彼也隨遇而安君子奚擇焉予曰是可記矣請為子書之竹軒記物之異於常物君子恒有取焉者以其有比徳之益也蘭異於草者也而屈有取焉梅異於木者也而逋有取焉菊有取於陶蓮有取於周亦異於水陸之華也蘭於君子之修潔者有似焉梅於君子之清逸者有同焉菊之與蓮於君子之特立不汙者有况焉其取之也固宜今夫竹之為物也以言乎樹則非梅之倫以言乎草則非蘭之儔以言乎華又非菊與蓮之朋也君子抑何取於是哉豈非以其心之虛類君子之體道乎其節之直類君子之秉操乎其色蒼然而不可干類君子之嚴威儼恪乎在易震之象為蒼筤於方為東於徳為仁君子之比徳舎是孰先焉詩人美衛武之徳必托喻於淇澳之竹而惓惓言之然則物之異於常物非人之異於常人者不能與也廬陵彭君雲從作軒竹間萬玉森繞晴碧彌望客至輒清坐亹亹忘去因為題曰竹軒間請予言記之予惟彭氏世以儒業顯君揚聲臬司克振祖風虛以體道直以秉操儼焉恪焉有君子之容葢於竹比徳而與之相友益焉者也雖宦遊江海而於竹軒每不能忘夫茍有得於竹則竹我為一目之所接雖無竹焉而竹固寓於吾心則身之所履何適而非是軒也哉夫是之謂不滯於物不膠於迹而徳益以充矣雲溪堂記雲間佳山水而三泖為尤勝世家望族亦惟泖中為多曹氏其一也其族有曰子章者給事中書禮曹嘗謂弼曰某世居泖湖吾父嘗即湖曲作堂五楹以為宴息之所某兄弟讀書其中毎佳賓清友亦於是燕集焉堂前臨于泖雲影溪光氤氲鬱勃上下交映於是援琴作水雲之曲溪聲泊㶁相和於几席間塵心俗慮為之一洒故名之曰雲溪兵餘堂廢吾懼無以繼先人之志也重作堂於舊址今茍完矣先生能為予記之否噫子章可謂能子矣書曰厥父基厥子乃弗肻堂矧肻構子章其肻堂肻構者歟夫茍堂之不構則雲溪之景無所攬結固將望雲而有陟岵之思臨溪而有逝川之嘆昔之樂緒皆將轉為悲端矣子章思其親而新其堂則雲溪之景存而親若存者非徒為觀眺之勝而己余老矣倘得乞身以歸遊於七澤三江之間尚能登是堂以賦雲溪之佳勝以繼𤣥真子江湖散人之遺躅君其許之否乎清安堂記吏部尚書李君奐文名其所居之堂曰清安間謂弼曰吾以是名堂雖得於偶然亦有取焉者也子幸繹其義以記之庻有契於予衷也弼曰君之名堂其幽且遐者固非弼所能知然以弼之所至言之則不能無説而不知於君之㫖有合乎否也夫清則必安不清則不安也是故心清則體安氣清則神安思慮清則夣寐安此一身清而安者也父子兄弟夫婦舉盡其道則家政清而一家安矣卿大夫士各盡其職則國政清而一國安矣推而逺之莫不皆然君性樂易善容物而介然以慎廉自將所至而人安之敭歴中外且十餘年寵辱不驚也喜怒不形也物我不較也其中之所存者湛然若水之止也皎然若鑑之明也葢本源澄徹則湍瀾無自生體質瑩浄則塵垢無自入故隨所處窮達休戚吉㐫禍福皆所不計也然則清也者其安之本與君子居是堂也即其髙明正大之域則所存者清矣於是而伴奐優游焉則所居者安矣存之清其近於主一之敬者乎居之安其近於安宅之仁者乎敬以守之仁以行之道不外是矣君其有取於此乎君曰吾之所取者堂之清而身之安云爾而子推言之詳其義為益廣矣幸書子言以為記退思齋記四明張君起鳴言於博陵林弼曰昔予讀書山海間嘗名齋居曰退思或者病予學之弗力而行之弗勇也敢求子言記之庻得栝羽鏃礪之益焉予曰心者思之官也學必思而後得行必思而後善力於學矣不知退而思之則無得於心勇於行矣不能退而思之則或害於事今子優學出仕而慎思之功亦云熟矣奚庸予言之贅哉姑以仕之當思予之同病者為吾子諗焉夫一心之存甚微而事變之來無有紀極一或不思則自失之悔不可復追吾思有益於上則怨已歛而謗讟興矣吾思有益於下則事不集而譴訶至矣予每病於是公退之頃未嘗不黙坐以思而忘寢食也吾子亦嘗以是為思否乎位卑則思稱其卑位高則思稱其高是身之所處無適而不思也思而不出其位則吾之分内者得矣自外至者我遑思之乎哉子幸退而思之以為進而有為之地無徒學老氏之思退而置其身於無所非刺之域也起鳴作而曰請書此以為規龍岡書舎記距姑蘇城西一舎許有山曰天平其隂為龍池塢山水之佳秀至是而萃其勝焉周君長聞葬二親於塢中不忍舎其松楸以去而又愛其山水之勝也即墓傍隙地作室若干楹兄弟讀書其所因名曰龍岡精舎君用薦躋仕中外兄允中留居舎中他日長聞謂予曰某也二親之葬宰木拱矣兄弟廬墓傍讀父書朝夕之頃展省墓下若親猶在也今焉游宦四方萍踪梗跡毎興霜露之思則龍岡精舎若在吾目子幸為我記之噫讀父書於家固難矣讀父書於墓尤人所難也記曰父没而不能讀父之書手澤存焉耳夫先世積書固有望於後人之能讀也朝焉夕焉目在書而心在親葢有悠然之思矣若曰吾讀是書立身行道當以古人自期待庶於吾親無忝而顯揚之可遂也矧夫墓以藏親之體魄孝子之心毎慕戀而不能忘焉先儒嘗論墓祭非古葢恐後世重於墓而輕於廟也然終不能奪人子之情而墓祭不廢焉周氏兄弟即墓而廬即廬而讀書以不墜於先業可謂能子矣鸞誥推恩賁於泉壤龍岡之山川草木亦當為之增輝改色霜露之感母徒多思為也君名備繇和順令歴兵部主事今為通政司經歴以廉慎稱其政本於學云野航亭記南靖邑大夫朱君元賓作亭雙溪之上縱横僅丈餘板為周堵篷代上茨流水在門青山在牖退食與二三客嘯咏其中曰是非舟耶因題曰野航或曰取杜詩語也或曰朱君有山水癖曩為游洋今更南靖皆山水邑得山水之勝惟舟為然此亭所繇名歟君曰客見吾之容矣未見吾之意夫人之生也若浮焉則此身亦一舟也矧游宦海之中泛焉東西南北之不膠譬猶虛舟之四觸未知所底吾思有以濟人之渉顧以野航之小所受不大則所濟幾何吾惟盡吾方之攸遇者耳非敢過負重以取危也彼有萬斛之舟貯積既重篙師不謹悠然自放於無涯之淵而曰吾舟則大其卒覆溺於風濤者比比也吾實有創于此故名吾亭以寓戒焉予曰嗟夫凝焉而下至大而厚者地也而天與水實負之地亦一大舟也山嶽﨑焉而不重河海融焉而不洩萬物之無不載庶類之無不育也惟所受者大故所濟者衆也君子法地之道誠以為舟仁以為檝義以為㠶檣則將以大舟大受而大濟矣豈有向者覆溺之患哉書曰若濟巨川汝作舟檝航乎航乎其充爾之大者乎君聞予言走告予曰請書以記遂不辭而筆之持敬齋記姑蘇翟君大年為吏部員外郎予沗在禮曹獲定交焉既而相交益久而相敬益至間謂弼曰某曩以兵亂僑居松江以不能久敬於人故貽累於己幸而免於譴戾因自誓於天務以廉正自處敬以持之不敢或忽故以持敬名吾齋居庶幾事警乎心以自勉於直内之道先生幸有言以記之夫敬之一字惟聖人能安之而無所勉其次必有持之之功然後能知所用力而不失其正也堯舜禹精一之傳湯之日躋文王之緝熈皆是道也顔之四勿曾之三省思之慎獨孟之操存皆持敬之功也先儒嘗論存養之功莫先於敬持敬之方莫先於畏惟畏故敬惟敬則直内而心有所主心有所主則義立而方外事無不宜矣修己而百姓安篤恭而天下平自近以及逺則體信逹順聦明睿智繇是而出事天饗帝皆自此而推之然則持敬之道不既大乎即大年之言葢為接物而發然處友必慎之於始茍為不然其敬葢不能終之者矣大年有懲於前而有警於後宜其持之之功為益宻也雖然持敬之道非特處友為然也凢其一政一令之施一言一行之發非敬孰為之基本乎大年能以主一無適慎之於内整齊嚴肅謹之於外使其心常惺惺收歛方寸不容一物則持敬之功至而聖學之至可馴致矣弼所言者先儒之緒論也故不敢不詳及云質軒記棠谿之金其在鑛也頑鈍黝黟不異砂礫然其質則美矣及乎鎔錬之精為鼎為鐘為尊為敦為鉦為鐸飾於罍飾於瓚飾於冠冕飾於簮珥其為文也非一焉崑崗之玉其在璞也粗糲渾淪不異土石及乎琢磨之精為圭為璋為琉為瑱為帯為珮飾於輅飾於鞞飾於瑚璉飾於几杖其為文也亦非一焉詩人之言曰追琢其章金玉其相葢謂文非質不施質非文不形必有其質之美而後有其文之美也是故善自治者恒於物而有得焉内而以忠信為先則質立矣外而以禮文為後則文著矣聖人知穴居野處之不可以常也故為之宫室而有榱題節棁之飾焉知汙尊抔飲之不可以久也故為之燕饗而有籩豆罍爵之飾焉君子知其然也故質而不過於文文而不勝其質禮樂必先進之從奢易寧儉素之守則質而不俚文而不華斯可為彬彬之君子矣於乎錦繡之麗終不可奪布衣之文膏粱之美終不能外菽粟之味何者常者可恒而異者不可久故也吾友蔡君以彥文為字而别號質軒請予記之予惟彥文以醇雅之質篤實之學謹行檢而善文詞文固未嘗勝質也而惓惓自省惟恐過焉葢知文質之兼舉而以君子自期待者也彦文年四十餘始用薦出仕方將發揮其文以黼黻治平之盛母徒以質自諉而遂藴其素也林登州集卷十七
