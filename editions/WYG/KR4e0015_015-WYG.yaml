body:
  text: 林登州集巻十五明林弼撰記隆夀法濟新寺記佛氏以無住爲宗惟無住故能無所不住而爲常住成有懐空視同一相無所住之體也法界無邉佛身遍滿無所不住之用也至於千賢萬劫不墜不滅則一體一用常住而不窮矣是故乘方便力遊戲如幻不滯彼此不膠今昔而所以成妙莊嚴者綽然無勞吾於臨漳法濟禪寺有徴矣漳大禪寺五法濟其一按郡志寺創於南唐保大十一年興法祖師卿公寔以髙行大德開山建幢刺史林侁為建刹宇曰普和隆夀院宋乾德三年鐂從願移建于保福山之左改院爲寺更名法濟元初委爲瓦礫迨貞元間主席月湖得清始即故址建寺規制復舊仍二名而兼稱焉至正丁未陳友定併閩八郡改築漳城小舊規十二三截寺于城外寺隨廢僧徒栖栖不知所歸住山佛心普照𤣥悟大師聞極覺聰亟白于郡府省臣曰象教國所崇信棄寺而廢之恐非初意也乃擇在官之屋與地復於寺得前右丞羅氏故宅焉漳既内附指揮副使劉公僉事尹公知府潘公通判王公寔來開衛與府咸加意佛法維持其成於是即堂為殿三門法堂香積集皆因舊搆而位置之若天造地設佛祖隂相有非人力所及者既而像三世佛及諸天執法金剛神種種華勝既成規緒爰集海衆禮舎利塔資報恩凡爲三晝夜觀者如堵相與言曰羅氏辛勤十年以成此室一旦化爲大覺之宫豈非佛力之𢎞有以轉而移之耶然非維新之朝衛府一二大臣克蹈靈山之言則聰公之志亦不得直遂矣今兹八風不動金剛山蓋自有不偶者而非適然也聰公間謂予曰法濟寺自五代及宋以至於元考其遷置凡三矣庸詎知元季之徙新朝之成得易於其難獲全於其闕是不可無紀予目其事可辭筆乎余聞善觀法者以世間法觀世間法不以有為無為而生欣厭夫亦視其所遇者何如耳聰公以無所住之心達無所不住之用而終成常住之業卿公為法於前聰公繼興於後寺在是則法在是矣宜有述以諗來者庶幾兹寺興復之顛末而前績之未紀者得白也於是乎書漳州新建府治記洪武戊申春漳州始入職方其年八月潘公某奉㫖錫印來知府事既至視故府治􅚰蠧陁剥嵗乆弗葺埀就頺壓慨然曰惟國家奄有海内邉隅既靖不以某為匪才使首政兹郡所以嚴尊威聳觀聽者寔於是焉繫撤舊為新我其敢不力然役大費鉅吾不忍勞我民也方與僚幕議所以便而諸禪僧羣來言曰兵餘民困公幸垂念邉人之福也吾教以慈悲閔世為事而吾徒荷國之休食土之入時有升斗之贏敢不心公之心思所以佐官之費而代民之勞府治幸責以成無煩公慮也公義之允其請於是緇徒雲集鳩材聚石舟運陸輦咸爭勤趨百工既衆羣能畢效前建㕔事後爲燕堂翼以推㕔幕司中門外表四周堧垣並作具舉凡爲屋以間計者三十有五以楹計者若干㕔事髙若干尺廣若干尺燕堂髙如㕔事而廣加三之一焉門之髙視堂殺若干尺宏厰嚴邃不侈不踰諸侯之制斯備矣始事於是年十二月明年三月告成帑不知費民不知勞公私胥慶焉公以某受㕓屬邑知搆興之顛末也命記嵗月竊惟府治政化之所自出新之凡以爲民也爲民而勞乎民宜夫仁者之不忍乎此也古之所謂賢守令者亦曰能於民事處置得宜而已公於蒞政之始惓惓以䘏民為心故是役之興不勞其所勞而勞其所佚其勤渠黽勉出於中心之不容己者豈非公之處事有宜而其愛民之誠足以感孚於民哉傳曰上好仁下必好義予觀於此尤信公字師道維揚人繇南昌守來爲是郡其問學政事中外推先云贊是役者通判王侯禕經歴魏君建中知事孫君希賢任役僧曰玉梅月庭皆集勞可思豐城縣改建東嶽廟記岱爲五嶽之宗在昔天子巡守祭告必先焉凡聖哲封禪祝釐揚烈亦惟有事泰山於他嶽則未之有聞後世祀禮寖繁山川之神臣庶通祀無禁以岱嶽於方為東在德為仁赫乎有神導和弭沴生物福民咸有賴焉於是有大生仁聖之號而行祀遍天下矣豐城縣舊有東嶽行祠距東闗半里而近元至正庚寅邑人熊世宏以己資施建也舊為田每嵗春夏之交水潦泛溢殿寢輒浸數尺卑庳溽溼神不安棲復經兵革壊而不葺上雨旁風門背通衢過者忽焉㒺或加意洪武辛亥春弼忝承上命以吏部主事來知縣事首謁祠下顧瞻棟宇撓腐傾仄懔將壓矣方議撤而改建已而寢堂先頺亟命木工掇其遺材益以新材度地祠西髙亢明爽先建寢堂四楹屬予以誣至京既得直歸始遷正殿易其撓腐正其傾仄門廡闌楯相次完美正門之傍東爲佐神祠四楹西爲靈槎三王祠四楹則其舊址也繪飾肖像煥然一新邑人喜曰神棲之寧也民福之成也雖移其舊實新之更也盍亦紀其嵗月俾後之人有徴也肆惟皇上敬禮明神誕降德音嶽瀆祝號皆復其舊若稽古昔罔合典禮不正之祀悉禁而郡縣嶽祠巋然獨存深意蓋有在也政之所先在于成民而後致力於神弼於是廟所以遷建之汲汲者亦曰上體敬禮之意下祈順成之福而已春秋常祀不書是廟之遷固無足紀然以熊氏建廟無紀懼其終冺冺也故不辭邑人之請而併書之好古樓記好在七情得其三喜愛慾之謂也凡人之好必以正不得其正則性鑿而慾勝矣好音者易以淫好飲者易以沈好劒易以暴其氣好鏹易以移其心𤣥德之傑而好髦叔夜之曠而好鍜阮孚之通而好蠟屐是其情未免有累於物與許繇之於水謝安之於山王猷之於竹淵明之於菊其好在是豈其累在是與抑亦因物以寓其樂也人之好不同故有舎金玉而索之乆弊以爲古者薄墳典而求之隱僻以爲古者厭宫室之麗而好巢窟矯籩豆之文而好汙坏果得其所好之正乎善好古者不泥於古之跡而在於古之道則雖今猶古也雖寓於物而未嘗滯於物也吾友戴君安國學古心古行古爲詩文又古即所居西偏作小樓題曰好古中置古琴一張古書若干巻每風晨月夕撫琴數曲怡怡乎遊心於黄虞之上既執巻窻几間琅琅誦讀雖祁寒暑雨不廢蓋好古之道而得其正萬無向所謂數者之失矣雖然道未易言也君能於琴之音而考於古之所以淳漓則於世變之汙隆而知王道之盛衰矣能於書之言而考夫聖賢之所以授受則於心傳之絶續而知聖道之明晦矣信而好古好古敏求吾夫子之教也君於此而加勉焉庶幾於道可以深造矣安國朂諸宿雲房記予來温陵獲與明極上人爲方外游明極假予榻小小室中視其壁則竒畫古墨也睹其几則羣經百子也仰而瞻其前楹則宿雲其名也予曰異哉子之名室也今夫雲山蒸則騰膚寸而合渰焉浡焉以覆八極者一瞬也倐而生忽而歛若未嘗有焉亦孰得狎而窺之哉今子欲以尋丈之室而爲雲之居語其大則無方之可極也語其小則無體之可即也若然子雖欲强雲之宿亦不可得矣明極曰子之言理則然矣非有得於予心者也當其山雨初霽石林猶潤殘經已收微吟未穩予於是援不借之屐倚楖􅀈之杖徜徉笑傲於甕牖之下觀是雲也觸石而生凌岫而出悠悠盈盈相對俱忘雲無心我亦無心也予不知予之宿於雲抑雲之宿於予也下視浮世白衣蒼狗之態漠然無有於中則室雖不雲而予心亦雲也子幸賁我以跡我之跡其尚心我之心哉予因詰之曰大而無方者其萬法之有與小而無體者其一歸之無與倐興而生忽歛而滅其一切有爲之幻與子之心殆在此而不在彼與明極笑曰得之矣作宿雲房記似無軒記温陵吳君希貴名其所居之軒曰似無或問其所以名君曰以吾觀之凡世之所有皆似無耳富貴有時而窮勢力有時而盡生死之同原憂喜之聚門福禍之相根曠情大觀皆謂之無焉可也遠者不具論姑以近事觀之琛珠犀象之積金玉朱紫之華灸手可熱而㧞山可移者吾亦屢閱其人矣曽未旋踵化為虚空是可謂之有乎抑無乎博陵林某聞其言走告之曰子之言固達矣然懲於事而不勉於道不㡬爲二氏之歸乎吾聞聖賢之緒論矣君子惟知夫在己者重在外者輕故已雖有而不自有外雖有而嘗若無有焉多而若寡實而若虚乾乾焉孜孜焉道之所造恒若有所未至才之所施恒若有所未周夫如是則在己者益修而在外者益可薄故富而不靡貴而不侈則不自知其華顯矣勢而不恃力而不忮則不自知其盛強矣而凡生死憂喜福禍隨遇而安皆若無有此君子以無自居故能以無視物也舜之飯糗茹草若將終身焉袗衣鼓琴若固有焉窮而下視窮猶無也達而上視達亦猶無也己之所有猶曰無之外之所有我遑有之乎哉然則以無觀有固爲所見之髙而視有似無尤爲所造之實也君以是而自勉焉則用舎行藏安於所遇而内外交盡者可馴進矣希貴謝曰吾之寓意也淺而辱子之教深矣幸書以為記清暉軒記己酉秋余來京師天台錢君允一亦被㫖持其先武肅王鐵劵以來與余同寓所獲朝夕徃還焉見其神觀散朗言論雅確不矯不比信乎世美之克濟也間為余言其居之前隟有軒曰清暉瞰池為屋池袤餘四百步屋十數楹面十子峰雙塔並起倒影下照山寺樓觀歴歴在竹寺空翠間而小固大固二山後擁傍列與江水相為環迤郡城山水之勝於是焉萃吾日盤旋其中獻竒競爽應接不暇殆忘寢食雖車馬喧囂邈若無聞也因取謝康樂詩語顔以今名子不吾棄幸有言以記之余以其交之新而情之殷也弗敢辭夫天下之佳山水亦多矣而大江以南惟天台稱最若華頂之峰赤城之瀑其秀蔚竒絶不可具狀枚述山水之清暉在人心目者亦云著矣然而風巖雲壑深窈幽迥之濵世傳為至人異士鍊形導氣者之所居其説茫昧荒誕君子所不道也古之隱君子者在市廛不為狎在山林不為絶惟其適而已矧於闤闠之中而得泉林之勝若此則夫樂之有恒視彼深窈幽迥可蹔而不可常者抑相萬矣孔子曰樂山樂水唯仁智者能之君以世家之胄鉅公聞人咸樂交游之少折節可得榮遇而乃隱約自甘思以清白世其文獻達焉而無滯安焉而不遷其於仁智盖有得矣宜其有得於山水之樂也夫仁智有其實則英華發於外猶山水有其實而清暉見於外也昔者武肅有國吳越錢塘湖山皆覆以錦山水之暉可謂盛矣君能以清白世之吾知清暉之發允一固有得於山水而山水將亦有藉於允一矣武肅諸孫惟天台之裔為宗亦唯其族為盛五王之後顯者非一人是軒實相府之積慶堂遺址云歸樂軒記曩余令豐城嘗識邑士范孟偉氏知其樂隱約薄榮利而不欲奪其志故弗薦也今年春有㫖凡郡縣官率舉一人登於銓曹孟舉遂被薦來京師銓曹簡閱將授以官孟偉以弗任辭允之弼叨職儀曹孟偉來言曰某幸乞歸得以自適於肥遯之樂將以歸樂名吾讀書之室先生幸為我記之昔陶靖節澹泊世味不競仕進然猶不能不為彭澤一起到官四十餘日即賦辭以備述其歸田之樂蓋知其不可爲之時而心有不欲爲爾今子際聖明之世風雲𤣥感可以出而有爲矣何爲一出而遽歸乃遂以爲樂耶孟偉曰僕野人也鍾鼎之味至美也而吾安於藜糗軒冕之章至榮也而吾安於韋布廟廊之巍峩車馬之紛華非不可慕可羡也而不若蓽門圭竇桃杖葛屨之爲安惟安於是故樂於是歸而遂吾所安庸詎知他樂之足移吾樂耶予曰噫子固知歸之足樂而未知未歸者之不樂也必渉於不樂而後知樂之真足樂耳夫仕則百責叢焉簿書之積也牒訴之繁也徴需造作之急也緩則譴呵至亟則謗讟興思患捄過雖寢食不寧其於樂何有哉孟偉歸矣僮僕之歡迎親朋之情話南窓容膝之易安東園日渉之成趣壺觴遣興琴奕消憂寧有減於陶之樂哉顧余髮已種種而歸未有期聞孟偉之歸樂不覺怦怦心動矣怡萱堂記萱有宜男之名故爲子者托以爲母之義焉古者於其所尊所親不敢斥言詩以桑梓言其父母離騷以荃蓀比其君其託意於物奚特萱爲然哉此廬陵蕭必明氏怡萱之所以作也必明早喪父與弟必安事其母於定省温清之節甚謹既而必明以吏事爲天官掾每惓惓焉思其母不得歸養因以怡萱名其奉母之堂來謂弼曰某給事銓曹亦既有年母也在堂已鶴髮矣詩不云乎王事靡盬不遑將母予深有感於是也子能爲我記之否嗟夫予與必明蓋異地而同情者其曷敢辭昔予奉母於白華朱蕚之堂有怡萱之意焉今别母數年矣菽水之歡賴吾弟朝夕之養方知毛義之檄不及老萊之衣也子之賴於必安豈不同予情哉但萱微類也非朝夕灌溉不足徵人力之勤親一體也非承顔色養不足盡人子之道子之以萱名堂而以怡名萱也意在斯乎記曰孝子之有深愛者必有和氣必有愉色必有婉容怡萱堂之名殆庶幾也夫今聖天子以孝治天下行當與子乞身歸養以遂怡萱之樂樂則生生則惡可已也書此爲記子其然之否必明作曰是可記已林登州集巻十五
