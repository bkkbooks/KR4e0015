body:
  text: 林登州集巻六明林弼撰七言律贈謝元初秋山高隠圖漫遊晚嵗厭紅塵歸去秋山看白雲煮石呼童供鶴料寫經留客換鵝羣鑱收林藥西風老火養爐丹靜夜分二十四橋多月色玉簫還許世人聞題嚴州陳氏㑹慶堂堂名㑹慶意何如四世公孫此共居松桂蒼顔凌雪霰芝蘭玉樹秀堦除彩衣稱夀盈尊酒緗帙懸籖滿架書千載君家遺澤在一江春水遶桐廬贈公恒歸天台紫薇省外姓名香白鷺洲前别意長祖餞謾勞冠盖集賦歸莫待菊松荒攜尊與客行花逕采藥逢仙坐石床軒冕浮榮成底事從君分種水雲莊梅溪詩為蔡宗𤣥賦溪上寒梅雪作花溪前流水玉無瑕意行東郭先生履來訪西湖處士家煖入孤根春映帶清涵瘦影月横斜何時攜取芝山酒共載賔朋泛釣槎陳子高之永新丞浙右才名陳子高㡬年給事滯銓曹五花誥上墨猶濕百尺樓頭詩更豪縣郭春晴山入座江湍夜漲水盈篙知君自有剸繁術訟牒何愁事若毛安溪劉令復任楊栁條青漸長芽刺桐葉緑已先花河橋送客春將半山縣休衙日未斜政蹟行書循吏傳歡聲重動野人家多情石筍江頭月載酒何時共釣槎送聶克敬歸省待宦三年客帝鄉違顔千里念親堂朱樓翠閣天光近碧嶂清光野望長汀館春深官栁暗橋門雨過穉芹香懸知調膳多餘暇松下看書坐石牀題方壺王維詩意圖能詩羽客方壺子解冩高人王右丞幽興不隨流水盡閒心長伴白雲層空林積雨迷苔逕細浪生風失石稜坐對畫圖懐别業南山千仞碧崚嶒題鄧氏澗亭澗濵亭子有餘清盡日泉流遶舎鳴雨檻維舟投釣餌風窻拂几汎琴聲沙頭白鳥尋常見石角蒼苔取次生最憶考槃真樂趣浩歌一曲濯塵纓李教授之臨江鄰邑豐城曾製錦清江碧嶂慣維舟送君千里敭文教老我三年憶舊逰酒釀黄精雲外洞詩題清竹水邊樓前修范杜遺風在從此西邦化魯鄒胡氏讀書樓胡氏書樓建水濵讀書樓上念先人牙籖萬巻痕誰觸手澤百年跡尚新風前闌檻芸香滿雨後庭階草帶勻三復蓼莪應灑淚孤雲漠漠水粼粼橋市樓八年兩度使炎方萬里關河兩鬢霜逺賜璽書隨趙尉重題詩句笑劉郎伏波臺上風烟古如月江前草樹荒屈指西風明日到官船歸去又新涼次張敬修雪中趨朝春雪漫空竹樹低紫騮愁濕錦幛泥光騰玉殿迷銀燭凍合金橋失絳霓已擬典衣沽臘酒何如擁被聽晨雞東風先到溝前栁無數寒條拂水齊權氏寓思樓先壠星源已草萊高樓極目楚天開無窮山色連雲起不盡江聲送月來遺愛百年存舊樹豐碑十丈滿荒苔聞孫還肯興堂構落日登臨不用哀送侯同知之漳州有引洪武十一年春有旨凡在有司率舉賢良一人予友日新氏丞鄜之鹿川知侯君其之賢貢于天官遂擢漳郡同守夫國家任官惟賢是用有司承命惟賢是舉蔣君之舉有得人之名同守之任有稱職之賢吾邦得守為疲民之幸弼也有三喜焉故為序而詩之郡丞新命下金鑾雨化隨車衆所歡邊戶近開鹽課少上胥應放役程寛雲生栁渚風聲動霜入梅花月色寒十載未歸頭已白為君中夜一彈冠送鄭景賢邑教歸金華葬母故人别我金華去嵗晏天寒江水氷二弟已膺烏府薦一官喜自鱣堂升洞門繫馬花如海山館開尊酒若澠自愧麥舟無逺恵佳城為想碧崚嶒倚李伯康使君韻鐵甕城南飛羽檄錢塘江上趣琴裝梅花有句留山驛薏苡無珠出海鄉飯白鄰僧供火米蠣肥溪友薦霜房歸來細說閭閻事月滿薇垣夜正長海上水天空濶浩無津物外神逰夢裏身晚望每嫌山色逺夜聽已厭浪聲頻仙槎路熟星河使戎馬憂深嶺海臣思獻江都二三䇿漢庭埀意驗天人呈克明縣尉長帆破浪出南溟天際成山一髮青上國重來觀壯麗東州近喜洗羶腥儒冠未際風雲㑹神劍常衝牛斗星尊酒宜春樓上月也勝細雨夜然燈次韻王克明三首經國于今賴海漕况供玉食敢辭勞九重天闕連三島萬斛風舟等一毫楚客多愁飛石燕秦皇無計叱金鼇何如太白清狂態醉臥江中宫錦袍其二江嶺孤臣抱寸忠風雷何日起潛蹤海連遼碣八千里山隔燕雲百萬重近喜金灘湧鸂鶒舊聞緑水泛芙蓉自慚㸃額桃花浪每羨神魚作應龍其三共泛滄溟不共船風檣浪楫若追攀篷牕相憶又今雨柁屋同看非故山身世已如逰物外氛塵只合出人間維梢活水知何日買酒燒魚一破顔予遊武夷道經三山買舟西禪浦值晚雨投宿山寺中寺僧杞巗義剛曲相欵接因書此詩以證後㑹江雨蕭疎山日隂蹇驢有客入禪林老僧能叙三生話逰子空悲千里心野鳥啼來山竹裂洞龍飛去水雲深多情九曲溪頭月何夜相從抱玉琴贈杜明之入京阿父清名聖主聞佳兒氣岸復超羣玉堂久索歸山槀畫省重稽涉海文馬飲盧溝秋水滿帆開碣石暮雲分故人天上能青眼謾説邊籌可䇿勲次達子升清明感懐韻暫停不停風撼樹欲收未收雨閣花一百五日寒食節二千餘里逰子家朱雀橋邊少語燕黄鶴樓下多鳴鴉人生有酒莫滴土無錢且向西鄰賖次馬編修奉别韻送客東城春又半暖雲收雨散輕隂一江流水傷南浦千樹啼鶯憶上林錦里烟塵詩句好鑑湖風月酒盃深玉堂歸去多清興好對鼇峰整舊琴題方漳浦自述詩後弓劍間關虎穴危雲霄浩蕩鶚書飛禁門㡬聽晨鐘入鄉邑爭看晝錦歸春草青邊鹿茸長秋橙黄後蟹螯肥男兒老大功須立晚歳漁樵願未違畣越僧津斷橋禮遍名山未肯迴乘蘆又度栁江來烟霞直欲窮幽趣梁棟從教棄散材詩骨寒林千嵗鶴道心流水一枝梅憑師問訊維摩病飛錫行應上五臺奉次徐梅所知司謁龍江精舎之作臨漳自昔號淳厖天遣明公莅此邦幸有清尊開北海豈無涸轍待西江紅依幙府才應屈白戰詩壇氣未降珍重龍門振遺響洪鐘從此莫㣲撞用韻述懐有客丹心一寸孤都忘身世在江湖十年澤國多戎壘萬里雲霄渺壯圗夜雪蕭齋紅榾柮秋風楚畹緑蘼蕪杜陵老大長憂國謾歎乾坤一腐儒次林茶溪經歴韻員嶠層層聳翠峰碧雲片片擁丹宫客來欲問飛騰術仙去應叅造化功天上風雷雙劍底人間日月一壺中共看靈雨農郊足已卜今年歳事豐再次林茶溪經歴韻奉姚省吾博士笑解腰間老太阿半生事業總虛過歸來元亮存三逕安樂堯夫有一窩濁酒盈缸春可漉清詩滿袖夜猶哦東風似勸山翁醉吹落花前白鷺簔贈新溪金如山劍江西畔老耆英眉夀將逢八秩齡車裹蒲輪當有召琴彈花縣毎能聽志崇天爵頭如雪世問滄田眼似星毫末不藏心地直時煩矍鑠到公庭題江山萬里圖我愛錢塘輒醉翁江山萬里在胸中應憐逺道頭先白却冩新圗思不窮鸚鵡洲前春草暗鳯凰臺上暮雲空登樓莫遣悲王粲天外鄉關咫尺同題張櫟里為曹景溫畫雲山圗十年蹤跡在塵埃每見雲山笑口開萬壑晴隂連竹樹一天秋色入樓臺畫圖此日勤持贈茅屋何時隠去來惆悵無因尋舊侣桃花流水似天台送酒一壺與張櫟里臘醅新熟泛霞紅持慰山中輒醉翁須信㣲醺真樂在也知少飲衆歡同梅花紙帳春生夢榾柮齋爐雪滿篷無限衡門攜幼意菊松三逕老秋風金陵贈友人玉帛徴賢出草萊孝亷船向北風開縱然車馬爭馳逐何似田園歸去來菽水堂前衣戱綵雞豚社裏酒盈杯白頭誰念思鄉客强寫新詩對鳯臺鐵柱仙翁騎鶴上天去一柱千年屹未傾鐵色不隨闕大江平蜃樓縹緲烟沈浦龍劍凄凉月滿城九鼎鑄金魑魅遁後來誰繼禹功成贑州贑州驛下艤輕舠芳杜幽蘭滿近臯水合雙溪飛駕濶城依列嶂畫樓高百年中土歸圖籍萬里南天振羽毛吟眺未䦨還解纜凉風細浪晚颾颾南安道原書院道原洙泗接濂溪一脈曽分横浦西爼豆百年存舊典圖書數巻破羣迷池蓮晚色紅衣淨庭草春香翠帶齊我亦沿流伊洛者㡬回極目楚天低庾嶺石稜左右山將合澗響東西水自分通道人思唐宰相提兵誰識漢將軍滿林梅熟黄埀雨夾道松高翠拂雲嶺徼秖今畿甸似逺人敢憚往來勤清逺峽飛來寺清逺峽前暫維楫飛來寺裏己張燈兩崕雲起晴如雨一水風生夏欲氷文犀贔屭失金鎖鐵鳯翺翔低玉繩帝子軒轅不可問聊題詩句記吾曽贈通事官阮勲落魄安南老象胥曽隨京使覲皇居青衫小職羣公後白髪高堂九秩餘甘㫖毎愁官俸薄奔趨漸覺世情疎興賢有詔來南服燈火新凉課子書次蕭文煥教授韻聖主龍興大有為乾坤此日摠清夷南郊多士聽新詔東魯諸生習舊儀海角亭前休對酒岳陽樓上好題詩西風一葉梧江櫂千里懐人入夢思答莫季龍羨子乘槎南海上逺從牛女問天津殊方入貢梯航舊上國歸來冠盖新雒粤文風興此日雞林詩價重行人懸知江路頻維楫處處疎梅破小春鄭節婦仙舟不返淚河枯誓死持家為報夫牀下問姑晨饌具機傍課子夜燈孤門依慈竹金書掲庭列崇蘭綵服趨太史行編貞節傳清風千載滿三衢廣州江亭次熙陽太史韻不斫蟠桃駕大杠謾移蘭櫂泛蒼江山光入野連桑海水影浮雲上竹窻幻枕何人尋舊夢洞簫有客換新腔蒼茫詠罷成長嘯天外飛來白鳥雙謁張文獻公祠開元賢士張文獻落落長才際盛時滄海明珠知價重秋風白羽嘆恩衰兇徒已破生前膽鳥道何勞死後思半畆鄉祠金像在薦芳請誦八哀詩謁余襄公祠慶歴名臣余諫議堂堂正論出清班一封霜簡晨趨闕萬㸃風旗夜度關遺廟丹青近韶石故家文獻盛閩山錦袍紫槖光相射猶似當年上國還和韓南勝四首之二髙堂晝日坐鳴琴滿地棠梨散緑陰白雪陽春空下指青天明月是知心陶公避俗從沈醉杜老憂時更苦吟無限扁舟江上意洞簫嫋嫋有餘音其二落地男兒總弟兄一時傾盖若平生宦游老去應無意訪舊重來更有情野寺攜琴惟伴鶴溪堂丸藥忽聞鸎樂栽松桂林中讀安得從公一結盟南雄太守葉景龍政成入覲相逢江上繫蘭橈嵗晏天寒雪正飄駐目帝鄉紅日近關心親舎白雲遙梅花嶺外詩千首竹葉山中酒一瓢握手都門應有約清溪水滿緑楊橋雲石軒為葉彦實賦山骨崚嶒聳碧岑靜看古色氣蕭森竹邊雨過含㣲潤花底烟浮散細陰畫枕可人開醉眼晴軒留客伴清吟襄陽米老真癡絶一日書船駐水潯菊圃西風搖落送秋光野菊猶存老圃香瘦蘂清分蘭畹露寒枝低䕶槿籬霜忘憂且汎杯中物益夀應傳肘後方三徑歸來定何日芳鄰凖擬卜柴桑洪武十年再奉使安南還道經豐城留館驛父老乞留題急筆賦此酡顔緑鬢映烏紗奉使安南去路賒金闕九天承紫誥銀河八月泛仙槎行裝秪有梅花擔載道寧無薏苡車揮翰玉堂知有待五雲深處聽宣麻辛亥正旦呈牛典簿王編修洪武四年是年春除豐城客中兩度逢正旦江上相看感嵗華仙杖遥瞻丹鳯闕官船進泊白鷗沙雪消星石添春水日射香爐散曉霞却憶故園兄弟樂屠蘇酒對小梅花林登州集巻六
