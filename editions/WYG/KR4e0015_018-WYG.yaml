body:
  text: 林登州集卷十八明林弼撰詔賜占城國王詔朕聞帝王之道柔逺寧邇故雖在遐荒皆欲其相安於無事焉汝占城介居西南阻山絶海而奉貢方物不廢常儀頃者使至貢象四枚聞汝守圉安民勤修國事朕甚嘉之但汝與安南分疆劃界自昔而然爾其恪遵朕言息兵保寧勿事紛争天道惡盈不可自溢恐有他譴今賜卿金龍衣三襲旗葢金鼓等物備爾藩國之儀昭我天朝之貺母恃寵榮自生釁端特兹詔示想宜知悉誥贈梅遵祖誥我國家考禮定制凢子貴者必推恩錫爵逮其父母所以崇孝治也榮禄大夫駙馬都尉梅殷父遵祖曩在元季避地姑蘇朕定金陵爾兄思祖灼知天命首舉淮安全城來附爾以嫌疑殞命於呉天下既定論功行賞爾兄分封汝南錫以侯爵朕念勲舊之臣用結姻親之好以第二女寧國公主下嫁爾子殷今特加爾榮禄大夫僉大都督府事於戱死而為國䘏典宜崇魂其有知服兹寵命封梅殷母丘氏誥我國家考禮定制凢子貴者必推恩錫爵逮其父母所以崇孝治也榮禄大夫駙馬都尉梅殷母丘氏賦徳貞淑克生令子尚我第二女寧國公主疏封錫號在禮為宜可封夫人表梅思祖謝恩表具官臣梅思祖誠惶誠恐稽首頓首上言伏于洪武十一年八月内欽奉聖㫖以寧國公主下嫁臣姪殷敬擇本年十月日親迎謹奉表奏期者伏以惟聖作法因天地而盡父母之道惟皇建極體隂陽而立夫婦之倫所以敦敘民彛而化成天下也臣思祖誠惶誠恐稽首頓首欽惟皇帝陛下誕膺天命聿定區宇中外臣民莫不歡忻感戴臣夙興戎伍叨沭寵命闔家百指共食天禄慙無涓埃之補報祗懐日夜之戰兢乃荷聖恩不以臣姪愚庸特命公主下為伉儷自天之錫何地以承吉辰在邇謹用奏請至期令姪殷俯伏闕門之外恭聴恩命下情無任瞻天仰聖激切屏營之至謹奉表以聞箋梅思祖謝恩箋恭惟皇后殿下貞静之徳端居宫闈肅雝之徽協成皇業一人有慶萬國咸寧誠母儀於天下也臣某猥以匪才夙從宸御東征西討僅立寸功地厚天髙濫竽峻秩日夜乾惕報稱無從乃今特荷聖恩錫命公主與臣姪殷下成伉儷榮出望外吉辰伊邇謹令姪殷届期詣闕門俯伏以竢恩命尚祈中聴庶達下情臣無任感激惶恐之至謹奉箋以聞頌大祀禮成頌有引皇帝臨御大寳立南北郊以祀天地齋明肅恭度越今古而聖衷猶有所未安若曰朕為天子則天地實大父母也父母異堂豈人子孝養之意在昔漢世合祀天地光武重興亦仍舊典自後或合或分議論紛紜然禮縁情制教可義起不若合祀為宜於是建大祀殿於國之東南以洪武十二年正月十一日行合祀禮删繁文而就簡慿明徳以薦馨先期五日上齋於武英殿天時方雨及祭之夕隂雨開霽風霧不興牲醴潔芬樂舞合節神人交暢聖心悦懌以為祭祀必盡其誠者凢以為民而已故古者有孟春祈穀之禮今大祀既行和氣斯應皇天后土實鑒臨之其所以福我黔黎者於是而有其兆矣過此以徃年豐榖登休嘉洊至是皆天地監一人之誠而錫萬民之福也大禮慶成羣僚班賀臣某忝職儀曹謹敘實録復拜手稽首而獻頌曰聖皇攝籙中立作君乾父坤母事之惟均南北有郊起自周禮圓方之丘隂陽是儗古不必泥今不必拘惟情之當惟理之須於惟聖皇天徳天位議禮制度睿斷㧞萃曰子事親豈異其堂合而祀之禮意始彰惟兹孟春育物之始矧朕之生實天之子載燔載烈惟徳為馨上下昭格有神有誠天晦而明氣鬰而豁肹蠁之通無逺弗達靈貺大來十雨五風體信逹順物阜民豐微臣作頌用紀盛美埀而不刋國有信史漳州新城頌帝式九圍文恬武嬉曷生昏狂虐流毒滋維漳南鄙孰非王土修我墉壑將固我圉藩臣用憂以屬能賢曰汝稔改宜知所先相彼故城墉低壑堙髙而湥之盍圖其新侯曰民來根本斯在暫勞久逸力爾無怠載經載營子來孔殷鞭石山積畚土雲屯懲彼寛瑕務小而堅崇堞言言壕流淵淵土功既成邊人載寧外侮不驚侯實我生髙為侯徳湥為侯澤保障之功徳載無斁贊墨仙贊龍圖畫鳥跡析人文宣資爾力十八公孕爾躬仙之儔文之宗𤣥鶴舉遺玉杵咨客卿蹈前式廣成子贊崆峒之松作爾靈夀杖崆峒之雲録爾長生書惟清也故形不勞而外舒惟静也故精不搖而内腴此其髙出物表久視人區千二百年容不悴而神不枯者與逹泉贊泉之始達猶性之端達而不息則一派之微必放乎四海端而能充則萬化之大實本乎一原是故盈科漸進而君子觀其瀾睟面盎背而君子探其根葢有本者如是爰取辟於斯言朂哉三近泝流窮源殆將涵泳乎聖涯澡瀹乎心天以至浩浩而淵淵者與了野贊人生兩間天地而小中立作配惟了當了翳人之生有哲有愚愚非或損哲豈有餘塞也吾體帥也吾性體歸其全性復其正是謂之了不怍於人不了其了實愧於天了之云者奚取於野千里一目了蔑加也謀野則獲同野則亨了指其實野寓其名彼昧面墻懵焉株守知擴而充八荒户牖老了其虛釋了其空我了者誠大本不窮卓哉爾翁克全所有敢誦贅詞書之座右簔笠翁小像贊有引石君履道為南臺諫史涖郡湖湘值撫州兵亂得野人簔笠自蔽間行免好事者圖之博陵林某為之贊曰章甫縫掖爾之常被豸冠繡衣爾之素志胡為青笠緑簔與樵漁而為類葢其中之確也雖笭箵襏襫其於處變如處常其中之澹也雖衮冕繡裳不知孰賤而孰貴矧矛㦸之匪職實簿書之攸寄結纓死難仲由有傷勇之名微服過宋孔聖得時中之義此其自决去就潔而無累豈若擁數萬夫之衆制數千里之地臨難則茍免見害則必避耶易道初小像贊野服角巾翛然出塵孰可儗倫伊昔之人志道之志味道之味天爵是崇孰識其貴涂府史王山卷贊維昔君子於玉比徳曰仁與義温潤而栗玉藴於山旁達孚尹徳藴於身輝光日新矯矯涂君温其如玉璆琳瑤琨細大並蓄如山之産取之不窮崑崗藍田仰止崇崇人命是名我求其實琢磨所資他山之石朂哉玉山企髙可齊我庸作詩以繼白圭牛典簿像贊以所藴之敷而為清温之容以所存之正而有凝逺之風睟然其神澄儼焉其貌恭玉堂之署方寵承於天藻匡廬之山未寒盟於雲松吾求于古人之中其將無同也耶坦然贊為袁兼善作君子之心惟循乎理理根於心施於四體中無愧怍外自安舒平平蕩蕩曷有﨑嶇嗟彼小夫心為形役内省有疚戚戚朝夕城府湥密險以自防孰若坦然物我兩忘對面九疑荆棘是履孰若坦然康莊千里我車既堅我馬既閑羊腸詰曲曽不改顔朂爾袁君守坦勿失允蹈聖謨永保貞吉傅夣賢小像贊有粹其容燠乎陽春有澄其神澹乎秋旻身焉紛華之塲心焉幽寂之濵扇可以清四海之歊琴可以返千古之淳惟思修潔之在我寧知富貴之迫人行審像之是求罔俾專美乎先臣廛隱贊有引金陵李思問居京城之南而自號曰㕓隱葢居於㕓而不役於㕓者也愽陵林某為之贊曰謂廛非隱有隱者存心在塵外遂忘囂喧衮衣繡裳我樂韋布豹胎麟脯我樂蔬素豈其棲遲必於衡門豈其寤歌必於考槃屑屑錐刀嚚嚚狙儈我目所接非心所㑹廛非逺地隱豈湥藏不磷不緇無迎無將北山移文終南㨗徑身在林藪市朝心競君子出處依乎中庸無徃不返聖訓之從箴周伯章寓齋箴遇與不遇有義有命隨其所取順受其正行法居易以俟天定不迎不將無違無競用舎行藏訓守前聖敢効輔仁敬告司聴張士進知愚齋箴民之初生禀殊質異有哲有愚知之為貴哲人先幾克全其天愚而能知曷間後先萬委赴壑千蹊適邑及其知之合殊而一我知我愚雖愚必明日月經天氛翳廓清駔驓小夫鑿知自任具曰予聖其愚孰甚知愚非愚百倍其功不自滿盈無逺弗充朂哉士進真知篤信希顔之愚庶幾令聞銘湥省齋銘君子之學自省為貴省之之湥常存敬畏反已自飭豈暇尤人有過必改易怠以勤匪一之省繄百與千是謂湥省無適不然匪暫之省慎終於始是謂湥省無時不爾惟省之功理欲之幾顔躬四勿孔敎九思孳孳夙興乾乾夕惕憂不如舜恐蹈於蹠省之於身實省於心内省不疚居安資湥先民有言要在慎獨敢誦明訓敬告司僕知止齋銘維皇降𠂻明命有赫民受以生均此明徳虛而直内靈以應外水止鏡浄瑩瑩不昧衆牿於形聖明則不推而新之厥初遂復事理之極曰至善域明已新人此其標的相彼黄鳥猶知丘隅矧伊人矣而鳥不如聖有明訓惟理之窮既知於始斯得於終唯知正鵠一矢貫革惟識郊關跬歩適國涓涓流泉汨汨趨池未至不止既止不移君子察物日新不息可逺在兹銘言無斁思貽齋銘為呉允思作人心之官所職者思為善不善思則得之矧為孝子奉親遺體舉足不忘必慎厥履孳孳趨善思以顯揚必果於為實親之光不善之萌恐致親辱為必不果免淪顛覆翳爾之思斯親之貽戰戰兢兢庶以全歸惟允思君克蹈於善舜蹠之間毫釐必辨作堂銘名目擊道存豈伊自警將裕後昆蒙也作銘述於古訓孰為我師繇參入舜拙菴銘為中書徐徳敬題大巧若拙不恠不竒惟爾之拙匪愚匪癡葢其中之存也不求異於人其外之施也不求矯於時人方役役我則泊焉而無為人方喋喋我則昧焉而不知過於文吾寧守其質過於盈吾寧守其虧葢將全太樸於未散敦淳風於未漓其亦陶柴桑周濂溪之等夷者歟適安齋銘維人之生貴在適志茍志之適斯安之遂桓圭衮裳駟馬髙車富貴累人貧賤不如繩樞甕牖羮藜飯糗既適既安此心曷疚濳也歸來容膝易安起居無時愿亦歸盤茍得吾樂千金弗易心之所適有介于石卓哉東魯不忮不求樂天知命我心不憂有翼齋居允乎自足述此銘書敢告司僕正心齋銘為李思問作心為思官必得其正正以内存外者斯定凝冰焦火淵淪天飛心為形役司失其機其機不失主一無適修己治人胥此焉出天君肅穆居于靈臺事之有道念哉敬哉習静軒銘為泰和鄧崇雅題萬動擾擾人心遞移孰司其機静以自持即物觀理必於其止靈臺湛然秋月寒水習之之方不迎不將直内以敬無隱弗彰爾氣既完爾志斯定成艮出震仁義中正昏黙窅㝠所習則非静養動察聖賢同歸湯氏舊笏銘有引呉湯氏槐木笏一宋度宗朝賜進士暉老公故物也公登第未久而宋亡元世宋士多出仕公隱約以終曾孫完寳藏其笏兵亂不敢失昔魏謩有祖風而鄭公故笏以存完葢幾焉為作銘曰有笏惟槐槐有赤心我笏則木我之寳也如黄金賜言之存手澤之芳用雖未究而世美則長笏不忽祖徳述翳人之求尚徴夫故物三友軒銘有引禮部主事甘君友諒清介不忘交植松竹梅於軒前曰松之心也正竹之節也直梅秉詣孤芳而獨潔舉不以歲寒而變其素守是即吾三益之友也因以三友名其軒博陵林弼為作銘曰益友有三直諒多聞君子取友責善輔仁既資諸人復接夫物所友則殊所益惟一爾松之貞爾梅之清爾竹之直三益作朋曰予未知於焉比徳時發其英不改其色詩歌有斐語記後凋騷雖不録曷掩昭昭既錫爾名將求爾實朂哉歲寒永保貞吉崇志齋銘有序吏部尚書陳君彦名儒術飾吏事起家為法從歴兵吏二部以才名稱嘗以崇志名其齋居朝之公卿各為詩若文以廣其義某謂君之志崇矣志於顔孟以進其道徳志於伊周以勉其功業則凢富貴利禄桓圭而衮裳茵坐而鼎食明珠兼金寳璐大貝舉不足以動其心何者其志不在是也既論序之復為之銘曰立志必崇勿為卑下卑下之趨乃無志者所趨既髙所培既厚泰華崇崇眼空培塿一簣弗止百仞可齊有志竟成跬歩以躋孟明焚舟司馬題柱志在功名道徳奚取伊周顔孟我志聖賢下視衆人天壤相懸君其崇之企彼前哲徳業顯融百世昭晣林登州集巻十八
