body:
  text: 林登州集卷二十明林弼撰志銘故象洞巡檢墓志銘昔晦庵朱文公以道學鳴漳士及門而得其傳者二人曰北溪先生陳淳安卿東湖先生王遇子合皆為髙第弟子北溪篤道恬仕不逮華顯東湖繇胄監躋甲科歷國子博士常州守終大宗政户部郎中有論孟講義兩漢博議行于世户部生羅源令仲訥仲訥生京學諭自明自明生天德韜迹葆和不急榮利與母陳氏以儉勤樹門第君為天德冡子諱永字子長夙承大母若父之教敏慧知讀書通經史大義不屑屑事浮藻生子曰璘治舉子業弱冠中堂選人謂王氏書種有自云當至元戊寅秋畬民作亂冦郡邑君義起民兵從大將進討以功授武平縣象洞巗巡檢至官未數月則蹙然曰吾家自户部公世以儒業顯未嘗有以武功授官者巡撿職卑而責重所治事皆盜賊刑名輕重疑似於是焉兆一或失詳獲戾斯大吾幸得祖父之田與書而耕讀之歸養吾親教吾子亦足樂也烏用微名為哉即其居之西偏築室數椽環植竹木日哦其間客至輒置酒歡洽盡情或有無不計也夜聞子璘讀史傳有葬不必厚之言謂曰我死汝冝法此又數日無疾而卒將絶泣顧其母楊曰兒負兒負君生在至大戊申十二月十五日卒在至正戊戌八月十八日葬在是年十二月十八日合窆先配陳氏祔户部公塋子璘與女瑛之壻陳元宗皆從子遊同來請銘辭不獲銘曰學之積而卑官為爾職德之厚而中歲為爾夀不豐其施克全其歸其亦曷悲益齋王先生墓志銘先生諱吉才字伯謙號益齋其先為光州人唐季從刺史王緒入閩宋建炎中五世祖始遷于漳祖德元而上皆居龍溪之施浦父國子教授諱東之再徙郡城是生先生醇謹方質篤志古道尤明典禮甫冠由諸生試直郡庠太守張公知其有身心之學延為弟子員師日端坐黌舍襟佩傍侍側側屏息不敢遊目視帶履執經質疑則俯就樂誨和氣見容色尋以省注教寧德安溪二邑邑陋學廢至輒廣宫宇嚴奠祀揖讓跽音忌兩膝著地跪也起士悅民嚮漳學門廡圯郡府委董役事先生考制審禮列戟肖像翼然有嚴循資升廬峰山長丁內艱去官以教授公老無復祿仕意參司移狀大府乞優注鄰郡便侍親庭再任泉州學正未幾教授公亦卒家居閉閣讀書罕接塵事月吉必造郡庠陪舍菜禮丁祀臡呢脯葅果非涉先生手陳主者不敢以祭天性孝敬親終皆及期耄已且老哀慕痛毁有如早喪雖在家庭亦冠衣斂容人未見其遽言怒色蓋古所謂典刑君子者安人李氏淑慎有儀內相家法以成嚴整生子男三人文興文昌皆恬雅好禮克荷世業文亨先卒女二人長適尚書顔公曾孫順卿次適李彌光亦為名族孫男三曰仁濟曰仁慈仁惠女五先生生甲申歿癸巳安人生辛巳歿後先生三月至正戊戌十二月十八日合葬龍山之原文亨瓦棺祔焉先葬期來乞銘唐臣夙聞先生言論且辱世契銘曷辭銘曰敬於身不怍於人孝於親不愧於天嗚呼是為先生孝敬之學埀于後而不泯者歟梓堂隱君墓志銘隱君鄭姓諱文材自號曰梓堂大父而上失譜紀無考父曰富母邰氏生隱君於前至元乙酉長為張氏壻生子男四人曰觀曰延曰興曰新女三人觀生孫男四曰德明智明信明女四延生孫男一曰崇女四興生孫男一孫男一曰祥女五新生孫男二曰順泰女二德明生曽孫女三義明生曾孫男一曰城智明生曾孫男一曰瑶至正丁酉卒于清丘里居卜以己亥正月壬寅葬孤觀泣遣義明來致言於博陵林唐臣曰藐諸孤將葬先君有日矣光諸幽者非得先生銘不可幸銘無讓惟隱君生逢令期死終令命本蕃條茂逮見孫曾好德樂善之報實於是焉驗傳曰德言足聞豫於銘曷辭隱君性質諒不矯弱年孤苦亹亹克樹立勤耕力學以為家訓子孫遵承唯謹凡服闕授徒之人悉為公蓄吉凶有傋衣食有給一門四世雍愈無間鄉閭信而化之當畬冦陸梁所在被脅從逆隱君戒鄉人曰所貴於為人者知善惡逆順之判也來爾子弟能從吾擊賊吾當為爾結堡聚糧以待賊至不然吾寧死不能事賊以求活也子弟咸奮曰唯翁命既結堡而堅糧聚而實賊悉鋭攻堡隱君故開堡門以示整暇分民兵乘堡固守别簡㨂同精勇出擊賊矢石雨發賊知堡不可破遂解去事平郡府上其功版授以官輒辭曰某所以拒賊者初意不在是謂觀等曰清丘密邇諸畬吾幸義率里人獲保雞犬若由此而徼官賞脫復有警賊將仇我而構禍未巳爾曹惟勤爾耕力爾學圖所以起吾家者不徒武功之足尚也九月戊子出唁親友徒還坐中堂集子孫於前曰吾覺吾力已盡殆畢命今日旗山之麓吾所生也精爽是戀其為吾葬所母惑流俗用浮屠治喪語畢正襟斂容而逝嗚呼生而潔其身死而正其禮弛張有道俯仰無愧古所謂隱君子者殆不是過已宜為銘銘曰翼翼梓堂昭昭隱德子孫克訓鄉閭是式人規商利我教勤耕人媒武功我教明經草帶生庭禾箱滿谷彼慕其榮我被其辱孺子食力德公遺安千載清風頑廉鄙寬旗山之原鑑塘之滸過者下車隱君之墓故逸士林君墓志銘吾林自西晉之季黃門侍郎𨽻公南遷為閩中族姓第一石晉天福甲辰涅公再徙同安嘉禾里鴈塔山蔚為望族埀五百年譜牒兵燬不能詳矣然代生賢裔不墜厥世以克衍于後猶有可徴者存也當宋季江南被兵文獻凋落殆盡國子教授許友國公獨能自樹立於屯蹇之餘娶司理陳公女是生逸士諱天祥字時若常司同安常平倉不屑升斗樂自韜晦與漁樵伍會鄰賊掠其里公避地來漳余得敘宗誼知其中寬夷而無迫隘之度外和易而無燥矯之容上焉則交孚其誠下焉則各得其欲每惜其德之豐而位之嗇也時之亨而身之否也邑再有警公率里人築堡捍外侮耄稚賴之至正甲辰六月五日以疾卒得年六十有八里人哀悼如其所親公先娶安撫謝公女孫生子震敦武校尉浯州鹽場司令繼娶尚書顔公女孫生女妙安適敦武校尉江西行省理問官羅章內外榮養晚福方隆竟止中夀是又足深惜也謝氏女二人長適胡次適葉皆士族孫男六人女五人公卒之明年十一月壬辰葬於里之龍湫山先期來請銘厥事先大父北山處士及聞髙祖評事府君實自鴈塔遷惠文山距唐臣僅六世猶在袒免下列雖微且鄙然於銘也何敢辭乃為銘曰長林鬱盤三子遺孱忠孝所傳世久愈蕃博陵象賢建公闕田忠揚若藴孝感若攢不忝厥前後澤是綿禾島之遷昌五百年慱士自奮公成其先積深發茂理不爽天子賢壻貴牙緋相鮮死不亡矣隱猶顯然龍山之原吉其叶旃過者肅焉逸士之阡竹泉胡君墓志銘至正乙巳五月二日胡君竹泉卒于家其友林唐臣走哭之曰天乎學焉弗見施才焉弗見試吾猶幸吾友之夀庶其行之可以望法于一鄉也今復奪之天果可責報而取必哉惟君昆季之賢人士咸樂交遊之而於鄙父子彼此忘年相與特厚故豫知之惟湥將卜葬孤元陽以銘請嗚呼豫其忍銘吾友耶豫其忍於不銘吾友之賢耶遂敘之曰胡氏為漳望族君為胡氏佳子弟諱觀智字愚中父德齊公諱南孫家法峻整母顧氏既早喪父以其三子之相㕛也為不繼娶君承顔侍膳朝夕不離側曲順親心父卒事兄如父母對客立侍終日雖小事必咨而後行族中弟姪歲時候問雜遝滿前年及五十猶不敢以父兄自居雅性沉重淑慎容止雖歡飲至醉亦反反顧禮物雖見忤愠色不見延師接賔意在優厚不計有無讀書講道務益身心不尚辭藻營小軒於屋南日斂膝靜坐清泉翠竹相對忘言因以自號云配盧氏先卒生男二人元陽其長也元益其次也女三人君生丙辰卒年五十十二月七日與先配合葬原曰纒紫銘曰守不失身施不失人嗟若胡君君子之倫嗚呼百世之下欲知其行者尚徴此文岐山陳君墓志銘君諱元善字長卿先世居龍溪縣之蓬洲再徙馬岐山復遷白石而岐山仍稱焉五世祖諱世英與北溪先生淳為從昆弟以儒業名家生子曰剛宋贈承事郎承事生沆登宋端平六年第歷官朝奉郎臨安府通判軍州事朝奉生渺登宋咸淳六年第授潮州法曹參軍未官而宋亡法曹生南軒處士諱桂娶楊氏生三子君其長也君生簮纓仕族無紈綺浮薄之習能以詩書濟其世禮訓肅其家誠厚信其鄉修容山立而身若不勝衣內美玉藴而口若不能言生子光逺邦逹光迪邦道皆知學好義邦逹嘗中閩省堂選君子謂陳氏所以能不墜厥緒者以有長卿承之也至正丁未海壖軟平聲逃兵作亂岐山距逆境近賊以君信於鄉欲先脅之以為人望即君至曰能從我即汝生否則刀創剚頸矣君罵曰吾所畏者義不知畏者死汝賊豈能久生耶與其配郭氏及三子皆遇害邦道在郡城得免於難嗟夫世之言不撓其節類非柔者能之君退然一儒生而罵賊以死奮無所避有若萬夫之雄何哉理明於心辭正於義故也而郭氏死夫三子死父其倫理之懿舉無愧矣埀絶猶續孰匪天耶君生庚戌死年五十有八郭氏生丁未死年六十有一女一人適郭復生孫男女皆三明年戊申十一月合窆岐山之麓邦道來請銘銘曰維學之正必勵於行行之所難處變而定順生既孝義死亦命一門全節古孰與競勒銘幽堂埀示無竟艮翁楊先生墓志銘歲戊申閏七月八日儒學教授艮翁楊先生卒於清漳官所其孤奉訓大夫廣州治中董度奉柩歸葬溫陵既有日來泣拜言曰先君與屯田經歷公交久好篤某復辱與子遊實世契也敢以先銘請辭不獲命則志之曰先生本董姓諱相孫字敬在上世餘杭人曽大父世興宋朝議郎同安監稅大父君選元從事郎潮陽縣尹幼孤從母鞠於楊既而以楊入官遂不果復董姓父伯淵泉州蒙古字學正母吳氏楊氏先為華隂人徙泉而益顯一門登第十有六乂有諱汲者官至户部侍郎四世曰宣教府君諱進德實鞠潮陽者其世次之可知者若此先生始以諸生為泉庠直學再補石井書院能公出納斥貪鄙以嚴正自持升仙遊教諭復學田之侵於豪右者凡若干畝攝縣事明邑民因爭殺女之誣部使感其言嘉嘆不已察甲弟毆嫂墮胎之妄甲兄受其教友愛如初轉教長泰為子董度行冠禮升降跪起肅乎恭遜之容而民知所尚朔望講義諱乎身心之學而士知所趨焉為莆學正陳參政陳文龍死事請旌于朝鋟尚書劉後村文集俾傳於世及考行省便冝授建寧路教未上德化縣缺官韓盧公適在省幕舉先生攝其乏時邑在盜先生躬造其巢諭降之郤其裝饋國子祭酒張公翥仲舉薦為儒學提舉而吏部奏授漳州教授張公為翰林承旨復申前薦命未下先生在漳學三年郡再被兵學廟莾為儲胥禮樂之器掠賣于市至為泣下屢以老移退不允則請于大將移兵於它所亟補弊苴缺稍復舊規而廪入在額外者亦實其數于籍其官政之所施者類此先生自童子時學名才譽已聞於人及登釣磯丘先生之門則盡去凡近篤志理學體之於心而誠以立驗之於身而仁以行學者宗之户屨常滿每告諸生曰聖賢之學髙明正大稍涉於卑汚偏駁則終於小人之歸為文章平實古雅務以理勝不事藻繢嘗以舉子業一試有司不售即棄去此先生為學之正也天性孝謹質諒父疾籲天減年割股投粥及卒哀毁逾禮負土營墓廬於塜上三年然後歸母喪如父與人交不以久近異情窮通易心初潮陽公歿遺命復董姓先生念其祖之幼孤成立於楊恩不可忘而楊氏無後願加董姓於楊氏之上庶俾二祀不絶移文莆學上郡府以事干憲部不行每於時祭禮必均焉此先生行己之懿也先是嘗得肺疾久而愈劇董度問後事曰吾老逄喪亂獲保首領而有汝在目下復何囑乎言竟而逝先生生己亥卒年七十有文集若干卷藏于家夫人顔氏生子一人董度也女二人長適將仕郎延平路知事林天䘵次適王廷錫亦仕族孫男一謙光女一惟先生之學有得於聖賢之要故行已立身出於士君子之表而所歷弗克究其所藴惜哉雖然生順而無愧死全而無虧其不亡者固存矣銘曰學有要德既邵政有兆仕弗耀先克紹後克肖人是效天不吊遺言皭來者詔逸士蔡君墓志銘漢置五經博士李唐以還士用明經薦由是學者尚專門之業有能博求其師而兼通數經者未始數數見也若玉融逸士蔡君明善蓋有志乎是而不膠於一端之陋者君諱復初明善其字幼頴敏從鄉先生林梅所余大車受書治舉子業既又從進士盧先生諱希受詩晚歲復學易其於三經研究奧旨折衷訓傳能得聖賢微旨士類推先之嘗一試有司不售則慨然曰學貴有德於身心科目進取利以訹人不足為也閉門讀誦風雨寒暑不休羣經百氏以至虞初稗官稗論曲説靡不窮討太守申公延致州庠誘成後進至正甲申閩飢君率里人轉粟廣東憲閫方遏糴君進言曰春秋之義為鄰分災閩廣唇齒寧忍其飢而不恤耶廣為弛其禁粟得逹數千艘閩人以活屬所在盜起強有力者率武斷鄉曲福寧陳甲與玉融陳一挾私怨以兵相嚮禍延齊民君陳其罪於行省得命解之里賴以安性方介寡合然每自信不疑有知之者則相與至篤無異情盧先生卒心喪三年欲為立祠未克如願恆心切焉歲戊申某月某日以疾卒年才五十有二多士惜之祖曰應昴父曰君祿俱潛隱弗曜配曰郭氏生五子長寬早世次曰密實容賔皆知學能文密仕方逮顯女一適陳克敬孫男四術衍衜衛卜以某月某日葬某里之原實以某夙好於君也來請銘既哭而言曰君子之施視其力所至不以布衣衮裳而自廣狹其心也昔者魯仲連排難解紛而無取趙悅道通商米以濟越飢君之所施小大雖殊實亦庶幾焉嗚呼明善之學僅見於此耶是可悲已銘曰學之豐兮德之充世弗用兮士則宗猗若人兮曷有終林生壙銘生諱旺字彥興今從仕郎潮州路總管府經歷林君迪卿之仲子幼敏而知學長通而習事以諸生補龍江書院吏以能稱母戴氏既喪事父篤謹以孝聞方望其有立也至正丙午正月十九日得病暴卒年才二十有七卜葬崎山之原距母塋一里許先是嘗泣謂父曰母早喪兒仕未通幸大人得七品服法得疏恩於母稍紓兒哀於呼生孝念至此而使不逮見恤典之榮是可悼已銘曰吾林以忠孝傳家何生有異行而不終於世馬婦王氏壙銘王女馬婦性淑慧夫為新恩龎朴士永新其名長小字生子天信女信妹詩書克勤麻枲治有孫光澤嶷且異光國光家又其次年享六帙餘有四丁酉初秋棄人世赤土之原兆佳氣後九月窆下弦值作銘千載幽室賁長林貢士唐臣氏林登州集卷二十
