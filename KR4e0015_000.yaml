body:
  text: 林登州集目録别集類五明巻一四言詩五言古巻二五言古七言古巻三七言古巻四五言律七言律巻五七言律巻六七言律巻七五言排律五言絶句七言絶句操辭詩餘巻八送序巻九送序巻十送序巻十一送序巻十二贈序巻十三集序巻十四集序巻十五記巻十六記巻十七記巻十八詔誥表箋頌贊箴銘巻十九誌銘巻二十誌銘巻二十一墓表神道碑傳誄些祭文巻二十二説解文疏巻二十三題跋臣等謹案林登州集二十三巻明林弼撰弼字元凱龍溪人元至正戊子進士為漳州路知事明初以儒士修禮樂書授吏部主事官至登州府知府弼嘗與王㢘同使安南以却贐金為太祖所器生平著作有梅雪齋稿使安南集是集總名登州蓋彚而輯之者凡詩七巻文十六卷其使安南集宋濂曽為之序稱其文辭爾雅王禕亦嘗贈以詩與之唱酬其墓志即王㢘所作稱其詩文皆雄偉軼宕清峻之語夐出塵表蓋明初閩南以明經學古擅名文苑者弼實為之冠也弼又名唐臣以時禁國號名氏遂仍舊名是弼本初名唐臣乃其改名朱彞尊明詩綜則云弼初名唐臣當由宋濂序謂唐臣更名弼致誤然宋序未嘗言初名也至弼改名既久而原本之首尚署為林唐臣撰則無所取今仍署弼名著之録焉乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:5e8311f8daba94a44c97e38128306b5cb921cdcc869191d037da81ef57be21b1
