body:
  text: 林登州集目録别集類五明卷一四言詩五言古卷二五言古七言古卷三七言古卷四五言律七言律卷五七言律卷六七言律卷七五言排律五言絶句七言絶句操辭詩餘卷八送序卷九送序卷十送序卷十一送序卷十二贈序卷十三集序卷十四集序卷十五記卷十六記卷十七記卷十八詔誥表箋頌贊針銘卷十九志銘卷二十志銘卷二十一墓表神道碑傳誄些祭文卷二十二說解文疏卷二十三題跋臣等謹案林登州集二十三卷明林弼撰弼字元凱龍溪人元至正戊子進士為漳州路知事明初以儒士修禮樂書授吏部主事官至登州府知府弼嘗與王廉同使安南以却贐金為太祖所器生平著作有梅雪齊稿使安南集是集總名登州蓋彚而輯之者凡詩七卷文十六卷其使安南集宋濂曽為之序稱其文辭爾雅王禕亦嘗贈以詩與之唱酬其墓志即王廉所作稱其詩文皆雄偉軼宕清峻之語敻出塵表蓋明初閩南以明經學古擅名文苑者弼實為之冠也弼又名唐臣以時禁國號名氏遂仍舊名是弼本初名唐臣乃其改名朱彞尊明詩綜則云弼初名唐臣當由宋濂序謂唐臣更名弼致誤然宋序未嘗言初名也至弼改名既久而原本之首尚署為林唐臣撰則無所取今仍署弼名著之録焉乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
