body:
  text: 林登州集卷九明林弼撰送序李仲髙歸省序曩余與晉安林伯永同舉進士伯永來為漳參軍余因識其外弟李君仲髙年富而學懋頴悟俊發若矢之括而羽鏃而礪將犀革之深入也又十餘年仲髙復來漳學積而文著閎衍超卓若車之良御駕良駟而康莊之迅馳也余固知其材之適用宜為有司之薦矣既而郡庠禮延以訓諸生部使者亷舉以列教職余又喜有司之公明而無負於仲髙之材矣夫學莫重乎德文莫重於行豫聞仲髙伯氏僑死於漳仲髙匍匐以來道梗喪不能歸買舟泛海間關得逹人服其義今兹捧檄歸省喜動顔色非為仕屈乃為親屈也其孝蓋並稱矣陽亢宗曰學為忠與孝黃魯直曰文以忠信孝友為本豈不以德行實有重於學與文與仲髙孝友施於家者若此使得守官而逹政則移於忠者將有本於益大矣仲髙朂諸送葉教諭歸建序古之所謂君子者不厚己以競名不薄人以計利蓋其在內者重而在外者輕也內者重故難進外者輕故易退禮義之道在是矣建安葉君克明兩以春秋試有司不售樗菴鄭公亷問建邵興堂選得士薦十人克明與焉獲注長泰邑教且上曰是雞肋耳何競也至則代者先矣曰是錐刀耳吾所學者禮義而已禮義以為進退得不得命也聖人之教豈欺我哉浩然東歸無介辭色嗟夫世日下矣風日漓矣寧復有斯人哉小夫賤人簞食豆羮沾沾自吝不讓也不知己之可厚不知人之可薄而惟知禮義之可尚寧復有斯人哉故余於君之歸書此以為願學君子諗送吳彥文使旋序古者鄰國有交聘之禮所以講信修睦同奬王室雖大邦之於小國亦一往一復不廢其常矧方伯連帥之相與者乎聘使以一介行李將其辭命往來者疆埸之間應對之善否彼此之與二繇焉非習禮能言之士鮮有不辱其命而墮其職者也維揚吳君彥文以今浙省平章政事朱公之命來聘閩省右轄羅公於位為方伯連帥於禮為講信修睦於義為同奬王室則其聘非徒為越境私交而已余始見其貌恭而氣和言從而禮度意其本於學也久在寓館恆接論吐知其舊學於景忠陳先生信乎専對之無愧繇於窮經以致用也今年夏聞大兵渡江南征西浙方助糧餉中夜起舞思效尺寸即命舟涉海東歸以有為之才而知急於當為之義彥文亦可謂傑士矣中興有日尚努力以樹勳庸余將拭目君之焰焰也彥文戒行縉紳咸贈以言來徴豫序故書此于首簡送太守陳侯使歸序士君子欲自見於世者夫亦視其所際而攄吾所藴焉耳是故時之泰也則詩書禮樂周旋唯諾而文事以修時之否也則甲兵師旅折衝禦侮而武備以飭孔子曰有文事必有武備武備必有文事士之用也舍是二者將無以為具矣若漳守陳侯希良其殆無慊於此者乎侯以世功襲職泉翼千夫長當承平盛際文恬武嬉兵寢不用侯日與一二縉紳論文賦詩講道議政凡國制治體民情吏習靡不熟考而周悉會所在盜起侯屢策靖亂功升漳州新軍萬户行省臣以侯明於政理檄攝漳守薦於朝乞改文職制授廣東宣慰副使未上復留守漳郡府副分垣黠民或怙勢凌其上侯曰此不可長每抑治無貸事有當言委曲白上官參伍情法不以威讋利怵鄰郡冦橫侯承分垣命率師討之請曰橫者一二耳餘皆善良願無多殺以禍非辜濵危衄無懼色屢凱捷無驕容既再臨郡民信愈篤吏服愈誠雖或科徵調發急應非常民侯焉是賴得免病苦既去百姓遮道齎咨涕洟若慕父母屯兵亂攻漳城既敗而逸省臣謂侯素信漳民遣諭其黨於海上降之民無餘禍夫政之所施在承平則易於著效常法之守也在艱屯則難於立功權變之務也侯以講學之素閲厯之練文足以處常武足以處變故任民社則紀綱舉之御軍旅則紀律明之以賢將帥而為賢師帥傳稱良將有曰悅禮樂敦詩書者矣史稱循良有曰化刀劍買牛犢者矣文武並用以彼較此亦何讓乎漳大夫士述民去思之情以為詩以某常忝郡幕知侯為詳屬序焉聶簡較北上序人情易於履夷而難於涉險知險之不可涉而履涉不避必欲遂吾忠義之願而後已非其志確乎不可奪其氣充乎不可撓鮮不於事變之一再而挫衄矣况於屢而愈勵哉紅賊陷江西豐城失守聶氏義起鄉兵復其地賊仇之併力攻聶氏闔門死焉子浩初君偶免於難十八年起兵再復豐城二十年以經略使者之檄單騎入賊諭其渠帥使降賊怒而義之不忍加害拘縻數月不遣江東軍攻江西敗之遂得間行歸二十二年復入賊境宣布詔旨二十三年又至誘賊别黨降之夫虎之能嘻水之能溺雖愚騃童稚猶知之浩初君非不知虎穴之不可探淵水之不可馮也顧忠義激於心不暇於身謀也浩初以功再轉為西省簡較官今年承省檄白事中書萬里涉海無難色嗟夫白刃可蹈懦者或撓膚於芒刺九折可馳怯者或蹐足於堂亷浩初以忠義為心故能以夷視險雖白刃之利九折之峻無足畏者芒刺堂亷云乎哉豫嘉浩初忠義之士故於其行序此以壯之馬翰林易之使歸序國朝敬禮明神凡嶽鎮海瀆之祀必選清望文臣以代行重其事也蓋牲牢祝幣禮秩有嚴非文臣不能知不知則不肅不肅則無以假神之靈集民之福而副德意之美雖祀猶不祀也矧事神凡以為民則夫使者之出神與民當交致其力也下焉閭閻疾苦之當知上焉吾君聰明之當禆其於廣詢博訪蓋汲汲焉惟恐一有不至以負使之職也非文臣之賢又烏足以稱是哉馬君易之自弱冠知名胄監中為詩有法善以長篇述事誠所謂詩史者中嵗隱四明山朝廷以翰林編修官起之至正甲辰天子以天下多故懼嶽鎮海瀆之祀久曠厥典遣使函香四出代致其敬君實銜命祀南鎮南嶽南海南鎮禮既成遂道甌閩以逹海嶽比至漳聞廣南多警未進適分省右丞羅公新建南嶽廟成有司請諏日具牲幣既新廟望祀既而海冦亦破捷書至論者謂明神之靈默有竒契疆境之復當在此日矣夫三祀禮亦重矣朝廷不它使遣而以命君者豈不以公久寓江南習其士俗民瘼吏弊可以一厯而周知之今易之君不惟采民謠以觀風又能述民風以為詩蓋將以備清問之對國史之録如楓亭女等篇使人痛哭流涕者也宣室前席之問豫知不徒在於鬼神君幸以是詩再拜奉大對南民蘇息當自兹始故於其使歸書此以為序送吕志文歸閩序士有志而能不以流俗易其素斯君子之所與也孟軻氏曰士尚志在仁義蓋己之所尚者有定向則雖窮逹豐約交於前利害休戚戰於中其于去就取舍之際一以仁義為本故能不受變於流俗以成其志若吕志文氏亦庶幾能學而守乎此者也曩豫以章句為童子師志文年十四五嘗從余遊玉潔蘭秀動遵禮度與論事理輒解余固知其所之之正矣軍興十年餘仕者多以武功進拔行伍而登廟堂列郡縣者肩相摩踵相接也有力援者雖身不汗馬附名功籍亦得美官志文則曰獲真盜而得官未為害獲而非真是殺無罪非仁也詭功罔上取非其有非義也退然在諸生中不僥幸於力援部使者有知志文者以茂才薦來二漳學他日謂余曰某辱先生之教不能自勉以成進修之功惟知持初志而不敢渝耳非不知武功之速成文學之難自拔也愧蹈流俗之弊習以負聖賢之明訓故寧守冷官而不知自恤也夫士志道德功名富貴不知纍焉志文知以仁義為尚宜其取舍之明去就之潔也志文教成東歸來求豫言故述君子之所以與志文者以為序代贈唐大年歸姑孰序洪武戊申夏豫被旨錫印開衛漳南唐君大年適令龍溪縣附郭事劇大年剸理有術暇裕而無擾豫固知其逹政之要矣既而代者至大年欣然曰某願遂矣豫怪而問之曰曰某家姑孰父母年皆及耄而不肖與弟永年猥以微名留滯閩中髮種種矣思一見父母而道路隔絶邈不可即白雲之望鱸鱠之思惕然於秋風中亦既屢矣今兹江閩率附道路無梗使不肖昆弟得拜鶴髮於堂下斯實惟新朝之賜也因泣下霑襟有司知君之賢留攝邑乏不可則薦於朝得乘傳以行來告别且請豫言夫君子樂三而父母俱存兄弟無故實願之豈不以其係於天而不可必得歟當雲雷遘屯兵戈滿地人得遂其生聚而父母兄弟之無恙者十不一二見也而唐君八帙二親兄弟五人相隔於數千里外凡厯數十寒暑一旦得以復遂其孝友之樂其視俱存無故之常者抑又相萬不侔矣得非唐氏積之厚而造物者之於善人其報施為特異歟漢制舉賢先孝亷書曰孝友克施有政君之所施蓋有徴矣余聞君令龍溪冦發圍郡城君出竒破強請廪贍乏而城以全軍興供億無匱而民不知勞蓋為政之要設施之熟雖古賢令不能過也有司之舉於是為得人矣故於其歸序此以贈送實庵師使歸序上臨御之元年制若曰自昔有國家者莫不參用宗乘翊贊皇慶蓋其以善導世實於政化為有助也乃錫號開吉曇公為大禪師賜印章視三品俾總僧之政仍名其所治曰善世院云以閩南八郡新入職方寺剎衆而金榖之數猥多擇其可使使行八郡遴其有才行可主教席者以其名聞而金榖之入亦藉之焉於是實菴師奉檄以來周厯博訪必核其實不茍不疏叢林肅然宗風為之一振星軺指漳過余梅雪齋中神清而氣完語圓而意足蓋有得於色相心境之外者間出莆泉諸僧贈詩示豫請序首簡昔者詩人之言為歌謠之風為頌美之詞贈詩固主於頌美然而叢林詠歌之言亦可見釋氏風化一淳一漓之故矣師能兼採民風之謠而考夫善惡之實歸朝伊邇或奉大對而以是陳之斯為無愧於使而所以善斯世者將彼此之交盡矣幸母以出位而自諉也送同安丞劉君赴閩省序洪武二年夏制命中書參知政事蔡公哲行省福建以殿南服掾屬得自選辟於是置屬司之所宜有者擇諸邑二佐之賢攝其官檄下泉郡以同安丞劉君士楨應其選邑之父老聞之羣詣府控以請曰吾丞賢丞也吾儕小人實賴以生省屬雖急掄賢百里之寄獨王事而忍不為民社乎皆叩頭泣下守撫遣之民固請弗去然業以選君不可中改君遂行博陵林弼走送於萬安江上酌之酒而言曰丈夫生世所貴有立君惠民而下信善職而上聞立於此而孚於彼人心之公不容偽為也省屬雖卑事繁八郡君雖百里借將為八郡賀矣幸終始心乎民異日踐華要職愈大而惠愈廣矣俾夫倒懸之民均慰其心是又余之深望也士楨作曰敢不蚤夜以思以母忘子之誨言士楨大族世宦其丞同安屬新附初遁兵亂君喻以福禍盜不忍害既殱盜白大將母延非辜凡有徴會能因人心從士俗事率先集故民慕而愛之上官器而薦之皆其情云送李本仁特告歸覲序今上臨御之年疆宇既一薄海悉庭乃鋭意求賢布列中外以謂文經武緯皆古之規也文治之興賢實其具明詔屢下禮羅益張於是祼將之膚敏巗穴之棲遁咸迪簡明以任官守稽禮象樂治化翕然矣四明李君本仁始以議禮徴至京師復被選纂修元史會今中書右丞楊公行省山西君用薦為照磨官山西兵燹餘畏道萬里而母年逾八帙矣人或難之君則曰王事也我其敢辭焉而得命未必吾母之樂聞也到官數月以使事來即以歸養請宰臣方議擢君清要而重違其情豫告暫歸君則曰得一慰倚門之望亦上之人之賜也大夫士走送都門外各賦詩以華其歸而勉其來博陵林弼作而曰士之所重惟忠與孝故王事靡盬不遑將母詩人必察而述之君不以一命為庳而惟知王事之當勞太行九折之險弗憚於一荐厯王遵叱馭之心也今兹持上賜金帛以奉其親以侈其君之恩綵服登堂歡悅怡愈考叔舍肉之意也夫求忠臣必孝子之門有若君者固足副宵旰之思矣揚聲振節克大厥施以鳴國家之盛尚拭目以俟也羣公請書豫言為詩之序遂不敢遜送羅伯啓之官夔州序今之仕者多起自草野雖文藝間有可稱然類非涉厯練逹之士故其蒞政也昧於設施之術緩急之宜一或擠以重難則色喪而氣沮剛者過暴而民殘柔者過懦而事廢其能稱厥職者蓋千伯之什一也若豐城羅君伯啓則不然君自弱冠已登仕版其於軍旅錢榖禮樂刑政罔不周慮而厯踐之逮入聖朝隱約田里間若無意於世者弼忝令其邑知其通而有守欲薦之於朝已而江西都指揮使宋公辟為司印及考授欣州判官尋丁內艱既終制有司起之復判夔州來言别曰願有以教也噫以君之知學逹政尚奚待於豫言哉夫夔為川蜀要衝民自被兵以來困弊日甚政之所孚貴在綏撫伯啓涉歷之熟練逹之明其於設施之術緩急之宜固有成算矣雖重而難者不足為君慮也公餘訪子雲故宅履八陳舊迹浩歌子美書懷之詩吾知其感慨於前修者益有以黽勉於事功也政聲上聞獲書最考豫於伯啓望焉故於其行書此以為贈林登州集卷九
