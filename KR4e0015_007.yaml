body:
  text: 林登州集卷七明林弼撰五言排律贈别寧義甫率掾二十韻寧子真人傑英年拔郡曹簿書閒吏事弓劒䇿戎勞佛塔題雲鴈神山看海濤短衣寧扣角巨釣擬連鼇阮掾稱三語潘郎嘆二毛薇邊騰鶚剡栁外試龍韜單騎晨傳檄重關夜屬櫜陳雲橫雜遝郊壘破周遭風驥難埀櫪秋鷹待解絛分藩嚴節鉞弭筆逐旌旄西崦烟收瘴南溪雨漲膏芝蘭從草伍稂莠為苗薅緩帶羊公適胡牀庾亮豪劇談方灑灑别意苦慅慅烽火悲橫玉篝燈夢大刀霜橙分紺實江蟹斫紅螯把酒歌三叠維舟水半篙宦情磨鐵硯交誼戀綈袍青眼羣公在丹心寸地操為君懷逺舉天表粵山高贈王同野閫史歸建三十韻聖理濟夷夏邊陲重鎮綏藩臣分節出佐政辟文帷君拔千人傑民瞻一郡師汾河遺澤在滕閣逸才推子佩鏘經席王章肅奠儀堂鱣嘉瑞兆閫鶚薦書馳簡量稱三語清名慕四知濟時行賈䇿論事邁蕭規烽燧猶南國風雲渺北墀登樓粲空賦入幕超能詩退食欣多暇忘機慰所思凉薰榕下榻長日竹間棊細藻流清泮香蕖泛緑池應勞書牘尾未許撤臯比江左陳琳檄淮西韓愈碑文章長叙論贊畫足匡禆已喜才堪試何慚位尚卑驊騮霄漢步松柏棟梁姿天地心如鐵風塵鬢未絲彈冠差可慶結襪詎云癡雲樹連同野家山近武夷蕉書頻日報蘭櫂及秋移椿緑霜中幹槐青雨後枝韋編課兒誦綵袖奉親嬉至樂皆人願微名祇自縻朋簪資麗澤客袂忍分岐荔熟丹砂顆醪香碧玉巵離憂從馬上言贈且江湄瑞世鳯麟覩清班鵷鷺期行哉須努力千古志臯䕫江洞書事五十韻西徼百蠻底南荒三楚邉苗頑風未殄盤瓠種猶傳江自牂柯發山從越嶲連封疆秦日畫威德漢朝宣馬援軍曽駐狄青師載旋羈縻諸洞在棄置左官遷夷獠分生熟懷柔異後先鳥言難白别椎髻費紅纒篁桂深林薄茅茨小棟椽巢居牛畜共鄰處虎狼聨獵野撚花箭涉川刳木船蝮蛇勤執贄雞骨慣占年畬種原頭火村炊樹杪烟兵塵竹子後瘴雨桂花前徑路微微入藤蘿密密延小橋過略彴輕簥送鞦韆象郡通蕃甸珠崕到海壖驛牛無脫轡洞馬不加鞭飲澗猿懸臂吹潭蛟長涎危峰常欲墮怪石久皆穿忍聽歸歸鳥愁看跕跕鳶沙薑長豎指泥蕨細鈎拳置􅧆讎家快挑生左道便行厨避民舍停筯問賓筵近臘縫山罽迎秋拾木綿䕫羵為伴侣麋鹿當牲牷蠻鬼歌堂賽狡童舞袖翩溪翁醉皆倒野婦喜如顛負弩常從犬扳罾或得鯿孰云殊土俗自是一山川白髮知何叟青衣立竦肩送瓜强留客供酒不論錢請說兩江事含悽雙淚漣前朝失政體酋長竊兵權角面桃弧徑魚鱗竹甲堅敓音奪攘時彼此剽掠轉寅緣聖主開𢎞業遐方囿化甄居然列郡縣忍爾黷戈鋋豈料潢池地從觀坎井天羣凶多不逞同惡復相牽春廢桑麻壠秋荒蔗芋田官軍掃氛翳鼠輩委腥膻汚染猶蒙宥強梁詎足憐智高今顯戮孟獲已深跧殘命嗟如線新官幸似弦愛民有元結奉使遇張騫苦語怕終聽同仁賴曲全乾坤新再造日月大無偏嶺徼雖稱逺巖廊正任賢觀風小臣在歸擬奏詩篇贈塔斯圖判府二十韻賢倅北方傑篤生勳德門世皇良將裔林國上公孫淮海新開府開山舊鎮藩彛勳揚日出劍氣射星垣喬木蒼烟古甘棠緑䕃蕃東南集冠蓋甲乙擁旟幡帝軫邊方苦公承天語溫二車方筮仕别駕重疏恩虞坂馳良驥滄溟起大鯤松邊臥歸轍栁外迓征轅良䇿禆軍旅長材任劇繁列槐家澤逺細栁祖風存春雨桑麻隴秋風禾黍原鱷應識韓愈虎亦避劉琨東郭看山榻南樓對月樽調羮需鼎鼐紉佩雧蘭蓀昭代多麟鳯清班簉鷺鵷安車行趣召萬里覲天閽縣尹相公平冦䇿勳賦詩為頌國步艱難際邊陲俊傑生將門餘舊澤相閥藹新聲騏驥駑駘屈鵾鵬羽翼成將軍年尚少令尹職先榮溪北甘棠樹江東細栁營循行及野邑團練合農兵南徼驚塵起西林殺氣橫霜袍當自表雲陳每孤征士畏條侯令民知司馬名指揮秋色動談笑瘴氛清落日喧笳鼓西風捲斾旌歸舟無薏苡吟擔有黃精保障安黎庶勳庸答聖明願言崇令德佳䜟叶承平别胡景昭景昭文學疇昔相好非淺近交冦盜流離偶㑹漳水之上歡洽未久歸思浩然不可援止漫成十六韻寓惜别意昔豫方弱冠與子每同襟躍馬春風早聞雞夜漏深青雲懷逺志白雪操淳音霄漢何寥邈江湖易陸沉卞生勞獻玉直子誤持金典教才終屈為郎力不任艱難愁白髮慷慨見丹心落景山陽笛寒宵楚户砧杜陵憐久客梁父動悲吟日月鴻遵渚風塵鶴在林䇿言疏董賈詩價重何陰小子多茅胙先生寡芥針麒麟圖自古鸚鵡賦還今且對盈樽酒休鳴别調琴桄榔晨霧塞薜荔曉霜侵畏道那分袂離情倍不禁五言絶句題菘菜野老藜藿腸飽知晚菘味惟應肉食人少玩圖畫意題樹萱堂叢萱樹北堂宜男吐幽芳春暉盎如酒庶俾百憂忘題白雲堆空山白雲堆中有隱者居悠然兩無心塵世將焉如七言絶句汥江八景蕉寺晨鐘招提隱隱傍林巒月落鐘鳴漏未殘一夜芭蕉風不靜秋聲相和下雲端吕橋夜月長橋十丈俯江流月色遙連水色秋雲外何人吹鐵笛渾如黃鶴斷磯頭黃村晚照黃家村外夕陽明雞犬遲歸愛晚晴花落閒庭茅屋靜小溪風起看潮生阮浦春潮别浦春潮帶雨來帆歸天際晚風開江干竹樹深如許二阮清逰應未回球浦烟帆珠渚烟晴晚照紅布帆八尺飽西風今宵繫纜知何處兩岸蘆花月色同浪灣雪網浪花飛雪滿前灣舉網輕舟夜不還無限黃州蘇子興洞簫聲在水雲間棠堤春雨雨過春堤塵未乾海棠千樹畫中看汥江江上東風軟輕撲羅衣散曉寒橘塢秋霜水邊林外野人家橘柚秋紅照晚霞何日寄來三百顆先春報汝玉川茶河船口占八首沽河水接潞河渾處處新營失舊村聞說東西兩漁甸年來也𨽻達家屯其二七月既望月更圓蘆花吹雪秋滿船無人共過黃泥坂此客元非赤壁仙其三昨夜江頭秋雨急曉看新水已平堤堤邊紅蓼開無數樹樹相依穗穗齊其四原田黍稌秋埀熟婦子巡防閙達宵但得西成來鼠雀也勝螟螣盡青苗其五憶昔扁舟過潞河埀楊兩岸緑陰多而今野飯維梢處爛熳牽牛引碧蘿其六㸃㸃蘆篷疏雨聲酒魂詩夢有餘清覺來却笑𤣥真子猶向江湖著姓名其七連朝雨急臥不起清曉篷窗試一開水面雙雙輕燕去沙頭箇箇白鷗來其八河中風物無多子鯉鱠蒲羮頓頓供何似蓴鱸鄉味好扁舟歸去及秋風題寒花䳺鶉圖落日秋林竹樹稀枝頭寒雀靜相依爭如草畔䳺鶉樂自啄霜蟲不肯飛題江山臥逰圖投老歸來已倦逰﨑嶇窈窕舊林丘畫圖多謝滄浪客臥看瀟湘一幅秋題子昂人馬圖南風古栁生夏凉神駿萬里思騰驤圉人空爾奉芻秣曷不為解青絲韁題雜畫九首猫內相家中蒙貴兒華堂客至每先知今朝洗面還過耳故寫新圖開閣詩犬乳犬埀頭傍竹門低回似戀主公恩中宵莫學籬邊吠風滿山花月滿村馬玉䇿金鞍絲轡輕長秋隂裏一長鳴爭如此馬無拘束細草香沙自在行鼠熟睡狸奴腳未伸燈前黠鼠竊蓮頻兒曹恐有張廷尉莫太狼貪不畏人龍長樂陳翁畫龍手今君法得古人多嶄嶄頭角欲飛去風雨三江秋水波鴛鴦白石青蒲春水生夕陽錦羽照沙明戲拈畫筆知何處栁外池塘艇子輕鸚鵡隴頭春樹拂雲紅學語聲嬌弄晚風上國秖今辭逺貢莫愁彩羽閉雕籠雙雀珥江驛裏可張羅得食階除任意過應是厦成相賀競銜環底用感恩多喚起林間百舌謾多言此鳥嬌音不浪傳喚起一聲窗外白東風庭院落花天珥江驛口占八首士女填街撥不開共看天使日邊來白羅衫稱烏紗帽坐聽齊聲說泠腮泠腮方言甚美也其二清江十里畫船過落日凉風水不波花袴水軍齊舉棹歌聲唱作馬前呵其三小卒橫挑丈二殳褒衣長帽似臞儒當街一喝人爭避如此威獰更有無其四蠻官短髮皂衣踈江驛時來學步趨歸去休騎割鬃馬底鴉穩臥勝籃輿底鴉繩結肩輿也其五八月􅏛圓山下路顛風捲地雨冥冥勸君莫汲珥江水鬬死魚龍氣正腥俗傳古有熊王女子江山二神爭娶為山神所先至今猶鬬云其六機家舟上女如雲日日機中織縷勤忽見江頭秋月色唱歌聲到夜深聞南人謂綃為縷其七齒牙如漆足如霜紅縷衣裙紫袴襠見客不羞嬌作笑誰家昆艾賣檳榔昆艾女子也其八鸚鵡窗前返照明檳榔樹下晚凉生女郎浴罷清江去不斷秋砧搗素聲龍州十首龍州長夏多風雨山路無時一尺泥今日開門喜新霽洞雲片片度前溪其二山蕉木奈野葡萄佛指香圎人面桃更有波羅甜似蜜氷盤初薦尺餘高其三草閣柴扉傍竹開洞官留客意徘徊盤遮蕉葉攜殽至甕貯筠籠送酒來其四峒丁峒婦皆髙髻白紵裁衫青布裙客至柴門共深揖一時男女竟難分其五千山萬山皆戴石十日九日常出雲木鼠夜啼人不見峽猿暮嘯客偏聞其六近水刺桐知驛舍倚山毛竹即人家趂墟野婦酤甜酒候館溪童進辣茶其七架巖鑿壁作巢居隱約晴雲碧樹疏水梘枝枝橫檻似禾囷箇箇小亭如其八白沙青石小溪清魚入疏罾艇子輕謾說南荒風景異此時真似剡中行其九林塘幽窈隔桑村風磴﨑嶇接石門雨過茅茨忘赤日雲深篁桂易黃昏其十龍州溪洞極南邊雞犬桑麻自一天流水桃花今有路何須更覔武陵仙韶石一曲南薰石欲開餘音猶繞九成臺青山空灑懷人淚雲暗蒼梧鳯不來荻港舟中風日清酣麥正秋無邊蘭杜滿芳洲船窗夢覺多幽思處處飛來雙白鷗題夀萱圗東風暖入北堂深吹綻萱花兩朵金應憶綵衣稱夀酒春暉寸草此時心海山秋思圖為樂清塢知縣賦寫得新圗記舊遊無窮詩思海天秋白雲黃葉渾相似雁蕩山前思逺樓題鳯山圖青沙白石草離離萬仭蒼崕瞰碧漪鳯鳥秪今鳴嶰谷朝陽未老碧梧枝題朱孟辨臨文與可墨竹胸中千畝老陵州用寫西風一樹秋咄咄逼人青瑣客時來泚筆鳯池頭題王章紅梅妖嬈暫借杏桃色鐵石終存氷雪心額粉風飄粧鏡盡臉霞春酒入杯深題危中書所藏和靖墨蹟有引和靖先生遁居湖山間意其與方外之遊從為多今觀中書危公所藏手墨謝簡一贈詩一皆與方外者筆力語意清峭雅淡猶可想其為人披玩之餘敬成三絶舊書迢遰謝相過何日重來共晤歌籠鶴不飛茅屋靜西湖十里月明多其二湖上題詩衲袂分梅花千樹雪紛紛明朝飛錫知何處鴈蕩山中一片雲其三翡翠湖邊迹已荒鳯凰池上墨猶香爐熏清晝開詩卷宛見孤山舊草堂題竹間清逸圖流水柴門萬竹秋玉人還似晉風流瑤琴一曲瀟湘雨隔浦漁翁正倚舟題梅雀圗一樹寒梅花的的兩三凍雀羽離離上林鳷鵲春如海誰為東風借一枝師䕫令尹作樹石圖以寄其友黃君復紀别時之景也閲而有賦二絶楊栁江頭送客歸暮潮初落見漁磯畫圖無限懷人意雲樹依依又夕暉其二畫圖詩句兩清新逺向郵筒寄故人惆悵宿雲雙墨檜碧紗零落滿埃塵題山窗秋色圖青山㸃㸃雨初過黃葉瀟瀟霜已多惆悵美人秋水外晴窗掩卷奈愁何書羅彥周畫扇流水髙山獨抱琴拿舟有客識彈心小樓一曲猗蘭操黃葉西風秋滿林馮性之以顧定之墨竹寄其友方時舉題曰清風來故人索賦一絶故人别去每相思修竹清風若見之鳯鳥不來春又暮湘雲吹斷玉參差為袁能伯憲使題墨竹亭亭玉節拂雲霄坐覺清風瘴霧消擬奏鈞天筒十二虞廷此日聽鳴韶題方壺子墨竹方壺仙子御風還雲外珊珊響佩環吹徹鳯笙山月冷參差玉管落人間夜夢亡友林伯永有風憲之除覺而賦此青袍白面舊參軍風憲新除死後聞清夢覺來清淚集屋梁落月白紛紛題熊自成雙鶴圖海上歸來嵗月遲懶隨青鳥度瑤池一雙清淚秋霄月莫遣雲中仙子知題柯敬仲墨竹宣文博士老丹丘戲寫瀟湘一假秋留向竹山隱居處虹光夜與劍光浮杏林圗為豐城楊從善題昔年曽說董仙翁種杏成林爛熳紅多少活人隂德在枝枝葉葉總春風題黃尚英墨竹竹山萬箇碧琅玕喜向仙家畫裏看午夜鳯臺吹玉管不知風露逼人寒為張叔同題江城送别圖雙劍江頭春水生浦雲村樹總關情觀圖忽憶曽逰處倚棹漁村聽笛聲題熊自成紅梅飄殘額粉見朱唇杏艷桃嬌謾妬人解得花神留戀意枝南枝北一般春藤州江月樓前江水深玉人曽醉古藤隂雪堂歸去無消息半畝荒亭千載心題黎省之唐馬嗅地低回欲衮塵𤣥雲散彩五花新蹴氷不識交河道芻豆相從愧圉人題聽雨軒圖山窗酒醒夢魂清竹外松邊㸃㸃鳴蒲澗寺前千尺瀑都隨黃葉作秋聲操石泉操白石鑿鑿兮清泉泠泠可洗吾耳兮可濯吾纓援吾琴兮發希聲玉琳琅兮金琮琤泉有魚兮龍出聽嗟若人兮耳厭秦箏石泉曲兮邈千古情辭望雲亭辭青山兮白雲悵豫望兮逺人望逺人兮不可見目渺渺兮海垠鄱之山兮泉之水雲孤飛兮心千里臨華亭兮奈何望有極兮思無已雲之歸兮芒碭蹇逰子兮悲故鄉雲之出兮太行渺親舍兮天一方松楸摵兮霜露下宛在目兮愁豫雲兮雲兮其作霖雨望復望兮毋使我心苦風樹亭辭嫋嫋兮秋風樹摵摵兮聲未終風之聲兮在耳子之思兮曷窮松楸凄兮霜露下親不見兮愁豫三釡貴兮誰為榮抱茲痛兮終古彭之坡兮何長彭之亭兮樹荒荒播茲風兮千載庶錫類兮不忘梁溪辭有序昔者君子道與時違則退而隱處以自潔不以寵榮利祿羈膠其心故進退之際綽乎裕如夫豈汲汲營營以圖遇合若鄙夫曲士之為哉毗陵鄒天民氏少知覺長推擇為吏既升銓曹不屑升斗曰是豈足行吾志耶遂引去即所居自號曰梁溪生人咸髙之豫聞梁溪南直五湖退隱之士多居焉天民殆將為扁舟之游與烟霞釣徒江湖散人而為侶耶為作梁溪辭一章天民釣遊之暇鼓枻而歌之庶幾浦雲汀月之濱或有賞音者也辭曰梁溪之水兮其流溶溶淺有蒲荷兮深有魚龍泛豫舟兮溪之風侣雲月兮甘長終鴟夷遊兮猶遺踪𤣥真蛻兮或可逢微斯人兮吾將曷從詩餘萬年歡贈别陳都事問訊東君又何事一嵗一畨歸去杜宇聲中撩亂落花飛絮漫向江頭凝竚想無計可能留住江亭上况有離人不禁千種愁緒還思澤國風塵更誰能草檄名重藩府舊業都荒茅屋稻田瓜圃說與風流謝傅且休把雲山自許應回首人在丹霞滿庭榕葉鶯語木蘭花慢送孔子逺少府歸東甌羡千年泗水流聖澤尚淙淙逺西引河源東連岱嶽南下甌江如君一門簪紱更風流文彩世無雙栁外藏書樓閣竹間放鶴軒窗弓刀暫爾擁旌幢清譽藹南邦喜烟淨妖狼灘飛瑞鵝月靜驚厖歸去吳鈎錦帶想高堂春酒正盈缸菽水清歡未極風雲壯志休降木蘭花為允元學録夀時戊戌中秋南城溪樓即席分得微字秋江水上花外岸栁邉磯喜滿眼晴光溪雲搖曵山日熹微無限庾樓清興一瓢春酒今夜莫相違幸對月明風細况逢蓴美鱸肥寸心此際念庭幃稱夀舞斑衣笑薄宦孤蹤塞鴻海燕北去南歸萬頃澄江如練詠新詩却憶謝𤣥暉但願諸公長健共看千里清輝林登州集卷七
