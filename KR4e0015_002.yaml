body:
  text: 林登州集卷二明林弼撰五言古題范文綱青雲别墅靈峯出闤闠濯濯青芙蕖矞雲豁朝暉竹樹森扶疎中有隠君子憑髙結茅廬植蘭被長坂引泉注清渠喧然市塵中有若林野居客來觴我酒客去讀我書人生貴適意圭組將焉如題望雲巻英英天際雲有若遊子衣孤雲常在望遊子行未歸親舍渺何許心與雲俱飛願為故山樹孤雲日相依送王子俊都司經歴昔我少壯日躍馬青齊墟濟南我先里於焉久踟蹰歴下亭已古趵突泉尤疏酌泉洗心目翹首天海隅送君憶壯遊念欲與子俱君行贊戎府兵政資謀謨四海方敉寧邊鄙如庭除籌帷多暇日郵傳無急符持此三寸管制彼丈二殳男兒志功業惜别何區區君看東隅日忽忽薄桑榆努力及盛年終始慎勿渝蘭雪軒崇蘭被堂下積雪滿墻陰以彼潔白姿契此貞固心芳馨曾不改凛洌信能任君子尚貞白軒居幽以深因之發清嘯起坐彈鳴琴一彈猗蘭曲再鼓白雪吟蕭艾紛盈室塵土遮滿襟願子留深意千載返淳音送沈部掾歸里衡門樂棲遲考槃甘寤宿達士遺圭組幽人在林谷湯湯南湖水上有讀書屋胡為嬰世網言歸返初服游魚出芳藻鳴鳥集灌木於焉得真趣遽爾忘寵辱明當脫朝簪分子湖一曲發安南奉使豈無狀逺國方被兵貢物已上道陪臣反留行為言林邑人急攻安南城舉國出被難勍敵難爭衡此輩舊卵翼前朝荷生成方物奉職貢附庸通姓名爰自歸版圖邊圉恒相驚安南古内地儒書守章程裒衣與博帶矛矟非所營疆場時彼此蠻觸何輸贏聖皇先有㫖柔逺務息爭峩峩漢銅柱千載表南征天威倘一臨海山鏟可平所願邊塵息永被皇風清舸齋詩人生穹壤間有若虚舟浮所貴宦海中濟人闡深謀乗風破巨浪擊楫横中流丈夫足壯懐志士多隠憂夫君抱長材峩峩萬斛舟眼空江海天胸蟠雲夢秋齋居以舸名紀我萬里游開窓山歴歴推戸風颼颼流水遶門前嘉樹森屋頭依稀剡溪曲髣髴湘水洲攜杖動蘭槳哦詩間櫂謳時来奔走憩庶以清心眸人生有用舍行舟有去留野渡橫豈久巨川濟須舟雞鳴獨起舞雲海何悠悠牧魚軒西山曉来雨方池忽已盈芳草漾微波中有羣魚行晴軒一俯視感我齊物情嗟爾逺靈沼何以樂其生投食俱失時插棘虞禍嬰幸免涸轍枯恒恐校人烹江湖非不大網罟紛縱橫逝將縱巨壑待爾鱗鬛成青水洋吴江東入海水與天色竝波濤堆琉璃一碧三萬頃曉黛浮空濛春藍漲溟涬南泛浩無涯北接安有境莽莽合蒼靄翳翳沒白景鯨鯢聚窟宅天地設陷阱我行監漕貢睠言赴京省舟檝多艱虞行役増戒警望洋意茫茫戀闕心耿耿緬思承平日皇風被溪嶺迢遞一介使萬里無寸梗云胡鞠荆杞周道莫驅騁戎馬方紛披廟謨賴維罄庶得近依光絶勝遥引領詎復憚勤勞乃遂忘忠鯁南風蓬底聲西日帆外影蕭蕭征衣裳薄暮有餘冷浩歌叫馮夷慷慨心目醒黒水洋吾聞黒水洋乃在梁雍域胡為東注海萬里尚流黒豈伊水深黝逺近一墨色舟師為我言北来此其厄風微舟如膠風急舟若射每見黒風起坐見黒雲塞天地為黯慘不辨咫與尺過者必齋禱恐為蛟龍得古来竒丈夫夷險無所擇宗慤破長風思効報國力張騫窮天河克任開邊責王事當賢勞人生少安適惟願天戈揮九州剗荆棘履道達康莊傳命達郵驛譬之四體安元氣貫血脉海若斂風濤受職永無慝悠悠江湖心天南在天北送葉子實之南安幕離離原上草密密庭前柳游子一寸心故人幾回首春暉盪繁緑朝雨清宿垢駕言理征斾去去事升斗此行詎足念桑梓舊墟藪種竹應成林植蘭已盈畮蕭蕭奉板輿怡怡酌春酒人生重榮養所志敦素守竒寳奚足稱修名諒無朽河海渺川瀆泰華空培塿願言髙逺期珍重經綸手送都潤士歸鄱陽白雲在江東或在南山阿美人惜逺行看雲愁奈何驅車適故道千里遥闗河鳴鳥出幽谷奔鹿馴陽坡壯遊豈不好流景驚易過君子樂臺萊游子悲蓼莪明發不能寐去意寧逶迱湯湯彭蠡澤浩浩揚瀾波征颿挂長風蘭芷春香多酌子以巵酒侑以驪駒歌離憂勿擾縈壯心期靡他南山有喬松千尺長枝柯珍重凌雲姿清陰遍蓬莎題松江釣者圗輕舟何處叟坐釣松江湄松根繫我纜松風吹我絲青山生逺樹白日明清漪但得酒可醉何愁魚上遲磻溪獵車至嚴瀨鶴書移出處孰得失問翁翁不知上僉憲代林伯永作熙朝右文徳風紀資儒臣治效良在兹慎選惟其人君侯西州彥風起南海垠壯圗邈雲漢素學存經綸白日勤繼晷青雲思致身三獻蓬莱賦一躍龍門鱗遊鯤待風舉蟄蠖須雷伸名登金榜曉宴錫璚林春榮禄一以厚所思在澤民黄堂重判筆剖擿如有神薇垣飛舉早楓闕承恩新擁節謝西楚驅車入南閩陽和藹寒谷明月當秋旻既攬范滂轡復埋張綱輪遂令駑駘質獲望騏驥塵菲菲蘅與杜采采漳水濱芳菲未盈尺聊以抒微恂髙臺有寒栢廣庭有長椿持此一寸草千載報君親贈某王簿兵塵起淮甸烽烟到閩陬郡邑多失守田里誰為謀不有英俊人孰憂我民憂明公濟時士義氣横清秋鄉閭歸保障民瘼賴以瘳履畝得公道團兵有良籌枌榆青樾繁桑麻緑陰稠遂令東鄉民耕鑿樂休休鸞鳳肅儀羽枳棘難久留行将奮鵬翮萬里雲路脩捲海洗炎暑沛澤均南州宿明極上人房分韻得客字仲冬氣已肅幽懐耿寒夕走訪山中人聊共慰岑寂山人眼如月好文復好客揖客開竹房燈光四窓射為言時多虞車馬徒役役崇蘭汎餘芳踈梅粲新色鳴琴合清歌香饌間重席薄酣情更好清坐心自適逝將謝囂紛於焉脫羈靮豈無一樽酒為子塵慮滌秋衣裁白雲夕餐煮白石𤣥鶴兮歸來山空霜霰積代上人賦當字塵居苦喧囂禪房愛清曠及兹淹信宿俗慮俱滌蕩是時仲冬秋南天寒未壯微雲忽已收薄霜猶可望從席羅嘉蔬開樽出清釀惟應効真率安用學排當形忘飲頗狂耳熱歌自放詩成一絶倒琴罷倍惆悵淳音風雅前古調羲軒上哇淫雜桑濮雉雊牛鳴盎願言復心聲千載起淪喪上美叔知司峩峩紫芝山湯湯柳江水嶷嶷陳知司長材抱奇偉華裾粲雲霞芳佩襲蘭芷種薇山之椒栽蓮水之涘蓮香秋益清薇花晚逾紫草檄疾何痊出奇敵自靡艱難政需賢通濟況如子行當振家聲庶以光世美髙步登雲霄奮身脫泥滓勿著從仕衫願聴尚書履贈李一初魯人巖巖岱宗山道逺不可即悠悠黄河水源深杳莫測至人抱𤣥道髙浚與之則我欲往從之瞻忽徒役役安得縱壑鱗願插凌風翼沿流載窮源登峰一造極夫君抱幽尚生此聖哲鄉清暉方被物旭日升扶桑豈不念逺道努力及青陽况復際清時肅肅宜髙翔龍馬出榮水鳳鳥鳴周岡千載文明瑞願言揚耿光五月上日奉陪梅所知司子實大尹洎諸友會於黄氏讀書亭分韻得日字積雨豁新霽清和美風日幽草萋以繁嘉樹蕩初密危亭肅清敞盛集任真率豪飲徂徠六能文建安七蘭香襲佩纕竹色映書帙於焉憩塵勞聊以慰煩疾僶俛曳長裾慷慨投巨筆役役著銜馬沾沾處褌蝨但願尊有酒此生醉中畢君看彭澤翁有田惟種秫代贈陳仲福蘭盆會首人生在穹壤百行孝最先墨氏知所本尤見心同然葬親厚夷之救母哀目連陳君有媯裔至孝紹前傳首倡報親㑹心誠供佛筵金盤浮赭果玉盆吐青蓮遂令蚩蚩氓㒺極思昊天結草念春暉薦菊悲寒泉潁人善錫類曽子幸歸全矧兹履霜露疇能效埃涓感君純篤心涕泗皆澘然名教力以植鄉閭化斯宣瀰瀰漳江水峩峩霞山巔仁者必有後努力希世賢書吕誠夫進士金環詩後為薩達道同年贈皇帝二十載盗起東南隅蘖芽既不剪滋蔓遂難圗荆吳虎兕逸閩粤狐鼠呼薩君濟時彦昻昻千里駒誓為國討賊愧死偷全軀投彼三寸管執此丈二殳轅門上籌策幙府㕘謀謨孤軍懸深入殺氣塞盜區外無蚍蟻援勢失事已殊攢膚交逆刃十死復九蘇從容就絏縛談笑視刀砆酷刑曽未施晼晚日已晡夜深忽作夢𤣥甲神丈夫示以金環兆驚寤悲喜俱神驥忽解縶文雉初脫罦山空霜月寒凛焉駭狂奴迷途若或指獨行若或徒始知忠義士實藉神明扶生還偶得遂壯節終不渝反側賴安奠強梗隨誅鋤吕侯好竒者作歌為揚揄願持獻天子載剖旌功符奉次韓景昭縣尹移文封贈感夢二親之作大鈞播羣品亭毒一元氣人得秀而靈中立配天地睠惟異禽獸實由識倫紀篤孝盡子職立愛自親始㒺極終身慕不忘永心矢韓侯聖賢學魏公忠孝裔粤自英妙年已與流輩異顯揚企前修繼述念先世家聲振有期書澤流未已一官豈禄擇十年為親仕甘㫖幸父存髫齓悲母逝得母諒已難事父當不易過庭習詩禮淑鄉敦徳義善行遵聖經嘉言徴信史東隅光莫駐西山景何恃空興風木哀不逮菽水味古来忠孝門多出忠義士惟理所可為雖身不暇計擊楫祖逖誓攬轡范滂志赤心但守一素節詎移二驛騎方南歸鷺車亦東指香紅汎蓮幕新緑近榆里人欽喬神君職優習鑿齒宰邑應時需親庭思日侍我殽既有嘉我酒亦云㫖莫能養親生曷以慰親死邑令得䟽封天朝有常制紆朱秩亦卑焚黄情愈至吾親茍與榮此官殆将棄白日書贈文孤雲凝逺睇萊堂痛椿萱鄧林慚杞梓子心一何悲親魂端可致清夢繞庭闈薄宦忘邊鄙恍若稱夀觴惚如奉盥器怡愉接父顔慈柔見母氏應效嬰兒啼猶作斑斕戲覺来憂思集凄然霜露履精神信交孚感召乃若此作詩載紀哀臨風幾揮涕我生在膝下亦有顯親意未能潘輿奉僅得毛檄喜秋雨洒泉扃母魄已深閉春風藹家塾父訓幸聞禮詩篇誦一再心目頓清泚朝盤欲忘飡夜枕悄無寐脩名曽未立世味空復嗜振後以光前在此不在彼既無致身術曷盡為子理遺經絶編韋淡墨虗榜紙青雲孰唾手清泉思洗耳羨公孝有初生得奉滫瀡羨公孝有終死得三鼎祭錫類美潁人全歸善曽子忠孝豈兩途君親如一事大綱久淪斁頹風政披靡願言力扶植庶以起衰替千秋萬嵗名無愧賢與智七言古題吳希貴為徐將軍畫海青圗黒風吹海海水立銀山萬丈髙嶻岌天吳簸浪天為濕蛟龍掀舞出復入羲和著鞭六龍急扶桑曙色光煜熠金烏飛上百怪蟄一碧萬頃秋可挹海東之鷙怒翔集片雪飄蕭雙翅戢浪花滚滚石濈濈􅑷身向日思逺及錦鞲金鏇不可縶憶我挂席東海東海雲海水浮空濛神鷙時来休雪羽玉立蒼石吹剛風吳君此畫将無同竒氣矯矯横秋空将軍屏帳寧久容便當飛入天九重鴐鵞奮擊層雲中四野狐無留蹤題錢氏鐵券卷唐錢璆武肅王強弩射潮事洪武二年奉㫖徴至謹身殿觀之剛風吹地九土裂仙李根拔孫枝折白馬不飲濁河血羅平妖鳥啼未歇斗牛萬丈騰紫光炯炯餘彩輝太陽鏡湖泚筆寫露布石室剖券分天章金為臣心鐵臣節臣身吳越心魏闕共悲羣盜竊神器猶喜諸孫存故物黄金樓閣髙倚天寳氣白日浮雲煙電光忽開天為笑摩挲銅狄千百年君看錢塘鐵作箭潮頭東去江如練箭鐵未銷券未磨帶礪山河當復見題洪元質墨竹今代畫竹稱妙絶李公息齋趙松雪天風吹墨落人間一幅千金香未滅今君筆勢清且揚直與二公相頡頏千林露滴翠葆濕萬竿風拂琅玕長山齋晝閒快一覩錯落篆籀猶遺古鳳凰飛去蒼梧雲鷓鴣啼破黄陵雨人言無聲勝有聲畫思何如詩思清馮君為我寫梅雪嵗寒結此泉石盟贈寄雲道人寄雲先生寄雲居與雲卜隣相依於白雲無心酷我似我亦浪跡真雲如閒来倚松看雲起紫煙衣上涼如水清霄沆瀣落氷壺滿挹瓊漿和玉髓飲罷身輕隨鶴飛乗雲一去渾忘歸吾身與雲皆寄耳白衣蒼狗誰是非題李伯時畫二馬圗龍眠二馬人共誇連錢青驄白鼻騧雙韁短絲繫枯柳八蹄寒玉攅輕沙我疑鄭公抗疏日天廐雙龍賜遺直又疑拳毛獅子花蘭筋權奇皆俊骨四郊無壘三邊平汗血謾作千里行君不見賤工棄置在一蹶得似身閒飽芻秣題黄誠甫鐵樹開花圗刺桐城西仙母家百年種徳如種花春風吹暖滿庭院坐見鐵樹開瓊花瓊花的的簇丹穗仙母見之一驚異人名此樹狀元紅偶爾開花必為瑞阿兒讀書五車多解來瑞應期無他寫圗寄之喜欲舞題品直上金鑾坡玉堂多士誇珍竒何異漢室生金芝赤花光照永春縣黄家瑞應無終期題彦璋劉簿秋山讀書圗龍川簿領山東劉家住營丘山之幽讀書山中松桂秋自言嘉遯勝宦游寒光落日低草樹緑野平蕪接蹊路書樓逺在山深處下視人寰莽囘互有時清誦落澗谷山風蕭蕭壑雲暮山風忽吹牙籤落壑雲不掩紅光露世間清樂在山居人生真樂惟擁書山中擁書樂其樂求如君者能幾歟梅邊隐君得隠趣執筆寫景成畫圗披圗浩歎非故吾箠楚未脫勾稽拘何當拂袖歸林廬攜書我欲君與俱秋山猿鶴驚相呼慈溪孫氏瑞萱慈溪邑中慈孝門云是孝感孫鍾孫朔風飛雪滿慈竹北堂愛日開瑞萱宜男喜見二雛好母也忘憂以終老庭下時紅棠棣花堦前不緑王孫草歌罷凱風三歎歆青天萬里滄溟深阮信道家牡丹市西亭館花若林牡丹一朶千黄金麗華朝倚望僊閣天下美人皆陸沉東風枝頭滴紅露春意不如花意深主人剩勸竹葉酒飛作彩雲何處尋贈祁山居長老豐城小巷口香社寺僧劍江東望山如龍水勢曲與山相從山盩音周水厔音質氣所鍾山曲曰盩水曲曰厔山居山人居其中碧眼白首顔如童長日跏趺坐髙舂懸河大口談空空寳花散落隨天風萬年香社人所宗千章喬木陰重重崢嶸華構交青紅我來作邑豐水東思懐瓣香加敬恭我本有髪老僧翁誤落塵網徒匆匆淵明結社意亦濃但恐酒狂不相容作詩先此詢逺公送李廣文歸鄱陽王羅廟前江水流鯉魚風起蘋花秋美人錦帶珊瑚鈎釣竿歸去明月舟腰間寳劍三尺雪蒼龍夜鳴紫光掣酒酣起舞心耳熱一曲滄浪水雲裂林登州集巻二
