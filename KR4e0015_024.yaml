body:
  text: 林登州集附録林登州傳龍溪張燮林公唐臣初名弼字元凱系出晉黃門侍郎頴頴生晉安太守祿卒官因家焉十餘世至評事大章徙居吾龍之文山遂為文山人評事者公之六世祖也公父廣發為世大儒任帥府參軍有聲公母陳夢北斗傍一星入懷中光耀襲人娠而生公公少秉異姿治毛萇氏詩弱冠舉進士高等釋褐為郡幕然非其好也戊申內附高皇帝新定天下廣延儒術鵷鷺充庭公嘆曰此吾竭思康道時也己酉秋徴詣春官修禮樂書拜吏部考功主事庚戌安南使者杜舜卿以其王日煃卒來告上遣編修王亷祭之乃遣唐臣持詔封日熞為國王既陛辭上以馬援昔討交趾鎮服蠻夷厥績良偉命二使臣就彼祀之公既詣伏波祠下如詔致祭徘徊銅柱追憶鳶飛墜水馬革裹尸之言結托為異代交祠久頺命工修葺而去比抵安南奉揚明天子威德王拜稽首願世世子孫為帝外臣望海波而朋三澤也封事既竣王命中使夜攜五百金密投公榻詰朝使從官復餉五百金他物稱是公悉卻不受曰唐臣手龍節走萬里外帝慎擇而遣之豈自意陸大夫裝哉且境外義無私交王勿復言安南王度公不可強乃俾入賀使者武漢磾裝其金請於朝上曰王禮中國使宜贐中國使不貪為寶使遙嶼知漢官威儀宜卻贐可謂兩全函令還國蓋自是上心重公矣居無何奉詔賑飢越中所全活至巨萬計出注豐城令以經術飾政如烹小鮮至懲姦釐弊聽微決疑乃特立行一意吏有漁獵為姦者度公將置之法遂誣公受傭黃金一鎰緩傭死事下司冦逮公繫詔獄司冦以安南却金事白上遂直其寃初公舟次湖口夢一木人口眼皆動覺謂所親曰吾其危矣後刑官入奏上見君名援筆草書休問二字蓋休於字為木人草書問字上下口眼皆動象也非忠誠素孚孰能預測河魁之柄使神先為授者乎已補饒州别駕佐刺逾見稱述尋改垣曲令丙辰安南告變上遣使往視而難其人廷議交章薦公公復銜命之國鎮撫其社稷以歸擢禮部主事己未拜登州守訟理政平而祀典學政尤多所振飭焉俄以疾卒於官所部惜之公雅精臨池嘗與王太史談書法謂用筆須偏正法兼備乃臻妙境近世趙孟俯書非不工但側峰太多不能逃筆牀月旦識者言林公用筆皆正峰有力非若他人只寫畫而已公所著梅雪齋稿及使安南集宋學士濓序之王待詔褘清漳詩有云風流今孰繼林子亦其徒蓋指公也弟虞臣國子助教世稱雙璧云張燮曰元凱當有元末造枳棘棲鵷陸沈永嘆者哉逮夫遭逢龍起委質清朝出壯皇華入稱循吏雖宏轡未展蓋亦光闡國章焉旁參文苑成其俊流而大要歸於質行草昧多賢勝奉春稷嗣逺矣中順大夫知登州府事梅雪林公墓志銘括蒼王亷余為翰林編修時與公同使安南以洪武三年夏四月發京師明年春二月還復命與公交際以程計儉萬里逺以時計凡十閲月公學問之該博官政之揚歷聞之習矣故知公者莫余若也今公卒矣其仲國子監助教原功氏以余與公為知己乃自中都價公之狀來乞銘余不遑遜公妣陳夢北斗旁星墮懷中娠而生公因名弼又名唐臣字元凱時禁國號名字仍舊名五歲能默書千字文長而岐嶷英發從鄉貢進士周祐遊專門毛詩丁亥領江浙鄉薦戊子登進士第庚寅丁母憂服除仕為郡幕官丁未值外艱戊申內附為洪武元年己酉秋八月以儒士登春官修禮樂書為時推引拜吏部考功主事稱能官奉使安南封其世子日熙為王仍王其地使還王命中使密以五百金夜投公榻去翌日安南從官復進金五百他物稱是公曰我等為中國使顧受外夷贐去國萬里即不受何以自白乃俾其進賀使武漢磾裝以白于朝至日入奏上曰外夷敬中國使禮宜贐中國使去萬里外不撓國法兩盡其道亟返其國上器重之時會試天下士命公為受卷官遷豐城令鋤強梗革積弊吏閡漁獵乃誣公受賣菜傭黃金一鎰緩傭死下逮刑官論報直其寃仍授江西饒州府通判佐政多所裨益士民稱之不置事覺改山西垣曲令尋徙謫濠安南亂朝廷難其使會薦公專對能起使安南靖其國還擢禮部主事己未拜登州知府階中順大夫百廢具興六事咸備而於祭祀學校尤致意焉登民方服公化俄以疾不起實辛酉冬十月戊寅也享年五十有七公善草楷法嘗與豫言用筆須偏正法兼備乃妙近世趙孟俯書非不精但側峯太多不能逃書家清議林泉生嘗言林公用筆皆正峰有力非若他人止寫畫也公所為詩文皆雄偉逸宕語或清峻敻出塵表有梅雪文藁若干卷使南集若干卷先是公使安南吏部以皂𨽻吳從吳抵安南暍死公出已幣斂焚其罌附行李走萬里歸其所親人多義之豐城視篆甫浹旬朔例以欽録赴京舟次湖口旦假寐夢一木人口眼皆動寤語人曰吾不祿矣及繫詔獄公具以却安南贐金事告刑官入奏上援筆草書休問二字於名下休字木人也草書問字上下口眼皆動象也非公見知於上其吉徴能預兆於精神恍惚之時耶公系出長林因以為氏逮晉黃門侍郎頴徙下邳從中宗南遷入閩生晉安太守祿卒于官下子孫因家焉又十八世至評事府君翛遷漳之龍溪惠文山高祖桂曽大父大父舉皆潛德弗耀父廣發仕汀漳屯田萬户府經歷公娶張氏生子文璵助教命璵發公喪以月日歸葬于先塋之側友人括蒼王亷謹為銘曰中順華裔翹長林黃門徙邳從入閩十又八世官沉沉屯田遺愛孚惠心臨漳大族衆所欽九牧十德同徽音惟公學業名駸駸考功使南却贐金天子嘉之示官針居官齟齬屢見禽日星晃明翳莫侵再使南國萬里愔五馬出牧青海潯繐幃奄忽天難諶青天白日生頑隂仲氏匍匐力不任踰年奉柩返故岑余銘爾墓昭后今序使安南集序金華宋濓吏部考功主事林君元凱奉使安南還以使南藁一編授豫序序曰安南古交趾也漢置九郡交趾居其一唐分嶺南為東西二道置節度立五管而交趾亦𨽻焉其地本入殊方稱臣奉貢比內諸侯近代馭非其術徼其重貨責其躬朝蠻夷乃敢為弗恭出不遜辭廷議憤之復有鑄金為人夜光為目之徴而蠻夷心益離使者至其國多貪夫悅其金貝輒昧昧攫之遂致其褻侮燕于廡下君子每為之短氣方今聖天子御極之初遣使往告即位其國主陳日煃稽首上表遂乃封為安南國王未至日煃卒嗣王日熙有請于朝復詔襲爵如初柬庭臣頒封使者僉謂元凱前進士學古明經尤長於辭令其出使為宜上從之召至奉天殿親加勞問而遣焉元凱即日上道越五月至其國布宣威德與反覆詰難援古證今口若懸河其君臣悅服乃北面拜跪聽詔如藩臣禮將還日熙遣陪臣夜半持黃金為元凱壽元凱峻言卻之陪臣嘆息而去肆帷皇上奄有四海宅居土中逺夷承化靡不內嚮上以其限山絶海使各安其境土而無所利之深合古帝王懷柔之道固當著之史牒埀憲萬世有若元凱之使安南慷慨特達受詔即行瘴雨蠻煙曽無懼懾已能顔正辭嚴足以聳動羣聽凡其國以利相啖者而卒無所售舉手加額稱為賢使者亦可謂不辱君命者矣然余聞序事之體志其大而舍其小故特取蠻夷叛服之由聖世明良之盛書之于首簡至於行役之勞倡酬之適山川土俗之詳已見詩中者可得而略也元凱名唐臣臨漳人今以時制所禁更為弼文辭爾雅吾友王內翰品評人物謂元凱在閩南如毛之有麟甲之有龜云林登州集附録
