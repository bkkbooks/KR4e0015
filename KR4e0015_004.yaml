body:
  text: 林登州集巻四明林弼撰五言律次韻楊秉中縣尹春日病中述懐十首謾道春來好愁多日更長看蝸知勝負聽燕識興亡風雨五更夢雲山千里望濁醪吾爾愛能滌九迴腸其二竹牖春風外柴門暮雨餘尊無陶令酒架有鄴侯書舊業俱荒落閒愁莫掃除白頭依狗監慚愧馬相如其三海宇開新造山林起久跧䕫龍時接武巢許分投閒燕乳草生巷鶯啼花滿山臨風時一笑鬢為賦詩斑其四彭澤先歸去湘江後卜居紉蘭誰復佩種秫自能鋤老醜慵看鏡窮愁獨著書且須相覔醉燒筍鱠鱸魚其五山雲白蒼莽江樹緑參差弟妹幾時見家園十載離沈腰常减帶潘鬢易成絲苦聽竹枝曲教人坐石遲其六窻竹晴逾靜庭花煖自開客閒時共對鄰熟許移栽司馬元多病襄陽豈不才石田與茅屋歸去未荒苔其七白頭逢喪亂愁絶浣花翁不道兵塵苦猶存詩句工深春憂肺病逺道愧囊空待得茅堂就歸來萬事慵其八南國江山舊東風紅紫新醉來忘避地老近怕逢春曽是菊松主還如草莽臣無窮懐古意清淚滿衣巾其九自笑塵中逐能存亂後身春如人漸老時與物俱新每有乘槎意長懐擊壤民牀頭書劍在吾道未全貧其十我本耕耘者春疇憶種秧岸低新水上泥潤細苔香呼酒栁邊店留詩竹外房年來清樂少枯坐學顔忘題王佐山人畫山光雜空翠雲影澹晴暉古渡舟誰繫虛齋人未歸石苔秋雨積野樹晚風㣲便欲抛塵事埀綸栁外磯題王廷珪畫秋色晴山迥烟光野水連空林輞川外古樹草堂前天地留詩巻江湖老釣船美人隔雲漢對此思悠然十八灘三首谿竹亦多景詩句每無難雲淨山爭出湍驚石自安旅懐拚酒盞生事愧漁竿猶覺壯心在孤舟十八灘其二萬壑荆閩接雙溪章貢來風聲隨雨散水勢與山迴石蘚痕痕合巖花㸃㸃開客心渾似砥灘怒謾如雷其三十八灘頭路三千里外身如何滿船月常照異鄉人神劍占新氣仙槎問舊津小臣重王事陟險敢辭頻英徳舟中舟行湞峽裏景似左江中峰峭千層石谿囘一隊風瘴雲寒漸白野燒晚猶紅已喜詩囊富何愁客路窮江西送郭中敏還廣東使節江關外歸舟風雪前同來憐逺道别去惜離筵草緑曽逰地苔荒舊種田越臺回首日春滿五雲天除夕今夕復除夕難為守嵗謀江山非故國風雪尚孤舟榾柮紅生面梅花白上頭窮年未歸去莫怪杜陵愁人日皇天調光霽野宇遍清明風岸初舒栁楊林欲囀鶯昇平應有象邊報永無驚野老憂心釋詩成酒滿傾彭澤重登潮音閣追和陶叅政韻神姑近可即天女邈難攀飛閣虛空裏疎鐘杳靄間潮迎歸越海雲渡隔淮山擬學禪棲樂何時身乞還平南縣舟泊平南縣江干得暫閒水添今日雨雲失舊時山禹甸連三楚秦封入百蠻清時無畏道容易越河關題林徳仁永思堂巻吾宗昔旌孝雙闕儼猶存甘露降林木白烏棲墓門永言思阿父今復見諸孫幸得慈帷下均酬罔極恩羅時用之浦江縣令小邑邊西北兵餘貴撫摩但令息愁嘆漸可化絃歌隴樹春猶在秦雲夏更多懸知官事簡日對二松哦題小林居圖幽居學林隠宴坐息塵營蘿月開牕色松風欹枕聲山花多結子野草不知名寄謝朝簮客能同丘壑情竹居昔與宋中使時來竹外居秋聲滿牕戸晴影落堦除煮筍常兼肉裁竿或得魚愛君幽遯處直欲世情疎梅屋我屋梅花下君家梅樹傍小池横瘦影幽戸送寒香歳晚竹松節春寒桃李塲知君有所擇歸隠得相將望雲圖子役勞親念親遥渇子思望雲千里目陟岵一篇詩碧嶂清江路祁寒暑雨時看圖思努力他日顯揚期題孫積中哀劬賦後我甫居祥日君初失恃年長哀同念母不弔獨號天山北雲迷舎溪南月浸船慈顔渺何許悲涕共澘然題方廣圖未識天台路欣披方廣圖山靈時聽法野衲日跏趺貝葉松風亂蒲團石榻孤烟霞有餘樂還念世塵無芝峰僧舎次謝君定韻偶借僧房宿都忘驛騎塵松聲半窻雨草色一庭春傾倒逢今日棲遲愧此身清朝需董賈莫作采芝人和胡梅所除夕述懐之作今夕又除夕更闌未愜眠江湖猶故我廊廟正需賢暖散嵩華雪寒銷榾柮烟屠蘇明日飲鶴髪喜添年題雪齋夜讀圖贈别吕宗周空山半弓室長夜一編書嚴風吹北牖飛雪被前除幽燈素光射清誦寒聲俱游心百世上努力十年餘至正戊戌春季道莆過方遂初縣丞翌日至興化邑訪邑長實達道醉中偶作夜宿縣丞家朝過邑長衙故人頻勸酒醉客急呼茶雲薄見春樹山深留晚花董園猶在望新雨足桑麻七言律答胡梅所菊節有懐秋懐耿耿鴈能知節物匆匆菊較遲袖裏空存三禮賦尊前莫詠四愁詩及時聊復成歡笑感事多應入夢思為問空湖山下叟把萸此日共伊誰其二菊花要結歲寒知為愛梅花開故遲彭澤歸來空嗜酒杜陵老去强題詩雞鳴風雨五更夢鴈落江湖萬里思三十潘郎蒼鬢改故人相見問伊誰問胡梅雪病併想山居之樂閒居賦就鶴書徴結屋蒼岑第㡬層松酒山中何日熟竹樓雨後共誰登忘形定有漁樵侶淡況應如雲水僧屋角梅花無恙否客來想已送迎能其二似與林泉有夙期興來雲月總心知菊花黄後客攜酒蕉葉緑時僧寄詩醉臥不妨風滿袖苦吟未覺雪侵髭石田茅屋如相借來傍寒梅采玉芝予友李君彌卜居東郭翛然自樂錢君孟道為作圖題曰東郭獨隠索余賦詩便為書此東郭先生愛幽獨茅堂門對碧山春溪旁展席尋鷗伴松外開窻與鶴隣淺水稻田環緑遶輕風花館落紅新勞生擾擾知何用汀樹川雲入夢頻贈冲和道人三神海上九仙山分得松房第幾間龍劒驅雲行雨去鶴簫吹月御風還偶因耽酒春過市應為傳書晚度關紫府丹臺名可注壺中従子及身閒三衢程君璋氏訪友臨漳將歸賦此以贈三秀峰前采玉芝髙懐遥與白雲期江山滿目荆州賦風雨連床杜曲詩萬里滄波鷗浩蕩一庭芳草燕差池歸來城郭人民換任爛長柯且看棋題張櫟里畫屋前春水緑如醅屋後春山翠作堆有客抱琴門外立何人騎馬樹中來西齋酒盡猶留月東郭詩成欲放梅三絶廣文誰賞識為君海上望蓬萊送伯千之北上元戎邊畫屬誰籌公子烏臺舊俊游阮掾久聞三語譽冦君重借一年留馬蘭花發迎官道駝栁條青落御溝尊酒懐人何夜月五雲深處最高樓送友歸永嘉平逺樓前逺望匀美人遙憶鴈山春女桑緑遍蠶將熟穉麥青齊雉正馴齋閣堆床留魏笏賓筵漉酒有陶巾西風無限南來翼好寄新詩莫厭頻題南樓樓對員山亦壯哉時憑高處望蓬萊滄江雲起九龍舞華表月明孤鶴來林下茅茨新聚落水邊楊栁小樓臺太平不用籌邊䇿獨倚層欄賦雪梅偕洪元質逰南巖紫雲邀斾出城南風物依依真誥巖山石滑人行䠥􅍷野禽怪客語呫喃秋江逺水生葭葦落日凉風舞檜杉晚對屏前吟未穏不知空翠濕青衫别章仲明用前韻此日清逰雲洞南明朝逺别鶴山巖汀洲水落鴈初下海國秋深燕尚喃驛路風烟連細栁酒家籬落隔青杉薇垣好展神仙步莫遣緇塵上客衫題漳浦白鶴嶺有引昔余過漳浦白鶴嶺頗愛山水之清廓而惜其亭宇之蕪廢今年秋重道此見其蕪者治廢者起金碧相射華竹交映壁間題曰石竇寒泉響玉徽閒雲出岫繞松扉一從白鶴高飛去栖碧亭空鎖翠㣲乃邑簿陳致中新構此而紀其勝也俛仰陳迹竊於末句有感焉因為起語以寓興懐栖碧亭空鎖翠㣲詩成人世已俱非墨池水暖鵞誰換華表雲間鶴自歸樓倚仲宣休作賦碑思叔子故沾衣古來陳迹知多少立馬西風又落暉過盤陀嶺盤陀嶺上㡬盤陀茅竹蕭蕭雨乍過水暖游魚奔絶澗草香馴鹿食陽坡怪山當面疑迷路啼鳥迎人却和歌總為世途多險惡太行蜀道復如何芝峰月夕次韻性元上人足成茶溪公口占之作風滿空林月滿山無詩堪笑老方干洞雲晚散龍眠穏松露秋高鶴夢寒賀老鑑湖先賜勅陶公彭澤早辭官他年分我半間屋待向芝峰絶頂安次徐梅所座主訪龍江書院有感之作訪古歸來山月孤紫芝峰影落平湖千秋統緒存方䇿萬國提封入版圖遼海鶴歸空露柱滄州月落滿霜蕪何時突兀千間厦風雨如山大庇儒再用韻二首試問龍江讀書地何如鹿洞與鵞湖梵宫已作新輪奐郡志空存舊譜圗碧玉峰前移老檜還珠門外剪寒蕪記文自可徴千載太史虞公國鉅儒紙帳更長月影孤梅花清夢繞西湖左思才擅三都賦諸葛名成八陣圖漢殿丹青俱寂寞吳宫花草易荒蕪白頭杜老謀生拙却道儒冠解誤儒丁酉元旦海氣蒼茫曙色低扶桑枝上聽天雞光搖旗旐龍蛇動班簇衣冠鵷鷺齊重譯來庭通桂海中興有頌勒浯溪老翁喜見豐年兆自典春衣酒滿攜其二斗杓入夜指東寅雨脚凌晨灑瘴塵北闕天高先見日南州地煖早知春獨憐丹嶼思歸客曽是瓊林錫宴人江海此身强健在何妨魚鳥日相親和韓南勝二首白鶴山前舊草堂重來吟鬢已添霜花城衙放雨初歇竹寺詩成日正長木蕈作羮流筯滑溪魚釀鮓透苞香野人喜見昇平象桑柘連隂古戰塲其二躍馬燕臺憶壯遊東風一笑紫雲樓杏園設宴慚魚尾葱嶺封侯羡虎頭燈火十年心獨苦干戈滿地鬢先秋従今西賊應寒膽韓范安邊有宻籌閏九月重陽前一日奉陪梅所知司逰員山謁康仙祠即席次韻二首清逰曽記十年前員嶠山中訪老仙竹寺題詩風滿帽梅溪載酒月明船神逰弱水三千里目極齊州九㸃烟何日重來問真訣白雲深處種芝田其二莫聽月笛怨山陽且捧霞觴望帝鄉瑤草先秋猶着緑菊花雨後更留香風前紗㡌孟嘉醉湖上觥舩賀監狂一曲猗蘭千古意知音幸有漢中郎圓山康仙祠詩奉次徐梅所知司韻浪逰曽記出城西十二圓山紫翠迷一陣閒雲初過雨半篙新漲已平溪笙歌彩鳯空中下劒化羣龍匣底嘶何日神丹成九轉從公來聽枕中雞再次王子實縣尹韻春山杖䇿覔仙翁花信于今第㡬風千樹碧桃流水外一聲白鶴亂雲中風舟無路尋蓬島霞佩何年謁蕋宫塵世總成盧枕夢且須沈醉學山公謝姚省吾博士招飲次韻風雨西齋酒一瓢白駒有客此逍遙清詩漢殿盤承露雄辨吳江弩射潮花下晚衙曽未散芹邊春酌若為招醉中忽作故園夢落日聞歌谷口樵再用韻呈姚博士清漳博士姚先輩媯水神明世胄遙緜嶺題詩風滿竹韶溪放棹月明潮愁來白石歌休唱老去青山隠可招世事都如棋一局坐觀謾學爛柯樵賦得人日不隂雨雪常年苦晦㝠乾坤此日喜晴明宫梅落後餘寒盡野菜香時新暖生方朔占書應有騐杜陵詩句謾多情從今部戸安生遂重捧椒觴頌太平深青道中瀟瀟瘦馬深青道杜宇聲殘日又昏風裏林花香作陣雨餘池水緑添痕採桑野婦輕衣袂賣酒山家小巷門無限原頭芳草色教人千里憶王孫姚省吾教授漆園老子志逍遙箕水幽人分掛瓢江上月明纒鶴夢樹頭風急厭聞蜩菊松晚色留三逕芹藻春香藹泮橋無限鮿生懐古意韶溪還許聽虞韶賦得水田白鷺漠漠平疇宿雨晴瀟瀟素羽晚風輕滿川緑漲一雙下隔岸青秧數㸃明霄漢無班陪鵠立烟波有社結鷗盟輞川若值王維畫添我青簑黄犢畊送許輔之歸隠吳門匹練隔風烟禹穴扁舟度海天入社陶潛須縦酒買山于頔未分錢松邊放鶴雲連屋沙際看鷗雨滿川塵世也知歸去好難謀二頃郭南田次倪孟明集藥名之作呈徐梅所座主結屋常山東復東雪梅霜菊洞天中黄連稻隴雨聲歇白歛松窻雲氣通幙種蓮花泛秋水盃浮竹葉醉春風丹砂欲問飛騰術勾漏何年訪葛翁其二藥籠兼收芝术無空淹逺志在江湖樊籠防已憐鸚鵡岐路留行厭鷓鴣仙去好尋靈枸杞客來謾笑熳葫蘆早休知有遺安念洲上當歸種木奴題老牛䑛犢圖夕陽芳草滿林臯䑛犢烏犍聳骨毛乳哺願令兒長大力耕要似母勤勞南山夜半猶叩角渤海春深總賣刀誰識當年懐愛意慈烏背上晚風高次堂郎司天韻十里壺山春事幽清狂裘馬記曽逰木蘭陂上船如屋黄石橋前酒滿樓客路逺隨南鴈至嵗華真似水東流日長候館題詩罷靜對梅花進茗甌其二瀟洒梅華驛裏人素衣楚楚謝緇塵鳯凰臺上家聲舊虎豹關中天語新老栢千年冰雪操仙槎萬里水雲身雞林詩價從今重好寄歸鴻及暮春題櫟里畫雲中樓觀疑廬阜水外亭臺似剡溪寒瀑落崕珠㸃亂晴嵐隔樹翠光迷舊逰空向真圖見清景應須好句題安得同攜琴鶴去青林白石寄幽棲相士潘碧山久逰江湘間今以武功為石臼司警瀕行索詩漫賦以贈乍捧除書作宦逰猶談相術動時流新豐曽困鳶肩客定逺今多燕頷侯官舎喜居山水窟故園空憶菊松秋一瓢春酒何當共九曲溪頭明月舟夀徐梅所生朝不遇東山來訪玉梅枝不遇山翁祇自持流水小橋攜酒處白雲紅樹杖藜時林逋漫訪西湖鶴何遜先成東閣詩珍重竹松泉石意重來莫負歳寒期林登州集巻四
