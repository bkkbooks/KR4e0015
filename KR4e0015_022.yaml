body:
  text: 林登州集巻二十二明林弼撰説宗澤字徳濬字説陳生名宗澤既冠賔友字以徳濬求予説其義予告之曰子不見夫水乎濬則深深則有本有本則達而無窮所澤者逺矣然水之澤其濬之也以力宗之澤其濬之也以徳徳愈濬則澤愈長而不斬矣今夫祖宗生民之始本一人也猶水之源也子孫支分派衍有大宗焉有小宗焉則水之流也祖宗以徳而導之子孫不以徳而濬之則爾宗之澤不幾于泯乎賓友之命子者良有以也抑吾聞子朱子得濓洛淵源之學我北溪先生實涵泳之而接其派焉陳氏詩書之澤有自來矣雖君子五世而斬生能以徳濬之期不斬者將不啻于五世也勉旃哉士伯字說監察御史孔君士伯謂弼曰某忝聖裔於世為五十六名之行為希故以希普名字之行為士因字曰伯或病伯之義於普無所當而余不欲易也子幸繹而廣之庶有復於或者之言也予曰古人之於字代其名焉耳非必有求於深義也求深義而務美稱者後世之惑也生人無窮美稱容有既也而可以一一得哉故伯仲叔季古人通字焉今夫伯之言長也茍究而言之則在天之徳曰元在時之行曰春在人之性曰仁在昆弟之次則居仲叔季之先者也元長於天而實統乎四徳春長於時而實貫乎四序仁長於性而實兼乎四端譬則伯氏之長而首以若仲若叔若季也夫一元運於無朕而流行乎四時物之生生不窮皆其善之長者為之也天之施可謂普矣猶之人也以不忍人之心恒存乎中則内而親親外而仁民逺而及物皆是道也其所施者不既普乎易曰見龍在田徳施普也然則欲普於施非天徳之長不能與也於伯之義果無所當乎子之字也取之近則為古人之通稱推之逺則合天徳之奥義字無過此也士伯作曰字祝於友禮也子之言其庶矣請書以為説積中字説蜀郡張君積中謂弼曰某不敏㓜而父名以著而賔友命以今字敢求子言以廣其義庶知所以勉也弼曰有㫖哉天下之理未有不積而能著者也未有著於外而不繇於中者也天之積氣極其高也故日月星辰著其明地之積氣極其厚也故山川草木著其文君子之徳和順之積於中者有充實之美則英華發於外者有光輝之大夫學之積也則表裏如一矣南山之松其長千仞其始也尋尺而已耳幹而枝條而葉隂被數十畝繇其根之盤於地者深矣仁義禮智根於心則充於外者睟面盎背而施四體易曰黄中通理詩曰維其有之是以似之蓋君子之自修固不期於外見而自不能不見譬之衣錦尚絅雖闇然而日章焉君學優於躋仕其所積者固已發於事業矣光明俊偉以無負於賓友之祝奚庸予言之贅哉姑述儒先緒論以為説或杯水溟渤之一助云耳友聞字説吾友蜀郡趙君友聞謂弼曰直不敏㓜而父命之名曰直冠而賔友字之曰友聞今既壯矣行己之道未得友直之要取友之道未盡友聞之益恒恐有愧若名與字而有負吾親與賔友之所以期我者先生幸有言以廣其義庶亦多聞之一助也弼竊惟吾夫子言益者三友友直為首友諒次之友多聞又次之則直與多聞皆在取友今趙君之言則以直在己多聞在人不幾於戾聖人之㫖乎噫吾固知君之有見矣夫朋友以信為本茍為不信則己不直吾恐多聞之士將不與之友矣是故夫子言無友不如己者必先之以主忠信蓋在己者直然後取友必端而多聞之士樂告以善道此所以日進於明也然則直内以敬所以謹於己也友于多聞所以資於人也已既直矣繇是友於直而聞其過友於諒而進於誠友於多聞而進於明皆繇已有以致之也昔者子濯孺子庾公之斯其事無足稱者孟子取其端人取友必端之言親友之所以期友聞者蓋必先於是不待予言之贅也予姑効一得之愚云爾友聞善學能文辭不妄交遊以才操舉湖廣憲使其祖若父皆歴官外郡世澤有自云常平道人説丹陽童先生以常平道人自號序而贊之者非一辭矣復質其説於弼弼曰噫平不易能也常平又豈易能哉夫無險無陂之謂平不低不昻之謂平無險無陂其體也不低不昻其用也是故其静以宅心也湛然虚明如水之止險陂無自而生焉其動以制事也的然如權衡之稱物移前却後隨其輕重以為低昻莫不適其平焉彼衆人者非不知平之足貴也溺於一己之私雖能暫平而不能久故行險徼幸無不至君子則不然内有常也故心無時而不平外有常也故事無處而不平暫不足言矣蓋平而常平則内無城府外無町畦無適而非斯道之正譬之康莊九逵如砥如矢車安馬閑一驟而千里其視羊腸詰屈輪摧軸折跬步之間足跲而脅息其勞逸難易百相邁也嗟夫洪範平康正直為三徳之首而三徳實五福之本先生學以達政嘗仕郡幕其立心與制事持平以畫諾所積者厚矣宜夫順坤葆和年及耆艾壽考康寧以享榮養其食好徳之報蓋未有涯也公名元善今以子亨貴推恩為吏部郎中云天淵説浮屠溥師自號曰天淵求予説其義予曰子以是號必知其說矣奚庸予之贅哉予之所知儒論耳子之教不能知也子不窮其所當知而求其所不必知能知而不自衍其説反求其説於不能知者焉何子之厭常而喜新也師請益力曰語教則有異語理無不同子姑以子所知者為我言之未必無啟於余也則告之曰嗟夫高莫高乎天深莫深乎淵天淵之間邈乎相懸其勢則然然道大無外雖天外之天淵外之淵亦無往而不在焉聖賢有見於道之流行上下昭著而不可以名言故仰而觀乎鳶之飛俯而觀乎魚之躍而直指以示人于以見斯道妙用雖極天之高極淵之深初無間於兩間也至若聖人之徳溥博淵泉蓋其周徧而廣濶静深而有本真如天而如淵此吾儒所以論天淵者若此師之所論雖余不甚解然亦有聞其一二試為子言之夫世界無邊法亦無邊天之可見者穹然蒼然淵之可見者沈然黝然夫孰度其高之極測其深之𤣥但見高虚洞徹無倪無端究而言之均為一空色相不足以擬議言語不能以布宣人知天之為天而不知淵亦天也人知淵之為淵而不知天亦淵也故謂天淵為二固也謂天淵為一亦然也萬象羣生均囿此天百川衆流悉納此淵譬則萬法歸一一歸自然師其然此言乎抑否乎溥曰是可廣吾意大吾觀矣請書以為說一齋説盈天地間林林棼棼萬有不齊物之至衆也而一理足以混而同之接於吾身千端萬變大而父子君臣小而視聽食息事之至繁者也而一心足以妙而宰之蓋萬物各具一理而萬理皆具一心若能窮一理之極則足以盡一心之量矣雖然是特於人而觀其一耳盍亦求是理之出於一原者乎原者何天而已一隂而一陽繼善而成性然必有不倚乎隂陽而為動静闢翕之本是即其原之一而為體統一太極也故兩而為儀四而為象八而為卦推而至於變化之無窮莫非一之所為惟一故神惟兩故化邵子曰造化向一中分善觀天者固存乎一善論人者又孰外於一哉聖人全其天之一故能盡萬物之一理渾然於中而泛應曲當於外所謂一本而萬殊也未至於聖則理有未全其所以操存省察於動静之頃當無時無處而不致其力於一也能持其主一之心則敬足以養之於始能守其惟一之心則誠足以實之於終夫如是則天之一與夫聖人之一舉不出乎吾心之一所入之途雖異所至之域則一而已南靖綜理别公以一名齋或質其説於予予以聞於先儒者為廣其義君聞而遜曰吾之所謂一齋不過古人一丘一壑之云姑以寓意吏隱而子推一理之當然與其所以然者以為説真足以發甕雞之䝉廓管豹之見矣幸為我書之將以為座隅之警遂不敢辭解寓軒解黄君子維以寓名軒人咸異之或曰天地逆旅也萬物過客也人亦囿於物者寓之説其有取於䝉莊氏乎或曰天地堪輿也人囿於中者也必有以盡並立之理寓之義其有則於聖賢者乎又有為之中說者曰知吾身之為寓當盡是理之所寓君之意或在於此乎博陵林某解之曰君優學躋仕所以自見者皆其積實之所發謂其有尚於清虚之言陋也謂其有勉於聖賢之言固正矣然謂知身之寓故欲盡理之寓則亦未免於有為而為之焉宜為君言哉其於軒之名均無所當也夫必有居而後有寓求寓於外孰與求寓於内之為切乎軒者吾身之所寓也而身又心之所寓心又理之所寓者也理寓於心而為心之主心寓於身而為身之主譬則身寓於軒而為軒之主也古之君子孳孳而夙興乾乾而夕惕非不知安其所安也夫亦動察静養以存是理於一心存是心於一身焉耳反之於心而理之所存者明反之於身而心之所存者正則内修矣内修則外無顧慮矣夫如是故身之所寓用舍窮達夷狄患難無所擇而安焉猶之軒也逺而山林近而朝市一隱一顯軒固自若也繩樞甕牖丹楹刻棁或約或豐軒無擇於是也是故善觀寓者必明軒之所在則内焉有以安其心外焉有以安其身矣君結屋讀書古盱山中不以得於身心者為己之樂而思推其藴於人遊宦江湖壯而强矣是軒之寓與其身之寓其地亦非一矣華顯之所歴艱阻之所踣而其所守之素曽不以之而或踰焉蓋其中有確然者存其視世之轇轕雜揉一無芥蔕猶游氣紛擾而太虚湛然也存是理之寓與是心之寓而不恤吾身之寓廓焉大觀無適不可則雖軒亦外物也寓乎寓乎豈徒寓目之云乎軒乎軒乎豈徒軒庭之間乎君名譽方起將隨所寓而澤於民以副朝野之屬望幸毋以軒之寄傲為可安而厭於游寓之久也作寓軒解文東岡洲定光堂上梁文伏以紫霞丹嶼仙洲東去有三碧玉千峰佛國南來第一珠林改色錦里増輝恭惟碧玉堂頭玉海大和尚法窟藩垣祖堂柱石玉麈尾劃成江海鈯斧聲飛動風雷一擔挑來清淨地便張鋪席竿木隨去戲劇場儘作詼諧乃睠蘭若之精廬實在枌榆之近地手中神水孰云鄉關一滴之私眼底孤雲獨憶水丘數曲之舊信作事須憑大願力況出世曽結好因縁是用廣其隘而拔其卑庶可光於前而振於後幻出南巗之勝槩永植東岡之福基寳殿翬飛對釋迦老子如在其上華堂鳳翥看定光古佛蹭以之中爰舉修梁敢將吉語闕東海門初日曈曈雲近補陀巗路地如㣼下闕疏法濟寺報恩塔疏聖明地拓萬兵衞重鎮南荒隆壽峰高千佛臨遥瞻西土惟大臣不負靈山之付囑顧小衲敢忘厦屋之庇庥戴禮真身盛揚清徳恭惟指揮副使相公詩書賢將簮笏舊臣佐興運於淮淝播威名於閩越封侯萬里班較尉之筆勇投起家五年魏將軍之㦸森列既申軍律之嚴整每念梵教之陵夷解語鶴歸無復人民城郭聽經鹿去多少烟雨樓臺坐令烏鵲之安棲喜看龍象之起舞兠率陀移來天上前長者幸爾側地布金窣堵波現在人間衆沙彌自能獻花酌水慈恩莫報善頌具陳伏願城壑金湯河山帶礪成八萬四千功徳明長壽於金剛領三百六十職員致隆位於冢宰謹疏上元天官疏意天官有命斂百福以錫庶民邑牧非才精一心以事上帝厥躬累職敷袵陳詞伏念臣某等質本樗蒲學多茅塞繆綴名於黼座叨出宰於劍江製錦以來尺寸莫循於卓魯埀衣而治涓埃曷補於唐虞兹當賜福之辰敢控保安之悃伏願民生蘇息歲事豐穰桃李競春陽藹一堂之和氣桑麻深雨露均百里之恩波普與蒸黎同綏繁祉謹疏林登州集巻二十二
