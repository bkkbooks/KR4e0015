body:
  text: 林登州集卷二十三明林弼撰題跋書驪塘危先生墓銘後驪塘危先生守吾漳多惠政其尤著者雖逺猶有徴也作龍江書堂今有祠存營義冢三則有石記存奏蠲無名錢又有郡志存然是特一郡之惠耳其論奏凡四十條皆所以惠天下者則施之未究也惜哉今太朴公以文章振家聲參國政太朴仕至中書遼陽甘肅三省左丞其將有以究先生之未究者必矣昔之惜也又豈不足幸於今耶敢書此于舊銘之左書虎溪待渡圖後友生蘇用賔分教漳庠將歸虎溪之上石隱上人因徴林君梅隱作圖以贈之命曰虎溪待渡持以示余俾余傳所以畫之意余謂士君子之處斯世其所當自勉者修身行己之要而已至於時之遇不遇亦惟靜以待之固不能汲汲躁競以自貽顚跲也在易水在天上象為需陽剛欲進而坎險在前為不遽進而有待之象故其辭曰有孚光亨又曰貞吉利涉大川蓋必有孚于中然後光亨若又得正則吉而利涉大川矣斯為善處需者也向使遇險不能有待而必勇往徑涉則覆溺之禍至矣虎溪雖小渡者必待舟以濟茍或馮焉其為溺均也用賔年富學力方將自見於世必有以濟於人者然而不能必進而有需於時之流行而坎止也石隱亦可謂知用賔者矣用賔其尚佩服有孚之言以至於光而亨則將如初之無咎二之終吉五之貞吉上之敬之終吉矣孔子曰君子待時而動需於前而濟於後猶待渡而終渡也以是廣名圖之義不亦可乎石隱作曰可以教用賔矣請書于圖之左方書徐永愚所得趙虞二公翰墨後趙文敏虞文靖文翰近代稱絶真徐氏家寶也書西臺慟哭記後宋相文信日不能國矣公起兵閩中尚多應者黽勉赴難踣而復奮所謂親疾雖不療子不容不進之劑也時江東謝先生枋得亦起勤王兵久之無功三山謝先生翺以布衣參信公軍公甚禮之洎公北上以死翺於燕臺越臺嚴臺九年凡三哭之蓋深悲南風之不競而思自附於節義之士也後謝江東被徴不食死翺亦悲憤亡聊以終德亦偉矣公不負國翺其忍負知己哉向使徴而激之則亦將如江東之為矣豫聞江東好論申包胥魯仲連事言輒奮歎欲身履之翺之三哭得非有感於昔人成敗之故哉九京不作誦其慟哭記冬青樹引等篇令人毛髮欲竪張君孟兼又從而訓釋其實翺之義白矣他日二謝伯仲以稱者徴於君言矣書狄梁公進諫圖武氏暴忍權數穢竊宸極親若二子猶不見容唐祀不絶如帶矣幸梁公特被信重而公周旋其間所以不忍引去者為李氏地也他日折三思復廬陵卒於移周為唐微公反覆進諫之力將何賴哉嗚呼忠矣書丘孝子傳後余讀宋太史作孝子丘鐸傳謂鐸廬母墓地多虎每哭而虎輒避之不忍傷嗚呼純孝之感其神乃若是耶昔者白虎晝馴夜則豹環其廬而卧虎雖暴亦有母子也寧謂不知孝子之心哉吁鐸亦可躋於古人矣書張起鳴松楸圖後右松楸圖張君起鳴所以寓其永思之情也起鳴幼失怙祖父母與母鞠教之既而祖父母相繼即世兵饑相仍二喪十年始克葬不數歲復喪母松楸霜露相望數里許而起鳴之兄弟子姪皆蚤世孑孑焉游宦于他境為豫言未嘗不涕泗交頤也吁起鳴仁孝人也仁孝之報如持劵取償吾知起鳴必有以昌于後也故為書此於圖左書王氏所録遺文後士大夫世族履行以文章之傳而信蓋前代紀載皆直筆無一毫阿私也豫觀益國周文忠公志王率齊先生墓歐陽著作志王逺叔先生墓知其系出琅琊至宋沂公益大繇青徙儀真而新喻而廬陵擢科躋仕代有其人率齊逺叔雖隱約未施而其學其德卓卓可稱宜夫二公詳述之弗置也聞孫與齡又能孝念厥祖而録銘文於兵革之餘其世族履行之懿益可徴于後矣繼自今若子若孫思以繩繩祖武者尚永寶於是集哉書棣鄂軒記後常棣之詩作于周公其述處兄弟之道最詳且切首取棣以為興鄂則其華外見之貌後世兄弟之相友相親者取之以名其同居之堂故有取於其詩也夫詩人之托物興詞蓋深有味矣松陵徐願幼失怙與兄本奉母甚謹兄愛之篤每以逺大期之願繇邑弟子員入胄監選給事中書他日持棣鄂軒記示余余曰學莫先於孝弟子之學可謂知所本矣本碩則枝蕃枝蕃則華盛詩云常棣之華鄂不韡韡繇其本之培也吾知徐氏兄弟必顯於後矣書記左而歸之書敬齊卷昔尚父以鷹揚之姿翼亮周武成克商功而丹書進戒拳拳於敬之一言指揮夏公以親臣提重兵佐上取天下而能悅禮敦詩以敬名其齊居可謂篤學古之志矣使得處尚父之任則豈讓美前人哉書倪仲逺山水卷右倪隱君仲逺所藏雪山圖竹樹水石㸃染甚精逈然有幽逺意餘杭佳山水隱君放情遊覽得其真趣故於畫亦能鑒賞其精他日或倦于躋歷髙深時出此圖一披玩焉則忩几之間雲山佳致固在目也抑吾聞善隱者雖在市廬猶林野焉蓋深乎隱而心乎山水者噫吾於是而知隱君之心矣書平林烟雨圖武夷神仙窟宅其景萬狀晦翁棹歌已盡其奇烟雨平林五曲景也方壺外史寫而為圖殆得趣於登覽之餘者金華高士楊君南峰得而愛之夫景在天地間隨寓而形無彼此也矧金華洞天之勝有同於武夷者乎高士歸八詠樓日對溪山其有得於平林烟雨之趣亦云飫矣而猶玩是圖不置焉蓋樂之深非惟愛其真雖其似者猶愛之也抑所寓古心無失者耶書陳一欽小景圖近世稱善畫不乏人然工於長幅者或拙於小景得意於蒼古者或失趣于清潤過婉麗則氣韻索然矣過枯率則精神蔑如矣餘杭張公師䕫翰墨之餘能于前代諸名畫集其所長自成一家大幅小景布置各有法於蒼古之中而有清潤者存故雖著色而不流於婉麗雖不著色而不傷於枯率其精神氣韻與人逈異而未嘗失古法公宦游閩中最久得其指授者往往知名陳君一欽未及張門而能默契其法下筆咄咄逼真是其敏慧所造也張公不可作矣一欽年方富藝當日進他年踵張公之躅人稱其青于藍者必一欽也夫一欽為朱君文貞作小景因為書此于圖上書黃誠甫言志賦後詩為離騷之宗而離騷又為賦辭之宗詩言志也騷若賦亦各言爾志也古之君子道與時違志不獲逞率托於言以舒其憂而泄其憤自屈氏以來作者非一矣然惟知道者為能不怨不尤以不失其志之正今觀黃先生誠甫言志賦其志皆古人之志其言皆古人之言其所以自勉自擇者莫非古道則其所趨之正非止於舒憂泄憤而已先生年將及頤而其詩若文愈雅健守古法豫知是賦與詩文並傳於世也必矣故贅書此于諸作後書趙子昻馬圖趙公松雪文翰名天下而畫亦並稱焉蓋書畫筆法最近而書之妙者其畫必精然善馬者未必善于人此卷馬既神駿而奚官蒼髯側目極臻其妙蓋唐廏多以回齕習馬者為圉人也於乎士生於治世不得以勳業自見所可見而傳者文章與翰墨耳公以文翰名家畫特其緒而與二事並稱者蓋無所不詣其極也史稱鄭䖍三絶公何讓焉因書此于徐君天祥所藏馬圖後書馬拜說後汴省理問官趙君元彬奉丞相河南王命訪求忠義之湮沒者于閩道泉驛馬見之而拜衆皆驚異莆陽吳性傅溫陵謝雲從氏既録而論之矣或訂其說于豫豫謂天之賦人物雖有偏全之殊然毛蟲之中惟畜為近馬在畜物中又其最靈者宜其於訪求忠義之使而有以動其心也在易乾象為馬於方為西北馬之稟固忠義也天下多故馬努力戎事於主恩為戀戀焉馬之性固忠義也此以忠義感彼以忠義應故其低俯屈伏卑俯鞠局蓋出於中心之誠服雖不可以詢而知猶可以揣而識也昔者孝感而白兔狎政感而文雉馴恩感而蛇銜珠化感而虎懴罪至頑至暴尚可感孚矧其近人而靈者乎惟聖天子中興相王以忠義倡天下其感人者至矣趙君周爰咨度猶能充其感人者而感物焉將以和感和而鳳儀于庭以仁感仁而麟瑞于郊豈特孚一馬而已故余贅書此于二說後跋題蔡端明手蹟後晉帖傳於世者多書牘而又多作草書前輩宗之蓋作草猶作真也端明蔡公書法入妙此本於二王咄咄逼真吁書心畫也古人謂心正則筆正端明立朝謇愕心一于正參政公所以寶藏乎此者余知非徒在於墨妙而已故因出示而敬識之跋童中州和陶詩後五言肇於漢蘇李相贈别一時之倡和也晉魏以來有擬古或曰擬某作則固追和前人也矣陶詩作于晉宋間不雜時態敻然絶出如殷盤周誥質素古雅益羞澀不可前陳後世若韋若栁多用其題模放步驟猶未和其韻也宋蘇子瞻氏始因韻為和篇若干首金華童君中州善為詩而獨于陶愛其蕭散沖淡有類於古人所謂溫柔敦厚之教者又因蘇詩篇數之舊而重和焉蓋其尚友古人百世上下猶神交焉非特于陶于蘇為然也嗟夫陶蘇二公之詩曠情達視而能委順以樂其天者也黃魯直謂其出處不同氣味相似君子以為知言中州藴深發茂方將為世笙鏞以鳴治世之盛顧乃以山林枯槁自居夫茍得二公之所以樂則無人不自得于出處奚擇焉衡門考槃之詠尚毋為太早計也跋豐城曲江孫長仁族譜後昔杜工部為曹霸作歌喜魏武之文彩風流尚存今觀豐城曲江孫氏族譜自吳大帝以來詩書之澤綿綿不斬代有偉人其賢於曹氏之後逺甚嗚呼豈長沙討逆忠義之長有非當塗之可擬者歟書張師䕫枯木圖我如枯木久無春故寫枯槎寄上人濩落不為天外夢光明與佛鏡中塵乃餘杭張師䕫詩書董寄封崇堂頭時至正癸巳三月也右輒醉翁作枯木圖寄泉封崇上人而識其上也翁以三絶名世晚歲作畫多自題此幅蓋兵餘非封崇所能有故雪其題字似恐非主者所物色方君師凱偶購得之出示余余視其字蹟故存也噫自古名書妙畫考其所傳或逺在千百載之上豈必專寶一家而以他人為嫌哉慨先輩之不作感鄙人之無見幸是圖之不終於不遇知也誦其詩而書此于左書靖上人隨住吟槀後古人之詩作者不少而僧詩率多工緻清逸竊意方外之士其居其遊雲巖風壑之間烟簔雨棹之外景之所接者多情之所發者正其匠意幽深鍊辭精切有非泛然留連光景者所易及也若齊已貫休靈一輩皆在唐諸作者列近代詩僧所在輩出而溫陵自趙吕傅阮諸公詩派之傳厥有自來故業是者往往知古法今觀間極靖師之詩律嚴而不刻語實而不陳殆有得前數公三昧者豈余所謂匠意鍊辭幽深精切者耶吾知異日集詩者必有取而傳之也因為書此于其槀後書陳所翁畫龍陳長樂畫龍得名宋季近時士大夫咸寶之然率多大幅鱗鬛跡尾少全其筆者蓋晚年倦於摹染而快於揮灑故也此卷幅小而身全神揚而氣逸豈其年壯力勤而意之專者為之歟䝉泉徐先生得於外舅鹺使方公故家舊物而印識特異他幅其為真跡無疑兵餘物化先生子天祥君藏之獨存嗟夫物不易得而尤難於守天祥思外祖之家珍感先人之手澤尚永寶之哉書周君玉安患軒記後古之所謂君子者以其能於憂患安樂一視之而已安樂地順處之易憂患境逆處之難處其易常人或能與處其難非君子不能及是故君子不以憂患視憂患而以安樂視憂患蓋惟盡在我之所當為而外至者皆所不計則雖患猶安也易陳九卦以明處憂患之道亦曰盡其在己者而已錢塘周君君玉善學篤義時譽特推先被命使西洋萬里涉海以投異域人皆難之而君不恤也因名其寓軒曰安患而自記之嗟夫世之懦夫曲士溺於所安足跡不忍離堂簷一遇憂患失身喪氣無復人色然則周君之安以處患其可謂君子也已書莊少師示兒語後凡人克自樹立未有不儉而致然者蓋儉則謹謹則不縱不縱則志專志專則勤勤則不逸不逸則慮周志專於內而理察矣慮周乎外而事立矣故曰勤儉者樹立之本也少師藻思齊莊公自弱冠遊鄉庠選太學清苦自將而性學是力雖逮富貴猶如布衣時見其示兒語諄諄焉詳及乎是嗚呼此少師之所以為少師而莊氏宦澤書種之所以濬且茂也後之子孫思所以襲芳趾美於百世亦勉於是而已矣公之五世孫師古録以見示謹為書此而歸之師古善學能文辭其諸父南堂菊堂二先生皆以儒世其家無忝祖訓云書張師䕫所藏康里子山書捕蛇者說卷後康里文獻公真草書入妙品此卷又得健筆佳紙之助故馳騁精神略無蹇滯又妙中之尤妙者也師䕫張公以翰墨為僉憲趙公宗吉所重故特以此歸之嗟夫康里公之所以書趙公之所以重張公之所以寶而藏者得無意歟誠以是篇足以為為政者規非徒寓意翰墨而已九原不作惜不多得數十本以規於人人也書馬翰林易之楓亭女篇後風人之詩譎諫以示戒猶足以感乎上矧使者之所採而陳者乎豫讀楓亭女篇其辭苦如石壕吏其心仁如㫪陵行讀之令人掩涕昔白居易作樂府以規諷時事流聞禁中得為翰林學士今君職翰林持使節行復聖天子之命又豈特流聞而已豫既為南民幸又嘉君之善於使也故為書此于篇後書王無息小傳後王無息髫齓從師事不避勞幼而知義固異常兒矣既長而仕宜其於義益明不以遺金可利而汚其行也彼貪墨之儔猶將攫人之金而甘心焉無息義不茍取若此學之力不可誣也書高仲暉進齊卷後進之名有二義焉勇往直前循序有漸之謂也君子之學固當力於進然不容於驟進也勇往而不知循序則鋭而易退循序而不能勇往則將半途而廢矣易曰天行健君子以自强不息曰自强所謂勇往直前歟曰不息所謂循序有漸者歟天之行四時也非不能使之即寒暑也而必以暄凉為之漸焉其生草木非不能使之即成長也而必莩而甲甲而拆漸而枝枝而條焉學之道猶是耳聖人之學自志學以至從心由善信以至聖神必孜孜致力以勇於進必循循有序以漸而進譬猶用兵雖鼓勇作氣而坐作擊刺之有節不愆于六步七步乃止而齊固不敢輕敵深入以取敗退也國子助教高君仲暉齊以進名蓋其先府君所作以訓君於志學之日也薦紳先生為繹其義無餘藴矣豫不敏輒以先儒緒論足其說焉書何執中所藏趙松雪帖余曩聞諸老言松雪公神度散朗有晉人風故書翰於鍾王元常逸少咄咄逼真豈非心畫有千載神契者耶此帖於平易中間出奇妙又其精絶者寶之也宜書柏齡字說後五福必首壽人之福莫大乎此也指物而質焉則壽齡之長莫松柏若也夫惟福之大人情之所同欲故物所愛必有以期之又必有以況之亦其情之不容己者也千夫長西弼氏生而父名之曰長壽冠而友字之曰柏齡名以是固見愛子之篤字以是尤見愛友之深詩人稱願之詞曰如南山之壽其是名之意歟曰如松柏之茂其是字之謂歟豫與柏齡雅相愛同一期而況之之情也故書此于易之先生字說後書豐城周伯聞所藏周石鼓秦琅邪二碑法帖後字原於古不考乎古非知字者也鳥跡科斗邈不可詰矣周之石鼓古法猶存也秦嶧山碑已非故物詛楚文又最後出所可考而信者惟琅邪石刻耳然則自周而降惟秦為古也豐城周伯聞氏雅志好古於書法必考其原取石鼓琅邪二刻合為一袠蓋深幸夫未盡於磨滅而古意猶可識也因其出示書此而歸之跋歐陽公與蔡君謨手帖後歐蔡二公為慶厯名臣道同心協相善之厚其書問宜多往來此帖稱端明侍郎蓋其嘉祐之前觀其筆力遒徑馳騁臻妙實自成一家法老蘇論其文曰歐陽子之文也豫於是書法亦云題豐城劉孝子仲安卷漢緹縈以未笄之年贖其父淳于公之刑天下稱為孝女劉氏子孫孫年十二能詣闕直其父秩之寃真孝子也哉視唐杜審言子并刺父讎以死抑有間矣林弼書題豐城徐以觀卷後昔徐孺子躬耕東湖非其力不食漢世高之以觀以耕為樂蓋其餘裔聞其風而有立者歟跋豐城航溪朱光孚詩集後詩本人情情真則語真故雖不假雕琢而自得溫柔敦厚之意豐城朱光孚所為詩多平易無艱險語豈非情之真而然歟使天假之年則進於老成當未已也惜哉子公路出示舊集故為書此而歸之跋周伯溫書圭齊所作揭曼碩貞文書院記後近代以書名家者固多然善篆者唯二人焉若趙吳興子昻周鄱陽伯溫是已此卷鄱陽所篆筆力遒徑深得嶧山石鼓之法劉本泉氏偶購得之因其出示故為識此題八鴈圖右畫鴈八各有態飛者一宿者二仰而鳴者一回顧而鳴者一俯而唼者二鴈奴警而鳴者又一畫史寫生固求形似然以余觀之又有形外之意存焉夫春而北秋而南隨陽而往來有君臣之義焉或飛或止大小以次有兄弟之序焉羣處並食呼儔而命侣有朋友之好焉奴也晝夜食息非常苾馨不敢或怠有主僕之情焉畫史固不能無意於是矣户部郎中張君嗣宗出此圖示豫豫知君於是數者必有得焉非徒形似而已不然畫之事愛者多矣君奚獨有取於此哉畫史其亦知所尚者歟張君之好其亦知所重者歟題趙文敏公與袁禮部詩簡趙文敏公詩畫皆妙絶而世稱其書為盛噫豈惟書哉雖稱三絶可也豫嘗於詹伯玉推理家得其蘭雪琴帖公所與袁子方禮部者也今觀其子朝遂所藏詩簡數篇筆力遒健有龍騰鳯翥之態蓋公與禮部以詩琴相與最深朝遂追念先輩尚永寶而傳諸題東坡畫東坡先生文翰名百世畫特其緒然其傳一也此本得善筆佳紙墨之助故尤精妙升賔其永寶哉書姜德之墓銘後豫讀胡先生仲申銘姜君德之之墓知君以儒為行非但所謂循良吏者先生之文足以傳信後世今子焴之賢有以顯揚前德之不亡者在是矣題羅稚川畫右稚川羅氏畫一幅坡陀樹石綽有荆關風致而山巒人物間類馬逺蓋兼用諸家法也舟中褒衣幅巾坐者二人筆牀茶竈歷歷可指豈𤣥真子之徒歟噫稚川亦有得隱處之趣者矣題王文壽族譜後豫嘗感後世之序世譜者必逺求同姓之顯達者而宗之吁是豈可厚誣乎哉王文壽氏譜其系自四世祖始以上無考者未嘗妄有所本也斯可以傳信後人矣子孫繼承克大其家吾知是譜之序未艾也書黃閎中詩集後弼與閎中生同年少同游而性坦易同嗜酒雅相愛故恆相規益比以微宦故相别且十寒暑今年夏獲會于京師示豫近詩若干首率五言蓋其陶情漢魏馳騖樂府出入乎陶栁陳韋諸家其語溫厚而雅曠若端人正士不事邊幅而動容自暇裕若殷罍周卣不假琢刻而形製自奇古於乎風雅寥邈猶於閎中之詩識其遺音三復之餘喜閎中之進而重愧豫之日退也故書此于藁後道伏龍虎圖中書從事屠君仲英持畫軸一示弼弼展而觀之一道人立撫馴虎龍伯拱俟若聽命者蓋神仙者流其功行既高則能役使鬼物龍神虎君呵護左右撫而畜之若犬羊然壺公以龍為杖董仙使虎賣杏凡此類也矧其養丹神鼎坎子離午鉛兒而汞女其屬亦龍虎也是故畫師而闕得於形外之言雖然龍虎異於常物者也惟心正者為能服之不必皆神仙也負舟祝之而逝傷人祝之而服是豈有假於道術乎君生際盛朝覩雲龍風虎之會大將起泥沙沛澤乎人著虎東渡江之異政非徒區區道術之是尚也故書圖左以俟林登州集卷二十三
