body:
  text: 林登州集卷八明林弼撰送序送邵武司李馮公之官序南勝巖邑也朝廷選吏吏之務戢民也至正十三年春省臺大臣承命銓選福建常調官若曰南勝控諸畬民善驚喜鬬弗靖選令惟賢興化架閣馮某勤慎練事嘗從平李冦有勞其進之秩使尹是邑公至則完堡以固民興學以導俗去苛弊簡牒訟强抑而弱扶之民曰是神明也惡可或干桀驁者惡其妨己每聚羣不逞訛言訌亂公屹不為動曰尹不民擾民敢尹擾殺一尹則一尹至尹不畏死也未幾有賊數百人夜入邑邑民皆走公開門偵變賊突至刃傷公脅公坐罵曰死賊奴尹承天子命以父母汝者也汝欲殺汝父母耶賊駭愕散去公絶復蘇治瘡愈即出視事其方寸硿然有絶人者政成五年升邵武郡推官旌其庸也檄既下治行事漳人士咸歌詩以道之來徴豫言豫謂公厯省閫積年勞贊郡府選邑令朝習政典人稱吏師以南勝之反側邵武之簡靜令之勞劇推理之暇裕較而觀之其設施難易為何如也抑明刑之要在於知法外意公専是學而専是職他日平反之德所積者必厚矣又奚待於豫言哉送憲府從事鄭君懋夫序天朝所以經制國用者莫重於楮幣所以綜理吏治者莫肅於憲紀憲紀不肅則吏治不張楮幣不流則國用不裕夫天下猶人之身也憲紀耳目也不撫其身則股肱弛矣楮幣血氣也不周於身則疾疢生矣然則楮幣之流壅國用之裕乏吏治之張否憲紀皆不能不加之意也自江淮盜起兵荒連年物重貨輕楮幣之行僅當昔之十一二至有家纍千百緡而道莩者有司莫能禁憲府患之乃議所以變而通之之法以為兵荒之屢楮幣之壅莫甚於閩而閩又莫甚於漳選從事以為有司之監非得通練亷恪之士不可僉謂鄭君懋夫宜君至則權法以祛弊審勢以度宜不棘以濫刑不徐以廢事唯以方寸之印識幣背民貿易無所滯又以榖價騰則幣力詘乃樽節境外商船不得多糴湧價行之旬月民皆言便歌之曰喁喁涸魚疇或濡之孑孑疲民疇或紓之糴遏於境幣通於市從事之賢伊我民之利邦人士采民風為詩以華君歸來請序嗟夫楮幣國家之大信也信無不孚猶水無不流彼習故常者見其或壅也則曰水不善流豈理也哉楮幣之壅久矣鄭君疏而流之亦以國家之信而示之耳不然幣之為法滯矣何方寸之印能使蚩蚩者氓斷斷而不疑哉惟我朝祖宗立二十二道憲司以綱紀天下凡國政之得失民生之利病皆得舉悉而興除之况楮幣之行實足國裕民之攸繫歟使者變通之有術從事銜命之不辱是可序也已鄭君儒術飾吏嘗從林公清源遊其學以達政蓋有本云送實逹道之官興化序至正戊子春豫試藝京師實與西原馬君原德同上春官原德嘗與豫言實君逹道之賢是年原德成進士豫下第南歸適逹道來監漳參司相見即定文字交知其僑京口與原德居同里而學同門也又與余志同道而習同業也繇是交益久好益殷而相規敬益至今年夏達道辟行省掾未行朝廷銓閩浙郡縣官選君監邑興化檄下分閫復留贊軍務君以監邑朝命也不可後即治行來言别曰吾聞贈人以言仁者之心也走辱與吾子遊有日矣今别去子能無言乎噫豫之所欲言固君之所已行者矣言不言不足為君損益也漳郡左民悍冦警無寧嵗監參司者城池寄焉冦盜職焉當山海之冦迭發逹道外將兵給餉內結民嚴守出則賊衄入則城堅所寄則舉所職則治非忠乎事母夫人色養備至退食怡怡侍傍問燠寒飽饑具道一日所决訟以聽慈訓惴惴焉惟恐負民負君以負其親非孝乎陽亢宗曰凡學所以為忠與孝也豫固因逹道之所施而覘其所以為學矣興化為莆外縣非參司福郡之比山深民淳號為易治又非漳郡多警之似異日課令之最書上上考而璽書褒異者豫於君焉卜之矣送吕伯原應辟閩憲序今朝廷選材惟於臺憲為尤慎官臺憲者辟從事書佐將以廣聰遠明贊禆不逮尤不容不慎焉然敏辨者或深忌不知體簡厚者或疏緩不立事必也治體之明吏事之練而無偏於所謂深忌疏緩者是憲臺之所以辟書佐之所以稱也吕君伯原學足以知體材足以立事官世澤也而紈綺之無襲職近民也而謗讟之不聞郡侯器而薦之部使賢而辟之吾知伯原必能推其學展其材以無負於臺憲慎選之意也已抑余聞君伯兄憲使公嘗辟佐閩憲乃今敡厯中外為時聞人伯原繼踵以升一門棣鄂輝耀先後他日史氏載清白世家將以吕氏為稱首矣故豫於君之行也喜而序之不辭送張以仁言事閩省序張君以仁金浦傑士也業儒而飾吏識時逹政慷慨有大志當李冦亂漳朝廷命大臣提兵討之部使者督師海上久無功君時避冦溫陵畫平冦之榮以干部使者左公世臣公採而施行之動中事機無失公曰張實吾左軍也凡軍事悉咨之既而師壓境冦遁穴君亦還家海上公版授以官君辭曰冦至則避冦退則反妻耘子耕山採水釣所樂者在是也官賞非敢兾也邇年潮冦屢警瀕海鄉落苦之君募鄉人掩擊獻俘大府終不言功每念國政之弊民生之瘼未嘗不嘆息流涕以為弊之深瘼之重者莫若鹽法因條陳利病纎悉不遺不訐以激不迂以疏大率以鹽為天地自然之利上之人惟當樽節愛養於民而已必欲上有以裕國用下有以紓民力莫如於産鹽之地募民自煎自鬻而貢其課則提鹽之官不必設私徙之禁不必嚴工夲之費不必給舟楫轉運倉場出納皆不必勞將見亭竈日增課額日羡國家殷富民物阜康在一轉移間耳聞其言者婦子嘻老者泣壯者拜而于加額官若吏嘖嘖感嘆以為關於民生國政之大里中生林某壯其言飲之酒而告之曰士生斯世凡甲兵錢榖籩豆有司皆吾分內事茍可禆國政者雖進草茅之言不為僭也昔馬周以一布衣因常何上言致擢御史今制陳軍國利病者旌官子之行豈無知子者哉矧行省肇立得以便宜制方面子能為倒懸之民一號於薇階之下吾意忠國仁民者將為子而感泣矣若然則子雖欲名之逃而名將子隨矣且子獨不聞我東溪高光先生以胄子抗疏乞除六賊至今讀其書疏英風義氣令人骨凛毛竪君能以古人自期待則言雖不行猶傑士也於是漳人士咸為詩歌以道之請書豫言為序豫樂張君之為人輕官賞而重忠義也書之不辭送葉掾歸閩省序葉君仲安始以吏事進有能稱繼以戎勞上司勳擢漳郡架閣今福建行省平章政事普公器其才升邵武二幕尋辟為掾普公方承制行事鋤奸植善威德南被以漳守羅公有靖邊功便宜授行省參知政事分鎮漳泉君實銜是命以來既還有讒君於平章公者曰葉掾以將命故受馬數匹白金若干斤公曰羅侯嚴果明察豈一介之使所能欺哉葉某以九品官吾起辟為掾葉德吾深矣詎忍汚負於我耶又有讒君於參政公者曰葉君之來吾燕以勞之猶辭焉金之不受不問可知矣既而讒言愈紛或謂君曰禍將不測子其殆哉君曰夫明而逺者不行浸潤之言寧謂二相之賢而行之哉且譖始之不溺則雖蠅營之罔極終亦不能惑我二相之聽矣於是平章公遣信厚者與君面質於參政公曰無是也備詢於舉者皆曰無是也前讒遂白普公信君之誠羅公益厚遇而重薦之君子謂普公視之遠羅公察之明不以讒之惑而加人之罪可謂有大臣之度矣向使讒生之初二公不加之審遽以罪君君不理於口直受自誣於二公之盛德豈不重有纍也耶傳曰川澤納汚山藪藏疾易曰包荒用馮河不遐遺夫人有汚疾上之人猶當廣包荒之量含垢以容之况於疑似之言未必有汚疾之可議者乎豫樂二公德量之有容而嘉葉君誠心之不欺也故於其歸序此以釋疑于人云送孔叔原長泉山書院序以聖人之裔學聖人之學而敷聖人之教于人其知本者歟斯君子所與吾䣊之所榮也余友孔君叔原實先聖五十七世孫秀頴善學材範夙成弱冠列校官教漳之南勝巖邑也民獷而俗悍君掖以禮義民俗克變滿秩郡庠賢之延以奉夫子廟今年春承省檄長泉山書院行有日來告别曰願聞子一言夫泉在閩號繁庶郡民多逐末利裔夷雜糅惟浮屠是崇逐末利則學不力崇浮屠則學以惑矧兵興以來詩書之教未易勝金革之習仁義之言未易弭戕賊之禍人將視聖教為迂緩然大賢朱晦庵真西山氏實過化是邦雖夷習兵禍之淪斁而道源文脈有不能終絶者孔子曰雖蠻貊之邦行泉山未易教於南勝之難則相萬矣吾叔原不難於彼豈不易於此哉亦惟以所學為教而盡心焉則感慕興起於下人皆有是心也於教職庶無愧乎送孔善夫序聖人之道與天地同大故其世澤亦與天地相為悠久文獻之盛代有可徴而崇德象賢靡間北南厯世以來未有若我朝之盛者也衍聖襲封上公曲阜裔孫布衣得授郡教一考即入流品江南諸裔加厯省注升教于郡恩數優異著在令甲吁亦盛矣孔君善夫衍出也於裔為南於世為五十有五至正庚子以察亷奉省檄二教于漳豫方攝教席見其俊爽以外揚貞介以內確知為方來之彥也間見其詩若文皆清雅有古法釋奠肅奉祀事月季嚴程諸生士習為之一變信乎聖人之澤如水行地逾遠而逾衍猶於善夫焉見之也既滿秩將沿檄赴京來别余曰某藉先聖餘澤得列學官今當典教一郡恆恐弗稱以負聖祖之教先生幸有言庶可規於鄙吝也嗟夫羣聖之道莫盛於夫子厯世之崇其道莫盛於我朝吾子以聖裔入官固當學聖人之學心聖朝之心以自振厲將俾聖人之道復明於天下非特在一郡而已庶乎世澤可綿國恩可報其萬一也豫之所以告子孰有過於此者哉善夫作而曰是可規已請為書之送杜明之入京師序武夷山水秀絶天下游者去猶不能忘矧居而得其趣之深者乎蓋其幽勝萬狀竒怪百出使人應接不暇至於煙巖雲壑窮深索隱隨所寓而可樂必也居之久而復有以盡其勝譬之讀書千帙萬卷浩浩汗汗雖雜著曲說亦可禆吾之聰明旁搜博討積力深久則得於心者莫非可樂矣清碧杜先生隱居武夷山中朝命再徴竟不起蓋讀書之樂有得於游山之樂者也令子明之君蚤有譽縉紳間為詩若文清婉有古法所謂蘭茁其芽鳳鷇其雛者歟今年夏以王事涉海赴京舟阻不得去明年候風便當再上友與其厚者咸賦詩為贈明之請以武夷諸竒命題分賦且謂豫曰吾生山中自童而冠今將壯矣泉石之與儔猿鶴之相求某水某丘之釣游居之樂樂則違之必憂也今而詩之以詠而玩焉則兹山之勝暸然心目孰為桑梓之所在孰為松檟之所留雖萬里猶跬步也豫曰噫是非得山水之趣之深乎子之心可謂忠念而不忘孝思者矣吾聞遊覽四方有益於學蓋目力之濶遠則心胸之恢廓而凡近之習不足言也今兹破長風駕巨浪觀大海之深岱嶽之高吾知明之有以充其偉邁之氣成其正大之學也必也忠孝事業實本於此若乃丘壑之趣當不為明之芥蒂也送長泰尹王夢臣序魯建國自周盛際姬公禮樂之風孔子詩書之化漸摩淪浹終古不泯代生多賢天下莫及蓋其河嶽之氣鍾精孕靈以萃夫人故渾涵淵深以為之量秀爽峭拔以為之容詩書禮樂以為之學吾於王君夢臣為有徴焉君魯人也優學躋仕厯掾閩省選令漳邑余始見其容之端於外也既又知其量之𢎞於中也則曰是詩書之化禮樂之風乎將河嶽清淑是孕是鍾乎抑魯之多賢而君能取之以成德於躬乎夫魯為君孔聖之所生而閩為吾朱子之所出一聖一賢世遠而道同焉君生孔聖之里而游朱子之鄉能以聞於近者而質於遠則禮樂詩書之教雖海濱亦洙泗將不徒在於魯矣推是以為教庶幾聖賢之道行之有其兆乎君報政歸故以是為君諗若夫簿書期㑹之為能刀筆筐篋之為賢非君之所志亦非豫之所望於君也是為序送髙君善夫歸閩序今天下之士繇儒而進者有三途焉遺逸科目文學是已士學其學志其志將有待於事其事非故為是立異以干有司之舉有司舉之亦非有優劣於是也夫亦視其力之所及而公其心焉耳是故遺逸非隱也科目非競也文學非卑也顧遇知於有司何如也不以遺逸舉則以科目進不繇科目進則繇文學辟士惟用是待有司惟知是舉果何容心於彼此哉晉安高君善父學懋以博文華以正閩士先之清原林先生素重許可每器君曰是鳴於方來者凡數舉於鄉皆不售部使者有知君薦為龍溪文學謂余曰遺逸皆天民之先覺吾無實以稱是科目又不利也學官位卑祿薄吾恥與草木同腐固不敢辭知己之薦庶幾古人為貧而仕也既上視其廟與學則凜乎將壓矣乃告于尹于守議所以新之願捐俸佐其費既又曰吾貧而旅食于此尹必不安是而以俸食我則無以遂我圖報先聖之心吾亦惟歸焉之為安耳士大夫聞而義之余曰古人所以自屑於官卑祿薄者惟求其職之易稱而已故辭富貴而居貧賤雖抱關擊柝委吏乘田不恥為之學官固卑矣祿亦薄矣而其職則未易稱也君不受常祿倡新廟學思以稱學官之職蓋憂道之心有重於憂貧也君子之辭受取豫一斷於義使廟學不修教職不稱而但知食祿豈吾善父之心哉遺逸科目之舉視學官其秩為崇然君子所以思其職者則不以崇庳而有間也君志慮未衰名譽方起當有薦而崇之者光明俊偉自見於世豫於學官覘其兆矣故序其所以歸送李一誠教授寧德序南山之松長未及尋尺其聳壑昻霄之氣已挺乎不可遏小而為榱桷大而為楹棟其材之適用不待要於後而可卜於今於人亦然幼焉而嶷長焉而植壯焉必光明而赫奕小試而不負所試大用而必稱其用亦於始焉卜之而已矣友生一誠為李氏佳子弟質粹而學力髫齓如老成人材範夙就士林器之去年用部使者薦為寧德教豫知其氣之方鋭材之克大用之未艾當不徒見於學官而有待也雖然學官固卑實師道是繫未可以易視之也寧德稱多士石堂中村二先生之所講學固有傳而存者一誠思所以稱其職亦勉於學而已夫學積也南山之松非積久不能成榱桷楹棟之用君子之學非積久不能成光明赫奕之業一誠勉乎哉學以資仕吾所望於一誠者唯此而已一誠行有日友與厚者咸賦詩以贈林登州集卷八
