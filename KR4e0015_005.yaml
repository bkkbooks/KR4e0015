body:
  text: 林登州集卷五明林弼撰七言律詩用貢泰甫尚書韻别吳君濟掾史東風蒲栁滿江濆杯酒離亭暫别君春事又隨紅紫老人生每似燕鴻分榕亭雨過聞鶯語桑海天青見鶴羣東府仙人應握手三神高處望紅雲海漕使京停舟雞嶼呈朱伯厚明府王克明邑尉遙山盡處是滄溟眼底雲濤一色青野鳥隨波明逺白毒龍挾雨散餘腥水濵女佩春留月天上仙槎夜泛星賴有同舟賢李郭柁樓尊酒火熒熒桃花洋溪上桃花秦隱居桃花海上意何如放舟定有迷津客躍浪應無㸃額魚紫鱖春肥風暖處紅潮晚漲雨晴初詠詩無限蒼茫興十丈雲帆切太虛秦皇廟往事悠悠逐海波荒祠寂寂寄巖阿三神山下仙舟逺萬里城邊戰骨多東魯尚存周禮樂西秦空壯漢山河早知二世能移祚崕石書功不用磨送吳允思之南海令曾收圗籍入燕初還擁瘡痍下粵餘應有雄文韓子繼也知清操隱之如棠隂琴靜風生席花外詩成雨滿車天上故人青眼在暫煩百里試才諝題張將軍百勝圖知兵昔學萬人敵開國今收百戰功列㦸枝寒瓊帳雪團袍花暖錦旗風鳯臺玉帛華夷㑹麟閣丹青褒鄂同賴有畫圗詩卷在風流不盡大江東傅子敬之浙西憲副聖朝司憲重才華况復三吳近帝家右掖清風生桂樹西湖新雪到梅花府中此日逢聨璧天上何年共泛槎具慶高堂多喜氣繡衣綵服照晴霞武夷萬年宫十年三過武夷山翠壁丹崕歎莫攀藥竈烟消天地老櫂歌聲斷水雲閒虹橋未許秦皇識鶴馭空隨漢使還曽是隱屏峰下客謾教啼鳥笑詩慳送林鍊師歸武夷三山樓觀倚雲開九曲溪山入夢來半夜丹光分洞壑常時劍氣動風雷幔亭峰頂霞杯進石鼓灘前月棹回吹徹玉簫空想憶故人正在鳯凰臺送宋仲衡歸金華景濓學士之子中書舍人江花飛雪送殘年客思隨雲度逺天朱雀橋邊車若水金華洞裏酒如泉明經已踵韋賢後對䇿應推賈誼先無限故山松與竹平安好報玉堂仙寄題安慶譙樓我愛舒州趙使君危樓高架出囂紛水通桐柏環千古天近蓬萊擁五雲晴日壺觴花底集寒更鼓角月中聞欲題詩句慚崔皓況是賔僚總好文畣倪子京笑我生涯似轉蓬多君意氣慕長風十年荆杞迷周道萬里江山繞晉宫奉母曽聞三釡樂論文還喜一尊同明廷有詔徴才俊好與䕫龍叙九功題陳王墓王父母歿自陶磚以結冢或云其地有王氣將軍山下陳王墓落日西風秋草繁斷甓千年餘手澤豐碑十丈滿苔痕山河不改英雄老天地難窮忠孝存酹罷椒漿成佇立一聲去鶴月黃昏挽陳和卿三山别駕候騎迎晨趣倅車星芒入夜霣城墟三神山逺夢魂斷百尺樓空豪氣除人去鐵衣悲汗馬客來珠履嘆無魚條侯能復家聲舊細栁于今有簡書中秋玩月二首見月令人寫百憂况逢良夜半三秋星河有路通蟾闕雲海無波湧蜃樓老桂一枝容手折仙槎萬里謾神逰清光莫照干戈地憂國詩人易白頭其二風雨良宵大半妨清秋此日對團光百年幾度見明月千里相思在異鄉按曲雙鸞回素羽掠舟孤鶴振𤣥裳乾坤光霽今還兆好獻瑤池萬夀觴挽夏待制字尚之居袁州奉㫖往廣採庚申野史死於彼别業西江未得歸逰魂南海竟誰依丹旌題字官猶在青史成編事已非尚之修元史林侯代之入廣有子能栽新墓樹何人共採故山薇百年文獻晨星似搔首斜陽淚滿衣覺初上人歸永嘉江心寺江心古寺金焦如滄波湧出青芙蕖千嵗鶴歸作人語九淵龍起聽梵書山屐時尋謝康樂丹砂試問陶隱居自是初心得真覺閒身去去伴樵漁送郭廣文武安邑小武城如三載人賢郭校書有酒齊郎能放鶴得錢溪女或留魚沙場落日鴉飛急海國秋風鴈過疏南士秖今多嚮用君行努力莫躊躇竹隱為富州丞烏雅士威題洪武二年改富州為豐城君家萬箇碧琅玕長日開軒自在看清興每添詩句好緑隂未放酒杯乾誰裁紫鳯雙龍管我乞滄浪一釣竿何似當年彭澤令歸來三徑日盤桓竹山隱居為豐城黃英尚題竹山山下黃隱君買山種竹謝塵氛凉隂匝地日難掃清籟滿天時復聞蟄龍未奮葛陂水鳴鳯空隔蒼梧雲最喜林霏春雨歇班班稚子總成文西村隱居為繞城羅時用題西村竹樹淨朝暉萬事閒來總息機一夜小溪春雨過半篙新水白鷗飛草堂作就資誰寄彭澤歸來願未違最憶衡門凝望處平疇十里豆花肥送豐城張叔同之隴西縣丞楊栁青青春水生東風迢遞送離情一時牛斗龍光動萬里關山馬足輕朝雨軟塵連隴道暖雲芳草入秦城公餘剩有哦松趣好詠新詩續紀行送盧仲睿之㑹寧主簿隴樹青青河水黃獨騎官馬入秦疆七千里外思親舍五色雲中望帝鄉沙草枯時收黑黍黑黍即蘆粟可作酒地蕉香處煮黃羊黃羊野生山中黃毛味如家羊訟庭事簡邉塵息竹屋看書對日長白雲孤飛圖為豐城塢烈翁主簿題登高望逺思依依目斷孤雲送落暉白鳥明邊親舍近青天盡處客心違輕姿映水浮空濶片影隨風度翠微何似故山歸去好晴霞五彩照萊衣贈少林寺松亭長老少林禪伯舊松亭聞說巢雲箇箇青一榻秋聲風度嶺半空凉影月臨扃雨花飛處蒼龍蟄貝葉翻時白鶴驚何日從師遊勝境共餐玉粒駐長齡洪武三年四月望日同牛典簿王編修奉使安南陛辭曙色熹微漏箭催暖風開扇舜曈回雲扶紫鳯臺端下山擁蒼龍殿角來玉笋聨班隨曉仗金莖分液賜春杯小臣職忝馳驅使擬和皇華愧不才發京金陵自古帝王都海宇于今混一區虎豹九關通北極鵾鵬萬里入南圗長干栁暗馬如織白下花明酒可酤使節歸來應未晚扁舟秋水滿江湖舟過彭澤彭澤縣前楊栁新客舟暫繫大江濵寶花滿地來天女石筍中流護水神城郭千年非故物菊松三徑幾歸人此身何似醉鄉樂願乞先生漉酒巾巖畔圎通閣嘗雨天花江心小孤山有水神祠望匡廬大姑山下曙光催五老峰頭秀色開萬壑松杉收雨去一天紫翠入江來酒狂誰結淵明社詩好難追太白才便欲作巢泉石上江靈肯借白雲堆滕王閣落日孤舟一笛風愁看江閣化虛空滕王歌舞漁樵外唐代文章草樹中山接匡廬爭秀爽水通彭蠡共朝宗三王芳躅無人繼詠罷新詩思不窮徐孺宅南州表表徐高士零落猶存宅半區足跡何勞趨北寺躬耕只合老東湖禮賢太守能懸榻弔古諸生擬束芻誰識保身明哲意當時惟有郭申屠豐城呈王熙陽太史昔年曾說張雷劍此日同來李郭舟訪古已知神物合暫時且為故人留雲收日腳千山暮風送江聲五月秋回首舊逰如夢寐延平十里故津頭臨江栁外樓臺入翠微水邊簫鼓蕩晴暉樟江雨漲魚新上皂閣雲生鶴共飛諸老尚留詩卷在此身未逐釣船歸蓬窗吟罷還成醉蜜酒初香玉笋肥廬陵逢端午極目滄波白雨飛綵旗風急畫船歸故人此日供蒲酒聖主先時賜葛衣客裏又看佳節過吟邊未覺壯心違離騷讀罷成惆悵落日芳洲杜若稀用韻贈高允令巡簡溪山深處寡紜紛况復清修少似君竹寺酒醒聞鳥哢水軒琴動見魚羣青衣邏卒時懸弩白髮鄰翁夜索文剩有長材供著作賈生名久漢廷聞南康縣小縣深依山水清時聽舊事話遺氓萬株松古張公種九齡獨秀峰髙蘇子名子瞻溪到南安流自淺嶺過大庾地還平西風翹首江頭路此去猶餘兩月程次張志道學士與龔景瑞詩韻先生家住翠屏峰鄉夢常時送曉鐘十載故人青眼舊千山歸路白雲重天涯作賦憐王粲江上題詩愛薛逢嵗晚相從應有約為尋桃竹截雙笻次王太史韻呈廣東幕僚丹鳯樓前持詔出五羊城下放舟來雨苔已蝕銷兵柱劉鋹所鑄春草都荒望漢臺杖採仙蒲青玉節酒分香桂碧螺杯不妨日對南風醉緑水紅蕖翠幕開用王編修韻呈梧州劉太守萬里南風送驛舟蒼梧江上景逾幽一雙白鳥常隨棹無數青山總入樓鳴鳯不來芳樹暝嘉魚初上碧波秋故人解送桂香酒洗盞臨流破客愁答劉蒼雪通守扁舟南泛雙江曲傾蓋相逢一笑中沈李筵開鷗鳥渚采菱歌起鯉魚風生涯安得千頭橘流落空餘兩鬢蓬曾是湖壖埀釣客擬從山下祝雞翁畣觀子毅省郎十行紫詔百蠻來一道炎雲萬里開桂嶺已通新道路梧江猶有舊亭臺劇談風起魚龍窟麗句春生錦繡堆惱我懶看腰下劒對君且覆掌中杯伏波廟南征昔日此登臨遺廟空山尚至今萬里風雲常慘淡千章松桂自蕭森麒麟安用丹書像薏苡難誣清白心愁聽烏蠻江上笛夕陽一曲武溪深夀佛院用太史韻橫槎江與絳河通偶共吟仙謁大雄花燭滿庭蟬榻靜雲山當户瘴塵空百筒清引香厨水兩掖凉生茗碗風試問參寥老開士衲裙肯贈雪堂翁再用觀子毅省郎韻海天極目路茫茫少憩珠林興頗長太守花邊攜酒至老僧竹外煮茶香小樓吹笛關山逺落日放船風雨凉不有好懷相慰藉客途空復嘆流光南寧府三首萬里關山入塞雲髙城縱目送斜曛九真海到東南接六詔江來左右分出洞蠻丁高髻角趂墟野婦短衣裙漢廷已下興賢詔從此遐荒德化聞其二謾說天南第一關邊城依舊好江山豐年簫鼓賽田祖近日衣冠化洞蠻孟獲革心諸葛縱智髙授首狄青還三公亭上舒長嘯落日凉風起碧灣其三千疊層城十丈壕藕花無數繞周遭輕舟時獲魚盈尺新雨才添水半篙拂地烟梢毛竹暗倚江風樹木綿髙天涯無限登臨意納納乾坤一布袍左江七夕得牛字笑倚仙槎望女牛清江倒影絳河流龍泉紫氣秋猶射雲錦紅光夜不收烏鵲橋前波似練鳯凰臺上月如鈎玉人此夕應相憶一笛西風起小樓河字南來萬里越關河節物西凉客裏過清賞每愁酤酒少好懷未厭賦詩多丹江月棹秋無際銀漢星橋夜不波欲問支機舊時石天孫應笑鬢先皤西字天際初分大火西雙星飛映月華低綵樓瓜果絲初綴金井梧桐葉可題舊事荒唐何處問神光颯沓音踏幾人迷可憐栁子文成巧却把愚名汚冉溪伏波臺驛外秋山翠一堆將軍玉帳此曽開大江如月回雲陳古塔凌空護石臺萬里戈船餘薏苡千年銅柱委莓苔多情惟有營前栁歲嵗春風入樹來至安南次王編修韻安南逺至極南荒炎海無垠野望長馬援臺前秋草碧高駢城下暮烟黃百年圗籍歸中國三郡山河保故疆萬里天威如咫尺西風回首白雲鄉答牛士良典簿海國秋風客鬢華逺來共駕指南車越裳方物供周室趙尉提封入漢家裘馬清狂成舊夢斗牛空濶接仙槎扁舟凖擬同歸去明月洲前蘆荻花發安南呈牛典簿王編修日南留滯隔年期猶許仙槎到未遲小閣西風烏帽在清江落日綵舟移蒹葭倚玉慚三益薏苡明珠有四知宣室應煩前席問願因民俗一陳詩再用牛典簿韻萬里同歸望虎關三秋清賞愛龍山白雲黃葉西風外翠壁丹崕夕照間逸少述文誇盛集醉翁作記嘆蒼顔尊中有酒且須盡身後留名總是閒贈黃林隱我識龍川處士家白沙翠竹帶烟霞水邊門巷千章樹雨後園籬百本花對客看雲晨倚杖呼兒掃葉夜燒茶玉堂金馬成何事輸與山中老歲華牛君士良使還日南晝行左江之滣偶於清灘得一小石頂跡五寸許其色深緑娟秀潤麗宛若峰巒之聳立熙陽王君見而愛之牛君不靳因持贈焉王君賦詩以謝君復答之併次其韻用助二君清話二首錦石青紅似畫中每因幽玩一開篷三生依舊精魂在二妙于今嗜好同玉杖未裁秋帶雨畫船暫住夜騰虹向來艮嶽成田久莫更搜竒入汴宫其二江干竒石潤如玉卓立天然一碧峰幽竇直疑清澗落秀巒先見翠雲重女蝸自煉功猶淺米老相看興頗濃再拜不妨呼小丈日長几案得從容答安南使黎元譜二首十月南寧江水清官船渾似釣船輕滿篷霜露天如洗一笛關山月正明修貢逺來勞使節觀光歸去擅詩名宫袍驛馬華林路未羡當年晝錦榮其二傳宣賜罷碧淋腴萬里驅車指故途遼海東來鶴自語楚天南去鴈相呼清吟時與梅花對老態猶嗔竹杖扶來奉龍墀親䇿士攜書還解一行無清江小隱圖為趙希貢題愛汝清江小隱居波光雲影滿庭除風帘野店客呼酒雨櫂輕舟人打魚無數青山秋樹外一行白鴈暮霞初看圖便擬投簪去借取閒窗讀舊書曲江逢至日去嵗兹辰鍾阜北今年此日曲江東驚心節物如飛箭回首生涯尚轉蓬韶石雪消知地暖越臺雲淨兆年豐故人迢遞未歸去孤負梅花酒一筒用韻贈濮彥章曾題詩句碧琅玕留與仙翁伴歲寒君有蓬萊三禮賦我無龍虎九還丹可憐韶石山前景渾似錢塘江上看驛路梅花應笑客酒腸暫為主人寬贑州嘉濟廟用王編修韻水落雙江見底清官船東下石灘平五龍山逺環遺廟千雉雲高接石城人去睢陽空有像元守臣全子仁海青臣皆死節廟有像將歸嶺表尚留名漢灌嬰伐他神示以克捷之兆舊碑有紀沙頭候吏休相促吟傍梅花句未成次滕仲𢎞參政見贈韻孺子湖前秋水多滕王閣下夜聞歌十行手詔天南去萬里仙槎海上過桂嶺畏途連楚越薇垣佳句似隂何歸朝有日陪冠蓋兩袖香風響佩珂題鄭生雲谷卷谷口子真多白雲半開竹屋共雲分青山當戶雨初霽緑樹覆簷風欲薰偶向鄰翁劚藥本時邀詩客籠鵝羣梨花夢裏偏多趣蒼狗白衣任紏紛林登州集卷五
