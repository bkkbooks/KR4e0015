body:
  text: 林登州集卷三明林弼撰七言古大勝驛阻風龍江驛前連日雨風帆暝投勝河浦風髙急雨浪如山舟子魂飛客心苦客心莫苦行路難百年身世誰獨安君不見𤣥真子釣游之樂樂未已扁舟猶在風波裏過采石謫仙昔醉采石時酒翻宫錦春淋漓眼空四海無餘子江風江月吾心知江風吹酒酒不醒舉杯邀月還對影願將江水變春醅一醉千年長酩酊雲卧八極凌倒景人間萬事何足省夜郎歸來逾五嶺逸才壯志嗟不騁丈夫胸次存耿耿有酒不飲真不幸我來酹酒江之濆春草幾緑三尺墳當年有孫為收骨捉月之說誰爾云騷魂已逺招不得千年相對空相憶浩歌一曲清淚滴江水滔滔風瑟瑟舟中次熙陽編修韻大通驛前大江滿星槎有路通交州川雲映水白可染浦樹過雨青欲流奉詔漢臣愧陸賈能詩越客如湯休同舟況有同心侣買魚酤酒吾何憂姑山行小姑水中立大姑水中眠獨立不僵眠不醒俯仰一萬二千年江前大彭郎山上五老仙阿姑與爾相盤旋蓬萊弱水幾清淺王母眉黛秋霜鮮阿姑顔色猶依然我疑銅仙人手揭金莖墮江邊又疑達磨師足遺隻履歸西天人間百嵗春夢短長眠長立嗟無緣小姑大姑真可憐江花江月恣留連巨鰲戴其趾𤣥鶴巢其巔江流如箭石不轉千古萬古無崩騫安得羽翰凌八埏時來游戲姑山前與姑同夀一萬餘三千和王太史潯州遇生辰之作攝提貞秦粲星七奎文流輝炯如日括蒼之山氣鬱鬱山在處州鍾清育粹餘四袠先生生世良不惡讀書靜觀世得失丘園賁帛徵遺才石室紬編膺峻秩今年奉㫖使日南山川涉歷難一一旅途忽届初度期中夜喜得新夢吉覺來深念劬勞恩憶昔常在父母膝祗今二親弗可見每至兹辰愁復結江城酒美君莫傷山驛詩成我能筆親恩廣大當效報王事馳驅敢求逸木綿八月開瘴花西風滿帆應到家古來忠臣即孝子王遵叱馭張乘槎怪石粵西山水之窟宅山妖水怪鍾奇石巨靈戲擘真宰惜野火不斷波不泐千仞壁立萬䥫積往往猶帶太古色嵌空幽窈誰削刻望中常在雲雨黑黿鼉出沒鱗介浮虎豹踞蹲牙又磔古苔暗蝕春雨痕細草晴薰曉雲脈翠屏巗巗靜宜對青空㸃㸃光可摘我生亦有米芾癖幾欲再拜向蒼壁但恨移置不可得山齊花嶼成岑寂平原人去空荔薜艮嶽魂歸失松柏鬻賣曽無再世留運致何勞萬人力天生物性貴自然玩物喪志真無益江干林麓時一見未必不如臺榭側此言試問石丈人定應㸃頭答行客次韻王編修九日趙守禦置酒長句左江溪洞龍陽底外與安南接疆鄙安南方物貢王廷路入中華自兹始一從臣表至南京使者往來相踵趾趙侯守郡當孔道迎送不憂每加喜我行持節夏秋交風雨瀟瀟滿江水殷勤郊迓更逺出踧踖晨參常早起感君屢開北海尊愧我久留東郭履歸途忽遇重九節蠻菊未看三兩蕊殽核駢羅眩醉眸管絃幽咽清塵耳盈盈秋水映芙蓉淅淅天風吹桂子華筵賓客皆芝蘭故園山川有橋梓登髙作賦驚一時世職安邊傳百祀莫言使節如貫珠須信天威不違咫四海混一三陲清願同擊壤康衢裏望成山東南海水浮天地千頃萬頃波無際舟行旬月不見山忽見青山欲流涕青衣赤髮黃帽郎吳中最能稱最強見山起舞索酒飲衆工喜忭皆若狂云是成山東海陽鐵山一髮遙相望樓船直駕山中央依稀可見齊魯疆潞河沽水已不逺願豁喜目寬愁腸憶我昔日觀國光東登岱嶽臨太行龜蒙鳬繹在眼眶海雲海水相蒼茫十年壯遊三萬里觀嶽無山海無水祖龍石刻空莓苔小白堂封幾荆杞安得海水化甘霖淨洗寰宇清氛祲相如早與論封禪金泥玉檢昭來今和理夢中作神山三島髙嵸嵸弱水萬里流淙淙紫貝為闕珠為宫仙人環侍金玉童我侯好生德彌隆帝令下與民阜豐漳南廟祀優褒崇一壺靈藥康濟功千秋香火神感通應物無心霜鏗鐘及人有澤雲從龍幽贊造化冥漠中先後送子大小馮功參司命渺莫窮我來對越加敬恭翛然塵慮空心胸授我吉夢煩神聰有煒二簡詞藻雄覺來清明氣在躬山青月淡烟空濛恍惚仙佩聲璁瓏春風一笑出王公採芹泮水波溶溶安得插翮追長松題秋浦捕魚圗秋風吹溪溪水寒長楓落盡枝頭丹漁郎舉罾得雙鯉烹魚暖酒歡婦子江亭有客秋望遙青烟漠漠山迢迢沙頭落日呼渡急舟子無言倚篷立誰其畫此老稚川使我一見心茫然依稀艤櫂涔陽浦髣佛開樽采石渡安得坐我茅亭中葛巾相對三老翁買魚沽酒燒野荻拚與渠儂醉終日贈商橘所吾聞四老商山隅采芝茹草歌唐虞一朝片言翼漢室九鼎埀覆隻手扶又聞橘中有二叟其樂不在商山後乾坤不改日月長局棋相對何勝負商君元是商山英種橘作所名以稱雲根三秀青草暗州外千頭紅照明拂衣石竹巖前月躍馬黃金臺上雪九重樓閣虎關深萬里風雲鵬路濶玉堂仙侣知已多朅來天上聽鳴珂白袍簪筆立溫室金匱細簡登鑾坡新豐斗酒歌一曲御溝十見柳條緑燕霜已敝季子裘洛水誰推賈生轂髙堂歸去鶴髮新袖有薇檄堪娛親人生出處貴適志官秩崇卑何足論三華洞口山如㦸日倚長松看秋色杏邊瑟罷石壇香藻畔墨餘池水黑我生江海氣不除十年書劍逰清都明時漫學采芝隱壯來擬遂攀桂圗作詩贈君憶疇昔汗漫相期須努力明朝攜手釣龍臺雲繞三神天咫尺題溪聲月色圗人間無價雙白璧月色溪聲共寒碧暮雲卷翳天茫茫秋水生波風瑟瑟道人興與庾公髙扁舟載月凌雲濤洞簫赤壁漫嗚咽琵琶潯水空啾嘈何如二美足觀聽鏘鏘鳴璆掛明鏡潺湲可洗巢父心嬋娟解照潘郎鬢一機石動鷗鷺間漬景却向圗中看晴窗為君一披拂耳根眼睫生秋寒我生江海歸未得山月溪風總相識明當重賦招隱翁從子藍橋訪仙跡次韻贈竺芳上人竺芳上人張旭徒酒酣喜作聨綿書千軍筆陳氣不除百尺霜蔓神不枯鐘彛石鼓迹可摹跟肘詰曲相盤紆上人馳騁分隸餘腕指所至心意俱大書雄健虎負嵎小字清麗川藏珠既不太縱亦不拘此道奚用分墨儒人言我書閩南無每對筆研增噫噓千年篆籕變須臾競逐姿媚何區區俗耳厭聽于蒍于淳音遐想太古初吾師髙步先哲衢懷素智永相奔趨一笑嗜好醎酸殊㑹令紙價髙東壺淋漓醉墨烟雲如榴皮謾寫東老之酒壚贈碧溪道士金華洞中牧牛仙叱石飛去三千年却騎白鶴下人世溪雲山月相留連青蛇三尺滑秋水白日風雷生袖裏緑章扣額箋天公鐵檄役兵驅旱鬼南州三月土烟生坐見春野無餘青都將精意幹元氣要使憔悴回欣榮我聞神仙足官府蒼生蘇息無辛苦願師擲劍碧空中大沛江淮洗兵雨夀上人豪山髙處看南極夀星煌煌明佛國山中佳氣曉鬱葱十丈喬松拂秋色山人似是廣成仙麻衣如雪巾如烟朝餐霞光禮紅日夜披雪意看青天紅日表爾千金相青天𢎞爾千頃泱佛燈祖印妙心傳力與明門作龍象旃檀一瓣為南豐祥烟願遍八閩中後三千嵗從赤松上祝聖夀天與同贈美叔掾郎黃堂紫府多神仙畫㦸森衛香凝烟美人風格野鶴似髙步迥出雞羣先日長粉署緑陰滿玉立東風珥銀管綵衣香染垣薇春翠幕清臨水花晚青梯紫閣日躋攀仙翁一笑開春顔壺中自有飛騰藥何勞薪水燒九還丈夫三日當刮目安能混迹在塵俗君不見華山老隱君時來召對黃金屋代贈洪氏設齊供羣山東騖如飛龍文山孤峙髙凌空緑水環繞青芙蓉中有貝闕蓬萊宫華光五帝逰法窟四月八日參前佛一天花雨散曼陀滿地香雲靄祥霱山前車馬雜遝來綺羅十里紅紫堆多君傾槖具清供春風士女歡顔回須知作善神所福果報兒孫今可卜要將事業繼三洪豈但芳名在鄉曲夀員外長老羣峰天寶西飛來茂林幽壑相縈回福山中峙太古色紺樓碧殿凌雲開雲間一珠光萬丈圎外瑩中明月相森森寒彩凛夔羵炯炯神毫肅龍象始知此寶天下珍山輝川媚草木春瓊花一孕開曇鉢紫芝三秀生法輪福山髙與夀山列蒼松不凋椿不拔山中酒熟桂花發年年來醉中秋月長歌為靜山太醫李君贈靜山仙人李耳孫濟世善學李少君神樓一教妙天下千載道檢流清芬世間桐君與竹祖誰與巔崖蘇疾苦我時分節向南來相逢一笑漳江滸萬金良藥雙玉壺刀圭取效瘡痏除生平心鏡淡如水照人熱惱埃塵無我欲贈君無長物撫劍長歌對明月東風珍重杏林春吹作漳南瘴鄉雪贈溫縣尹雙溪水繞新縣緑溪上桑麻春雨足雞犬不驚牛犢閒野人笑語喧溪屋縣有賢尹溫如玉知我民情諳土俗陽春布澤百里均不問深山與窮谷木樨無瘴烽無烟公館瀟灑如神仙松邊拄笏看山色竹外援琴聽㵎泉黃童白叟思借賢鼓舞春風又三年㑹稽未羡晝錦旋玉麟金虎看腰懸其二南邑如斗事如毛況有連嵗兵旅勞溫侯胸有文武韜撫民練兵無繹騷三年去思民願借共分得請薇垣下政綱綜治無紊煩民瘼補苴罔漏罅棠梨滿路花重開喜見竹馬兒童來三尺神光射星斗一扇仁風清瘴霾驥足豈能淹百里暫布陽春到桑梓明當五邑蘇巔崖恩波浩蕩雙溪水君仁掾郎榮膺府檄政贊邑琴敬頌俚謡少伸賀悃雙溪溪水清見沙溪梅燦燦冰玉華美人元是西湖家嚼梅飲水溪之涯霜毫不寫香影句揮霍春風滿棠樹溪堂玉立聽鳴琴人比梅花更清素東風有意相溫存南枝北枝花正繁願借桃李朝露恩松臺薇省先移根仙人謡次達道鑒録韻為一笑之戲仙風吹雲散瓊香玉輪軋露融素光霓裳飛動金玲璫一聲驚起鸞鳳翔芙蓉池上西風早青鳥無音天窅窅翠光濃入秋水寒黛痕淺與春山老千年蟠桃幾開落三偷奈此小兒惡綵絲未斷塵俗緣黃金空鑄相思錯君不見有虞帝子來瀟湘洞庭水緑梧山蒼淚痕有盡愁思長向來斑竹多秋霜古心上人顔其禪軒曰愛松林梅隱氏為作圗索余賦詩因走筆題之山人愛松苦成癖繞屋盡是蒼龍鱗長哦其間日不足更尋梅隱為寫真摩挲素壁光於雪錯落金刀交屈鐵𤣥豹毛生霧雨寒老蛟爪擘山石裂瀟踈似是寒濤驚恍惚已覺涼風生徂徠山下雲黯黯太華峰頂秋泠泠古心山人貌亦古矯矯蒼松宛相似何當結取雲邊巢從師參透西來意四禽詞奉答顧孟仁孔雀有鳥有鳥生海南昻頭短喙修尾毶東風吹動羽毛暖一團蜀錦空中展誰知美色能誤身失機却墮羅網塵雕籠綵架閉白日緑窗繡戶深青春雄雌強作交頸舞天地樊籠隨所遇空閨猶有獨宿人門掩梨花淚如雨𤣥猿黑衣公子居林丘黃頭王孫非阿儔空山月落松露下時與𤣥鶴鳴清秋山人不歸今幾載夜帳空兮怨蘭􅉅一聲啼斷巫山雲竹枝歌裏愁如海巫山之髙髙摩天雖有長臂難扳緣前林霜果已埀赤好從爾羣髙摘實野鶴野鶴野鶴儛骨削縞衣不受緇塵著朝刷滄溟桃浪深夜警空山松雪落忘機每與鷗鷺親髙標豈是雞鶩羣千年獨歸人已換九皋一聲天亦聞雲林暫爾寄栖止風翮終當翔萬里可憐青鳥俗未除白日傳音下瑶水鴻雁嗸嗸鴻雁肅肅飛秋風南征春北歸分行已深兄弟念哀鳴復重民生悲吳江水深楚雲斷美人銀箏動清怨忍將尺素寄逺遊萬里遙天寸心亂西風冷入蘆花秋稻梁晚嵗難為謀瀟湘秖今多旅客有聲莫度嶽陽樓徐梅所知司席上以榴花命題分得萬字欒巴飲酒空中噀屏翳疾驅回祿遁火鳥無數西南飛化作榴花赤光噴南風五月庭院涼滿地雲隂覆烟蔓眼明見此珊瑚枝猶信羣芳未荒頓猩紅綃巾曉初蹙血色羅裙春未褪芙蓉開遲不復怨海棠香減寧無恨謾憐地僻車馬稀空歎春歸蜂蝶困人生有花且對酒一舉金觴須百勸移根當得乘槎騫作詩喜有梅花遜君看上苑芳菲時紅紫東風自千萬齊雲亭竒石歌何年星芒化山骨古色蒼顔勢􅍶崒就中别有混沌天萬象森羅了毫髮府公移置齊雲亭一府來看零陽屏蓬萊清淺隔弱水君山暗靄浮洞庭我疑太陰照天地山河倒影搖丹桂又疑明河瀉九天斗牛騰光通劍氣公餘對此獨躊蹰咫尺萬里論江湖幽篁古木在眼底何用人間俗畫圗丁酉九日次徐梅所知司座主韻四時清景惟秋九斗酒何妨詩百首蒼蒼白露滿蒹葭淅淅涼風動榆柳一年佳景惟重九晉代風流誰踵後野萸埀紫映華簪籬菊開黃出豐蔀歸田未許游宦人登山喜得論文友季鷹江上足蓴羮陶令山中有松酒人生自古貴適意塵世於今幾開口勸君西風一百觴祝君南山千萬夀丈夫氣岸在雲霄為我胸懷洗堆阜奉次柏軒先生韻為梅所徴君夀憶我昔日遊吳東陳迹曽訪孤山翁梅花千樹湖水曲茅堂半畝梅花中别來嵗月幾流易一見梅花興無極東山東畔西湖西千載清風只如一不須此地感今昨且向南枝觀復剝野橋石出水未生江路雲凝雪初閣主人自是神仙者藜杖葛巾花樹下寒英疏映霜菊明老幹斜依風竹亞天生嘉植真瓌竒古來幽士多愛之今人已追古人躅後人行復今人追梅花於人元耐久百年對花當對酒願傾北斗為君觴更指東山祝君夀和南圃老人龍巖書事蒼巖百叠樹交緑石棧九折車失軸山腰忽斷峽山來小溪新水流寒玉溪上茅茨兩三屋野人足音喜空谷開門迎客敬三肅壺有香醪盤有菽自云今年雨雪足山稜夏收稻秋熟稻可酒兮稜可粥生來城府無軌躅德公耕􅀈鹿門麓子真桑麻谷口曲但令食飽與衣燠不慕輕裘嗜醲郁我聞此語淚盈掬澤國干戈嗟滿目商山采芝忘寵辱武陵種桃謝塵俗溪居便向野人卜馬蹄安用浮世逐採山釣水耕且讀不管人間忙禍福雙柏軒歌為黃君復院長賦黃君開軒紫山曲手植雙柏如雲緑南風吹雨生夏寒兩蓋清陰覆書屋摩挲老眼四十年龍枝鳳葉俱蒼然春陽庭階已競秀嵗寒冰雪應同堅君家況有徐卿子風骨嶄嶄雙柏侣聳壑昻霄看異時長材大用從兹始我來徑造軒之中開樽愛此陰重重昔聞彭澤醉五柳今見藍田哦二松皇天不惜栽培力移根好向烏臺植西齊酒醒月在天為君起舞歌雙柏林登州集卷三
