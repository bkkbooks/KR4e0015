body:
  text: 林登州集巻十九明林弼撰誌銘東宫妃常氏壙誌上以義兵剗羣雄定天下開平忠武王常遇春實為開國元勲女曰某與儲皇同年爰自襁褓即結姻好之約年若干為東宫元妃勤儉孝敬不以貴富驕盈婦徳之懿誠天下之表儀也洪武戊午十有一月某日以疾薨上輟朝哀悼命東宫以禮服期乙十有三月生皇孫二人長曰某皇孫女二人皆㓜髙祖四三府君贈榮禄大夫柱國中書平章政事追封開平王謚章簡妣張氏追封開平王夫人曾祖重五府君贈儀同三司上柱國少保中書平章政事追封開平王謚安穆妣陳氏追封開平王夫人祖六六府君贈開府儀同三司上柱國太保中書右丞相追封開平王謚靖懿妣髙氏追封開平王夫人父贈翊運推誠宣徳靖逺功臣開府儀同三司上柱國太保中書右丞相由鄭國公進封開平王母藍氏封開平王夫人妃生於某年某月某日薨年若干卜以是年十二月四日葬于鍾山草堂忠武王墓右臣某忝職禮曹謹叙其世次名行以誌諸隧石開國輔運推誠宣力武臣榮禄大夫柱國同知大都督府事臨江侯贈特進榮禄大夫右柱國杞國定襄公壙誌公諱徳字闕姓陳氏世居濠之鳳陽縣曾祖曰五二府君贈鎮國將軍僉大都督府事䕶軍追封定逺縣子妣呉氏追封夫人祖曰敬贈驃騎將軍河南都指揮使䕶軍追封宛丘伯妣李氏追封頴川郡夫人考曰納贈榮禄大夫同知大都督府事柱國追封臨江侯母張氏封臨江侯夫人公生於元天歴庚午十一月十一日㓜端重不類羣兒及長有膽畧元季天下大亂上起兵討羣雄公首從征伐歲乙未克滁和從渡大江攻采石取太平定建業下京口有前鋒之功丁酉取寧國宣城遂為總兵元帥轉天䇿衛指揮副使丁未從大將軍徐魏公征浙西偽呉既平陞鎮國上將軍僉大都督府事洪武戊申將兵廓清中原河洛燕晉諸郡俱下天下既定論功行賞公為初起之舊十有七年之間戰勲居多授開國輔運推誠宣力武臣榮禄大夫柱國同知大都督府事封臨江侯食禄一千五百石賜以鉄劵子孫世世襲禄洪武戊午十一月二十有三日薨于鳳陽縣太平郷之私第得年四十有九訃聞詔追封特進榮禄大夫右柱國杞國公謚定襄仍􅎁有司具葬事配洪氏封頴川郡夫人子二人長曰庸夫人洪氏出也今為散騎舎人次曰伴哥李氏出也女三人長為洪出次為李出又次為李出孫女一人將以是年十二月日𦵏某里某山之原惟公以忠勇之資際風雲之㑹佐成大業為國勲臣雖年僅中夀然生榮死哀名昭史册可無憾矣其詳當載神道碑姑叙其畧以納諸壙云鎮國大將軍大都督府僉事林公壙誌公姓林諱濟峯世居滁之全椒少剛勇善騎射元季天下大亂上起兵淮右越國公胡大海時在麾下知公可用養為己子歲乙未從渡大江取太平丙申入建康下鎮江丁酉克常州宣州徽州戊戌破鄂爾和院判營復攻杭州諸縣進取嚴州金華己亥取諸暨圍紹興克處州庚子授金華左翼副元帥復從胡參政取信州就守其城有㫖命為總兵辛丑囬金華五月仍守信州分兵討陳友諒獲賊將李明道等壬寅越國公調囬金華首冦叛越國公遇害公守完其城陞昭勇大將軍同僉江南行樞宻院張士誠兵攻諸暨公擊敗之甲辰陞浙東行省參政丙午領兵駐杭州呉元年授浙行省左丞六月征蘇州丞相徐逹命攻胥門九月克之復攻無錫降之進資善大夫職如故洪武元年征福建二年收山東移兵守汴復攻陜西丞相徐公調往平凉三年征定西歸至鞏昌安定以慢攻失陷軍士降為馬軍四月克興元上念其功多復授大都督府僉事四年加鎮國將軍仍令世襲復姓林賜以令名從總兵官中山侯湯和征蜀偽夏主降八年授陜西都指揮使十一年冬遘疾勑令囬京命尚醫治之弗瘉十二年正月十三日卒于私第得年四十有三上為之憫悼命有司給其喪具祖三府君贈昭勇將軍親軍指揮使祖妣許氏追封徳人考小六府君贈鎮國將軍僉大都督府事妣胡氏追封夫人三子曰懋曰吉祥奴許出也曰兒次室陳氏出也女三人俱在室惟公弱冠從軍東征西討無役不預亦古名將之倫也功在簡册埀于無窮姑叙其槩以納諸壙詳則具於神道碑云故龍虎將軍浙江都指揮使司指揮使胡公墓誌公諱汝字某姓胡氏世居鳳陽之某縣少英邁有志畧元末所在兵起公㧞行伍為親軍元帥大朝兵徇揚州公率衆内附從御史大夫鄧衛公元帥胡公戍守徽州已而攻取婺源及淳安遂昌於潛昌化諸縣戊戌從征處婺克之己亥攻克諸暨授管軍總管癸卯謝院判叛公不為所汚棄其妻子領兵出蘭溪被㫖徴還十月大軍攻湖廣公在行既克武昌復從攻廬州授鷹揚衛管軍千户領兵從丞相魏國公攻取中興峽州及潭衡辰沅諸城乙巳守常徳改授常徳衛指揮副使洪武元年統所部兵從平章楊公攻廣西克永全道三州六月克静江府三年以功陞明威將軍本衛同知六月榮陽侯統大軍征蜀復被㫖從征瞿塘關駐兵歸州蜀兵猝至出城奮擊蜀兵潰去遂入巴東榮陽侯命公統各衛兵破瞿塘月城夜攻羊角寨㧞之冬陞懐逺將軍職如故四年偽蜀鄒平章水陸結栅以扼大軍總戎徳慶侯命公領兵攻之破其栅鄒中流矢死乗勝入梁山州直抵重慶府屯兵戍守七月從江夏侯攻取順慶保寧等城左都督曹國公遣公戍貴州蠻民未附者悉討平之酋賊的黒覃光印作亂公領兵三路出破其寨數十的黒來降覃光印猶㨿險拒守兵連破之所謂硬寨者賊大潰遂𠞰殺覃光印及把具等獲其牛馬兵器若干蠻酋的義以牌送欵民皆安堵八年制授昭勇將軍湖廣都指揮使司指揮使十二月進龍虎將軍浙江都指揮使司指揮使十一年三月十日卒于官得年五十一曾祖曰肆府君妣趙氏祖曰五一府君妣霍氏父曰六二府君妣王氏繼娶嚴氏孫氏韓氏男一人曰混川奴嚴氏出也女三人一適武昌衛百户楊仁二在室嗚呼公自弱冠知武事能識真主委質事之数其戰守之功浙淮之間固為先登而征蜀之役效勞居多然旌勲之命屢降迭錫秩視二品善始而榮令終而哀其亦人傑矣夫卜以年月日葬于闕之山先期來請誌故為述其功績履歴官秩世次而刻諸石庶以光諸幽云故鎮國將軍燕府左傅丘公壙誌洪武十一年五月十五日鎮國將軍燕府左傅丘公疾篤車駕臨問越二日卒宸𠂻哀悼勑有司治其喪事擇地於聚寳山之陽以葬之仍命刻石誌其壙謹按公諱廣號毅齊世居鳳陽府之定逺縣曾祖某以公貴贈昭勇將軍親軍指揮妣艾氏淑人考子誠贈將軍僉大都督府事妣劉氏夫人公㓜失怙恃統軍元帥嚴公鞠為己子值元季大亂天兵起臨濠之時公年十六隨父從軍以驍勇知名歲乙未從渡江取采石入太平丙申定金陵克鎮江公皆與焉八月兵壓常州元帥公營於游塘淹城賊兵奄至公力戰郤之擒偽呉張將軍十二月大戰横林橋中流矢㧞鏃轉闘勇氣逾厲賊見而畏之丁酉正月攻常州戰于南門矢傷右膝三月克之從大軍攻宣州又克之五月元帥公卒于軍有㫖命襲父職授後翼統軍元帥六月領兵取江隂七月從丞相徐公攻無錫常熟大敗賊將張九六等戊戌從平章常公攻泰興九月下溧陽克宜興留鎮焉己亥偽呉張士誠侵宜興公出戰敵大敗矢傷左腕甲辰從丞相徐公㧞安豐七月克廬州改授神武衛指揮司同知未幾領兵守潭州乙巳改授潭州衛同知討平諸寨呉元年從楊平章征廣西洪武元年克永州戰傷左股手擒賊帥鄧思誠等五月攻靖江公率前鋒先破其月城遂降之賊據彬州公領兵復其城得濟縣印至是復丘姓授懐逺大將軍職如故四年征道州常寧武崗及諸寨洞公無役不從所向必克陞鎮國將軍僉大都督府事九年復除燕府左傅公生於至元戊寅殁年四十一葬之日為六月二日配殷氏封夫人子六人長禮李氏出也次智戴氏出也和尚張氏出也文殊奴胡氏出也真保張氏出也五臺奴劉氏出也女四人惟公英鋭夙成勇於赴敵搴旗斬將戰必居先功在信史埀於永久姑叙其勲績世次之梗槩以納諸壙云蘭軒潘君墓誌銘君諱惠進字仲禮蘭軒其自號也大父某而上皆居龍溪為氓父瑞治善陶猗理生法奮于編伍累豐積贏遂大其家母林氏莊氏生子四人君莊出也慎已好義恬養不表襮克念動趾前美故家力不墮而益厚盛方盗起兵興富家子率以賄媒武功君獨優游田里朝畊暮讀泊焉無營識者髙之雅性愛厚於人交際各得其欲閨門族姓雝睦以愉郷鄰急必賙患必䘏人仁其行焉生於至元壬辰四月甲子歿於至正丁酉七月癸巳葬以是歲十月乙酉其原在鶴石山之麓君先娶朱氏繼蔡氏俱蚤世復繼室蔡氏娣朱氏二子勝才王寳一女勝姐適陳叅軍之曾孫大蔡氏一子順小蔡氏一女丁娘勝才先君四年卒有孫男曰洪泰寛泰女曰觀姐順知學好禮先葬期泣拜請於唐臣曰藐諸孤將以先君之柩合窆二母之塋有日矣敢求先生銘辭不獲銘曰家之豐兮心之冲徳之崇兮禮之恭施不窮兮死不終貢元周先生墓誌銘自延祐甲寅舉進士先後為科十有二閩士之魁浙闈者凢四人若晉安林仲節景和邵武黄清老子肅建安雷杭彦舟皆登甲科躋仕中外延平周祐于一以至正庚寅在江浙二十八人之上於是兩與計偕而不售於春官者再士類屈之先生自齓年即知讀書動止端重異羣兒父小溪先生恐汨其純也延師家塾教之甫長則盡能通四書五經傳註及冠治舉子業㑹科目中輟遂刻志古文先秦西漢諸子百氏韓栁歐蘇之所述作咀嚼饜飫久益博洽發而為文湥雅閎徤今南臺侍御左公世臣曩以閩海僉憲督師漳南先生撮討賊顛末倣治鑑為野史上之題曰邊臣近鑒左公曰真史才也薦為同安文學進其書於朝以備國史編録由是諸閣老咸知名焉靖州推官詹逹納有愛女擇對特妻之初先生領丁亥郷薦恩授廬峯山長再以舉首走京師翰林羣公將薦之史舘以親老辭歸至延平奔小溪府君訃配詹氏道卒府君服方除而母復亡嗚呼孰謂母服未練而先生又不禄耶先生質醇學正平居恂恂言若不出口而中之所藴則渾渾莫窺其際事有疑難質之一言而斷委曲周盡其為校官也從游之徒千里來集善誘不倦皆成其材名讀書之室曰宗濂見其學之正也壯年有志功業使得展其長庻幾經邦澤民必有大設施者而拂欎不揚賫志以殁悲夫世族可知者上世祖䕶由建遷延平䕶生公權權生延宋武翼大夫廣西路鈐轄閤門宣贊舎人延生大明大明生禮禮生昭先屬時宋季皆跧隱弗耀昭先生小溪諱葢才以吏漳因家焉生先生於皇慶壬子七月癸丑卒于至正甲午十二月乙卯得年四十有三明年七月壬辰合窆于靈應山詹氏塋無子側室女詹家奴尚㓜弟􅀈寔主喪事唐臣舊學於先生謹叙而銘之不敢以微陋辭銘曰靈竒天恡而先生取之貪聲名天靳而先生播之覃此予彼奪孰司其機緘乃年之不永而爵之未擔然文傳而壽徳尚而貴則於彼者又將何憾而何慚故直翁孫君墓誌銘至正十四年正月三日臨漳直翁孫君卒里人林唐臣走哭之曰於虖天其不使斯民為三代乎胡寧奪我直人之遽也君心直言直行己又直人以直稱之君亦以直自居而不辭嗚呼直哉吾不能不為流俗惜也按郡志孫氏漳顯宗昭先仕宋為金紫光禄大夫江東提刑金紫生叙諧中奉大夫工部提舉工部生志學脩職郎福州監鎮監鎮生克荘娶同郡許氏生君於元貞乙未諱禎字祥卿弱歲失怙有弟四人皆㓜稚君與兄貞榮䘏之如子敎育姻娶則曰厚我可也田廬鏹幣則曰薄我可也性剛介重然諾郷鄰有争不訟於官惟求直於其門君是非白黒灼無遁情信申詘屈抑揚絶無顧避人曰此直翁也因以自號頗嗜酒歲時伏臘必合兄弟子姪以燕良辰勝日則命賔為山水游歡洽移日屋前有水曰南溪酒酣則倚樓歌曰溪水可酒溪魚可羮直翁直翁了此平生兄弟析異君獨奉母同居歲辛卯秋奸囚夜亂配陳氏死焉君負母匿空室中火至輙反燄若有撲㓕者人以為孝念所致未幾母亦歿始以哀毁成羸疾病革子文華進藥輙揮去曰正月三日吾且在鬼録藥雖神其如命何其日蚤作呼文華嘱後事治喪不用浮屠葬從先人之兆既而曰吾母未歸土死有餘戾一慟而絶凢得年六十丈夫子二人皆業儒長郎文華娶王氏次男文質未婚女子三人長適盧徳原次適鄭原真先卒季亦死奸囚之難葬之日為三月甲申先期文華泣拜請曰子知吾父者敢求子銘辭不獲銘曰不詐以飾惟正是則是謂古之直匪華以炫惟寔是踐是謂微之顯薛包友愛許邵公評遺慶後嗣永徴斯銘林母楊氏墓誌銘楊氏諱真世居同安縣之員山祖博濟父一翬皆隱徳為郷善人龍溪於同安為隣壤愚逸林先生以篤學力行睦其家淑其郷所至而人則之一翬聞其賢故許妻焉既歸姑稱其孝夫以其無違妯娌以無間凢奩飾装具一無私蓄闔門數百皆同㸑㑹食堂寢以新家廟有侐賔祭禮洽人謂先生家法之所以齊者實楊氏克相之也歲癸未先生得疾且殆楊籲天以禱竟不起則斷髪誓無它時年三十有八矣子皆㓜家事日窘夙夜事麻枲助衣食㑹兵難連年海瀕多故而母子相保無恙殆有隂相之者至正丙午十月二十日囑三子曰為未亡人二十有四年常懼汝曹弗迨成立今皆畢婚吾願塞矣兹為吾生之年月日亦死期也目皆瞑矣言竟而逝又明年十一月庚申葬普賢山之原三子曰乾䝉睽皆從予游䝉來泣拜曰先母以兵故後葬期今窆有日敢以銘請義難於辭銘曰禮始夫婦敬始閨門惟内之助實外之敦懿乎林母克淑以温婦義母儀久焉彌尊曷弗逮榮于子于孫不亡者存尚徴後昆福建帥府都事蘇公墓誌銘至正十六年春正月癸未盗殺元帥分府都事蘇寳及其弟漳浦縣尹和子長泰縣尹信㓜子同生伯顔福生孫凱山普安明日盗浮都事公屍于江其友丘昈鄭才識之走告其妹之夫錢塘馮善善與門士陳君玉鄭元圭具棺及衣衾歛焉分府發郡兵旬日殱盗又四年秋八月庚寅夫人曹氏葬公于胡塞山之陽先期其姊夫黄孟昌來請銘曰先生知公者幸銘唐臣不能文且賤銘不足重公銘非敢當而辭不獲遂銘按公先世趙人居漳為大族四世至公始以武功登仕版筮邵武泰寧尉閩帥忽公聞其賢辟為職官令史滿秩遷連江寧善郷廵檢階將仕郎用八品格也閫重漳分府幕官屈公階職不倫便宜授以都事屬紅巾盗起所在熒惑從逆公贊謀有術汀冦不敢犯境泉盗侵長泰公提兵討其逆撫其攜貳悉歸正為王民公為人中敏而外寛多慧而少文百藝衆技咸精其能而退然若無識者臨事决議樹大節燭幾微一斷於理葢有得於問學之素始公受業釣磯丘先生知有身心之學故其見於施為動守古則歲時祀先品儀豐傋為漳人法好賢禮士久敬不衰雖臧獲輿𨽻咸得其欲葢好禮而愛仁者也然顯盛之餘羣小利其貲而害其權故禍其家所謂盗自憎主人耳公果何負於盗哉公生於至大庚戌享年四十有七夫人許氏亦死是難子徳生以鞠於外家得全嗚呼此天猶未絶於蘇氏也耶女二人一許出也適興化通守陳某一蔡媵出也適葉樟公字一之號建溪祖龍發父天與母顔氏銘曰有學有言有政有行寧謂善始不終令命埀絶猶續孰匪天定徴我銘辭尚流後慶清菴居士墓誌銘元至正十有七年龍溪清菴居士卒其年十有二月戊子卜葬于青山之原孤文信衰絰走郡城泣血拜請於唐臣曰文信罪逆莫贖先母楊氏歿惑時俗不克禮葬貽終天悔今先君復棄人世死不敢重前罪將以先君之柩與先母瓦棺合窆亡妻蔣氏袝先生幸誌而銘之庻幾㝠㝠昭昭均有賁於逺也辭不獲則序之曰居士鄭姓諱静自號清菴所居里曰士林父曰自先母嚴氏生居士於至元壬申襁褓失恃繼母髙氏頗嚴悍居士事之謹而髙亦慈畜之不知為非己出娶教授楊公女諱觀令徳克相為婦道為母儀為郷人稱先居士二十二年卒得年五十有七丈夫子三人長仁慈事農次文信業儒又次彌碧學佛女子三人長適林同次適周應南又次適陳元玉孫男三人進發進逹仁慈子也宗虞文信子也孫女四人曾孫男𤣥軫居士讀書知大義敦樸謙厚善容物而於人之是非必嚴抑楊無貸喜静樂晦不逐時好則其性然也毎語其子曰人必有業不勤業而成者蔑有也仁慈能力爾穡文信能殖爾學吾志也聞三山余大車何體仁明經學遣文信不逺千里徃從之游族中弟姪知學者數人居士毎朂以逺大或時舉為怠學者勸先是盗起鄰郷居士戒里中子弟拒逆効順母汚不道里頼以全中歲屏葷酒日焚香清坐誦佛書與二三老依東林法結净土社年雖耆耄聰明清彊如壯盛時褒衣大幘鬢眉如雪望而知為善人也卒之年為至正丁酉凢享年八十有六惟居士隱以其正未嘗往而不返夀康令終好徳樂善之報乎送死盡禮敎子知學之力乎銘無愧銘曰實儒而名墨也隱身而顯徳也淑爾後人此之則也林登州集巻十九
