body:
  text: 林登州集卷十二明林弼撰贈序柴德善秩滿序典史典一縣之史縣官若吏喉舌而領䄂之民持牒訴於縣縣官必令吏即其幕議吏抱牘詣縣官署官目牘尾有典史署即署無他其或官異可否吏私出入典史推事情證處律調甲信乙詘可否出入者不敢執意而必勝焉官庳而職要事専而務劇非得明練敏辨之士其能持法以惠下集事以獲上者蓋鮮矣故世稱難官必曰典史而居是官者亦每病其責之難塞也三衢柴君德善以郡府吏及考典幕興化邑陋而民譁君曰邑雖陋吾獲上也以勤民雖譁吾惠下也以信吾無容心於陋且譁也行之一年上無譴訶下無謗讟再更漳浦號劇邑郡府誅求百出加以冦警兵興供億雜擾而君一以所施興化者施之故譴呵未嘗至而謗讟亦不聞焉夫居難為之官任難塞之責而能持法以舉其要集事以専其劇非學有得者不能然也德善儒學飾吏知夫所以獲上惠下之本則推而行之天下皆將易而無難矣一邑云乎哉傳曰獲上本於誠易曰有孚惠我德德善其有能得於此者乎余固因柴君之逹政而知儒者適用之學不可以厚誣也唐君大年綜政龍溪序豫嘗論為政者通而不偏難乎其人蓋柔巽之士或任重之無力剛嚴之士或惠下之寡恩敏辨集事者患在持守之不固寬厚少文者慮乎施設之不周斯全材之難得誠古今之交病也若唐君大年於所謂不偏者其殆庶乎君以行省理問知事從軍南來㑹漳郡甫復今平章政事陳公以龍溪邑附郭地若民視他邑大以衆加之兵餘事劇非得賢官以蒞之則將愈壅而不理遂檄君綜邑事而兼攝尹職豫忝二郡幕每得以公事相從見其寬以惠下而鋤奸之必嚴也毅以任重而植善之能巽也灼事明而守益固吏不敢欺以私用法簡而施克周民莫敢違其令信乎其為通士而非一偏之寄者也今年春逃兵搆亂海壖螳斧蝟鋒侮我墉壑郡兵少不足殱賊逆熖愈熾君晝夜行城陴完樓櫓嚴巡邏察兵民之苦樂向背城西北偏舊有門曰小關地勢仄逼外山賊憑髙內瞰往來者可人人數君白浙郡張侯士誠為連樓三層以與山敵而矢石雨下不得樹君令以厚版為堵完則竝舉賊愕然不敢逼圍久不解守者稍怠君深慮生釁為籍符遞官吏洎凡有役者更畨直巡絡繹交屬黠僧若干人謀內應不得發兵民乏食具白總郡計口均給盡而復繼凡三發廪焉君度賊無他技即贊謀出戰夜作小關扉成撤塞出賊不意賊稍郤君亟開西門許重購士卒奮先斬級無算焚其巢壘蕩空既而分省兵至龍溪首當供億而民未至官君隨宜區畫芻糧扉屨兵甲什器無闕將士指曰是能神也尋被檄選補民兵君分里定名數吏胥不能為奸民莫不感悅今夫世之仕者類以無忌為能善飾為亷簿書期㑹徴斂朘剝為勤其於民之利病猶秦人之視越人焉一遇事變則聲嗄氣讋舉措易常者比比也君能持寬猛之宜權張弛之變其所藴蓋有過人者青雲知己馳剡交薦行將脫州縣之勞與廟堂之政以焰焰於北方矣故喜而為書此代唐大年贈王伯疇序人能以一藝自名於世者百不二三名其藝而能以布衣之微草野之遠一旦聞姓名於九重之上者又千萬之什一也是豈特今人之所難亦昔人之所罕聞者也齊郡王君伯疇自其大父僑漳以儒明醫至君三世矣能以意知病因脈無異法藥無竒味投劑輒效諸醫自自以為不及藩臣有知君者薦于朝中書特奏明仁殿以漳郡醫學教授之命下遠近歆豔以為一士之藝必聞于上于以見聖世之明賢無野遺而凡為士者患在在吾術之未精不患有司之不明也時豫忝閩省屬聞君之名未及試其術也至正丙午奉省檄綜理龍溪邑事劇而力獨瘴鄉攝生不易因得痞疾亟簡君至既切脈曰病以勞勩失寢食致治之費數劑耳毋他憂翌日藥效信乎前聞之不誣今試之益驗也他日詢其治疾之要則曰醫之用藥猶官之施政或攻或補猶威恩永濟也當攻而不攻則適足以飬疾欲求吾身之安何可得也亦猶强梗之不鋤則惡將愈熾而善良不得業其業矣噫古所謂上醫醫國意不外乎此豫於伯疇之言非特知治病之要而併以得理民之要也使伯疇得試郡邑其所以利澤於人者將推而益廣矣故為書此以謝君之教且以志豫忱云贈黃伯仁吏滿升府史序余嘗謂吏之澤民也猶賢於官蓋親民莫先於郡縣而郡縣尤親於吏吏尤親於官也官於民事多總裁至於推研事情權度法意甲信而乙詘陽舒而隂慘使民稱平而不怨以病者皆吏之澤也若黃伯仁氏之吏可謂推澤以為利民非徒集事而已當長泰有警黃伯仁以招徠功得吏兹邑克贊官政創墉壑以扞外侮新廨譙以肅下望均役以稅實稅以田懲舊偷而穿窬息鋤宿奸而桀驁化復龍江贍士田若干畝平董仲亨等户婚積訟若干事至有拜浮屠祝其年者凡五踰嵗滿役升郡府民祖送出城數百人羣造余曰願有言為我賢吏贈夫邑吏亦微矣是何得民之深也豈非余所謂澤賢於官者哉民之心至神而公唯神也故莫不嚮善而背惡唯公也故莫不好善而惡惡伯仁氏以一邑吏之微知所以施於民而民知所以報之况於大吏之澤衆民者乎伯仁尚率是無易余將繼此而為民不一書也贈龍溪尹鄧君朝陽政成序龍溪漳負郭邑地若民視他邑大以衆故其事繁難理上逼郡府政之所施類多掣喋不得遂兵興分藩再置事益繁而理益難矣誅求之百出牒訴之羣造規置失則上譴至剖决滯則下讟興上官曰尹曷忘事乃事耶民曰尹曷不憂我憂耶尹周旋綏撫思所以獲乎上下者惴惴焉惓惓焉惟恐過之不救澤之不流也故邑難其尹而尹者亦難於是邑也至正庚子乘輿駐上都選內外清望才諝之士若干人為京官守令清江鄧君朝陽與焉以南臺司倉改尹是邑至則詢民習與前政之所宜興革者去繁以為簡反難以為易民持牒至庭日數百人睚眦之爭尺寸之較輒成訟吏胥利為賄謀至以牒多寡占賄贏縮君進民前曰訟爾利乎曰匪利曰然則奚為不忍小忿而以微事煩尹耶若鄉里有耆民秀士能曲直汝矣無庸肥吏胥也民感服相告非不可平者不復來訟訟庭閴然值郡有警練民為兵先是令民數丁出粟贍壯夫一以應非常丁粟多寡鄉各不同民病焉君核而均之率以十丁養一人規置饋餉輒躬督以給軍屢厯山海險弗憚也上官嘉奬事平君曰未可遽安是惟士習可移民習民不知親上死長之義而驅之戰謂之棄民於是擇學行之士使為鄉師教以孝悌忠信之道而濳消於獷悍佻薄之習繇是士知本而民知方焉既而流移者復呻吟者起遊惰者知所務地無遺力而桑稻蔽野里有厚俗而弦歌化屋列邑慕而思之蓋君以問學之素措之於政本以推末原以逹流故其游刃肻綮恢恢乎有餘地焉三年政成代歸民造君拜曰鄧父官命於朝吾民賤且遠不能告於上以留父願為民告新尹幸無易舊政以久為我利則猶父之在邑也余聞而喜曰令而得民若此是豈特善政有以得於民哉蓋善教有以愛於民也古之所謂賢令者凡以愛民為心故慈惠惻怛為之就利避害惟欲民得所安而已君率是而施之宜其得民之心也孰謂龍溪果難理耶邑之士相與為詩歌以華君歸因托其政之槩以為序汪彥通辟掾序江東汪君彥通業儒而飾吏其吏江東也以憲使周公伯溫薦吏閩海也以僉憲鄭公彥昭辟既孫而退僉憲都公真公交舉之憲副張公師尹僉憲易公原道皆儒者素知君又舉之僉憲速公黑公舉其能御史于公黃公舉其亷憲府及考副帥黃公薦于江西閫史僅數月右轄羅公薦于閩南省掾夫年勞之積未遠而薦剡之揚相望汪君何以得此於賢藩憲之臣哉豈不以君之文墨議論為有禆於惟幄之謀模政理之布宣乎承平選才莫嚴於風紀兵興薦士莫要於藩垣方庶務之孔殷變故之橫作掾持法以守經度時以逹權平立廟堂以與相臣相可否期在處置得宜中合事權掾之責亦重矣稱其責亦難矣彥通君文墨之富足以潤飾乎書檄議論之確足以輔成乎事功吾知其無負於掾無忝於藩憲諸名公之薦拔也然掾承佐官政者也事雖得與而不得専於己君循兹以往法當授七品官使其政出於己得行其志吾知君之設施者固不止是而薦舉之以任顯要者又非特數公而已也君得薦上閩省漳大夫士咸有言以贈故余序此于卷端黃君德明攝教序異時稱閩中士風之美曰一閩二漳漳為郡小邊極南乃得與閩齒豈不以大賢之所過化鄉先生陳北溪王東湖之所講明以身心之學為禮義之化故能使士習為之丕變易浮華為沈實革陋薄為醇厚厯數百年流風存而未泯吾於泰邑之士猶有徴焉在他邑則皆莫之及也蓋能以學世其家矜重名檢不茍言行而無所謂浮華陋薄之習若黃君德明實以是自勵人亦以是而與之者也君嘗為監當官引去曰錢幣易汚人邑有警君倡民結堡里遂完邑學燬於兵久未建君言於令相其役而新之學田沒黠民承邑檄而復焉賄不能奪也君子謂德明蓋志有所不為而材足以有所為者適學官缺選士攝席僉曰無踰德明君辭不獲則曰學之未完某當效力錢榖出納幸無相干也肅奉祀事嚴程諸生使民於禮義知所嚮士論翕然余聞而喜曰士風美惡民風淳漓繫焉士者民之秀民之望效焉者也今天下多故文教日隳士不知有身心之學民不知有禮義之化宜其風之不古若也君能於士風之素美者振而興之民風之淳余於今焉卜之矣邑諸生請余序為君贈余為書此不敢辭贈長泰令鄧侯新政序尚論感人之艱易惟在人推心之誠否耳夫茍誠以推心也則强者必抑弱者必植奸黠者必知所惕遊惰嚚訟者必知思所以自飭而顛連困窮之賤獲被其澤疾痛瘡痍之苦均得以蘇息矣其不誠者反是易曰孚于豚魚言誠之感物也矧人之同此心者乎長泰在漳邑為小其民則視他民為譁元政既衰令非其人民不堪其虐輒且挺而起比冦平則民以殘矣既內附鄧侯亷首來作縣較其戶則死而徙者十二三視其民則刀㾗箭瘢膚體弗完不能業其業者又一二也慨而歎曰邑小而民殘吾將何以足供賦之常塞牧人之責以無負上命之重乎乃綏撫招徠勸勉勞來移者以復仆者以起均徭而民力紓簡訟而吏弊祛鞭朴不施而稅以時足事以期集邑中翕然值春旱秧不得蒔侯躬禱良岡山雨大作三日而後止諸里皆告足邑之士羣造余曰吾令賢令也願有述新政之美夫當昏濁之極獲覩天日之新而首政之令能惓惓焉以子民為心使之脫水火而居堂奧辭鑕斧而就袵席令之賜亦厚矣昔卓茂為密令於東漢之初勞心淳至視民如子民不忍欺豈非誠感而誠應我侯推誠於民而感之之易故山川之神有禱而不違誠之所孚幽顯無間也余居鄰邑間嘗與侯遊從而有以得其政於見聞也故因邑人士之請為序其槩龍巗簿劉君新政序營丘劉君彥璋來主龍巗簿未及三閲月士樂其有禮民信其能惠吏服其通練明决桀驁知畏而改行弊蠧廢墜以次而革舉邑中翕然余既聞之而異其感人之速矣漳衛兵無居屋雜處民鄽郡府檄君營之至則鳩工委材分令諸里胥督其成先期而事集他郡蒞役者嘖嘖嘆其神速暇日訪余梅雪齊中容修而不矯論正而不勦向之所聞於是益信因記曩遊齊中周覽形勝羣山抗其西大海拒其東其人皆沈厚峭直敦禮好義太公之遺風蓋有存者君生於是而鍾其秀學於是而成其材亦嘗仕於是而善其政矣宜其設於一邑恢恢而無滯也昔者太公治齊三月而報政君特有得其要者故於新政之施有以感於士若吏民之心如此然則及民之淺深固不可以在官之久近而槩言也余聞彥璋所與游者多偉人碩士青雲知己將必有棲其羽於上林之枝者枳棘固不能為鸞鳳留也故於其竣事歸邑書此以為贈贈林子方序國子助教髙君逹善謂弼曰林君子方其醫之良者歟察病必知其源用藥必知其要不屑屑於古人之陳言而惟以意求之或攻病而取速效或磨病以圖後功惟求其愈而已遲速則隨其宜而不爽焉故能上被聖眷下慰人望子方亦可謂不負其業者矣去年春豫被命使安南五月至其國瘴鄉暑道感觸既深去蒼梧秋氣稍凉伏暑內發體熱可炙手靖江王遣醫診視連進數劑熱雖稍退而泄痢作矣至京痢轉劇有㫖命子方賜問既切脈曰君脈與症無大可畏然不可即治必漸消之則病根可除而他疾不生矣於是日服其藥閲兩月而後愈余念其恩而難於自言也願借子言之重用為子方贈嗚呼二氣交蕩容有乖離而人之疾疢生焉醫以濟之使夫乖者順離者合而疾疢以安其功用亦不細矣然能察隂陽之變審三因九候之微者幾何人哉此逹善之德子方不能不為之嘖嘖稱道也弼曩以使事兩至安南稔其山溪之險惡竹樹之蔽翳一遇災暑則毒蛇猛獸之氣蒸而出林莾流而出澗谷雖水泉蔬茹皆不可食及再至之日即不能食及道左江復染嵐暑轉為傷寒既泄且痢或曰傷寒自痢醫家所忌前後進醫數十皆罔效至韶已三月矣有醫曰尚有積也飲豫藥二劑痢稍緩羅某廬陵人固有得於醫之意者然未若林君神且明也昔人以與相並言蓋燮理隂陽之在是也林君真其人哉豫與髙君皆使安南而林君實宗人也故為書此不辭君居姑蘇今為太醫院御醫云贈陳執中序青雲負海在昔擅魚鹽之利入國以來田賦既增而漕運遼東道必繇之於是事始劇矣晉安陳執中用薦為吏部考功主事朝廷以萊之昌邑素號事劇輟其職出知縣事噫有地數百里民數千室邑宰視古子男亦足以行其志矣治劇有道寬簡以立志勤敏以蒞事則裕而不擾執中優學以逹政猶扁之斫輪慶之削鐻固不待勉而能也萊自禹貢已作牧矣今其地稱殷富吾知邑事為易集也君行矣他日名著循吏齊名太丘將於君焉卜之毋以古人為不可幾及林登州集卷十二
