body:
  text: 林登州集巻十一明林弼撰送序送羅宗禮之官陜西序士之適世用者曰儒術吏事然必相須也吏夲於儒則事以理斷而無深忌之心儒飾乎吏則事以律裁而無迂僻之患禹臯稷契伊傅周召都俞吁咈朝堂之上謨謀輔翼於君之左右其所學所施謂之儒可也謂之吏亦可也奚有差殊乎哉後世岐儒吏為二途故於儒則以章句固滯誚之於吏則以刀筆筐箧鄙之吏者曰彼儒者也不知吏事於剸繁治劇無補也儒者曰彼吏者也不知儒術於政之大體無識也嗚呼儒吏之相軋也乆矣求其適於用者亦難其人矣抑亦先儒而後吏體儒而用吏庶為通濟之士無適而不可也卣固不可以為罍豆固不可以為爼盤杅几杖不可以為鼎釡刀劒用各有宜也通濟之士則不然事之當以律裁者則守其律不可以律裁者則以理斷若權之稱物低昻屢變也若鑑之照物妍媸隨應也夫是之謂適用者也夫是之謂相須者也予於衆得數人焉若羅君宗禮其一也宗禮世以儒業鳴其祖若父若諸父咸以詩文名於近代君少習父祖之訓於學知所用力元世仕之途非儒即吏君於是從逕而折擇焉為吏若干年從軍者太半洎入本朝為指揮吏為行省掾事積于案君從容一言剖之律合而理不違上官器之既而以他事黜而能聲益聞於是以兵部都吏為中書掾尋進大掾今年冬出為陕西都事或曰何卑也君曰幕官知職可矣何崇卑之計也嗟夫材者天之賦人之習也不習者天不賦者也君今所賦之美而加所習之勤蓋無往而不適於用也君年方富而儒術吏事兼有之其業之所成者固未敢以涯涘窺也於其行姑序此以送之送韓繼學之官瑞州序韓君繼學為中書禮曹掾某忝職禮部與君實同事焉每遇事必同白丞相裁允而後施行君小心畏慎日條録而枚識之事如期集未嘗或怠廢也其承上也無謟容其接下也無傲色今年冬出為瑞州經歴來言别余嘗宦游大江之西知其俗好嚚訟而造作徴需無虚日府配諸縣或不集則咎歸府而幕官首任其責也而經歴又總任其咎者也故職之難者莫如幕職而幕職之難者又莫若經歴蓋幕職之貳者猶可以他事諉而幕長不容諉也雖然江西為府十有三而瑞州屬縣三視他郡則民寡而事簡以繼學之亷勤慎事不立異於内不徼名於外吾知其事易集而政易成也文牘期㑹之常固繼學之所習而上相有以試之矣才以施之於人行以守之於己君蓋優於是也諺曰任輕於所重者其功倍吾於繼學亦云送蔡郡萬僉憲引年歸里序蔡郡萬公克明仕元世已踐清顯逮入聖朝以才諝聞于上即廸簡來京師臺憲方慎擇人僉謂公明法練事克稱是職遂授山西提刑按察僉事再轉陜西後復轉江西亷車所至不以察為明以苛為能以鋤擊為名而一揚一抑一臧一否舉得其當無所遁其情焉某倅饒日公再至郡嘗從容謂某曰子厯有司必明刑逹政都府之事頼子以集尚其勉諸又曰學校育才上所注意子儒者毋以非職而課程諸生心弗力也未㡬某以他事去官而公亦議失當謫居江浦去年冬有㫖徴還吏部别授某亦在列公見當路即自陳疾憊弗任引年乞休致主者以聞上可之公遂歸謝嗚呼世之志富貴者汲汲焉以趨競為心得一資半級則揚揚焉為榮惟恐失之公年未老力未衰一旦毅然謝退人固惜其才之不䆒於用也夫孰知公之心寵榮聲利泊然無營一進一退惟義所在乎公歸蔡某水某丘尋釣游之舊有美可茹有鮮可食進不慕鳴鵞之績退不興牽犬之歎優㳺以終餘年其樂者未渠央也某老矣倘脱塵網将青鞋布襪從公於松泉竹石之濱公許之否乎送國子朱士文歸省序吴郡朱士文繇縣學弟子員入成均為國子上方尚文治國子多不次擢用或一再選即任方靣司風紀六館之士朝夕待用學多不力士文自念學業未成而大父母父母皆在堂仕則廢學而棄親遠留館以卒業庶得時歸者以慰親心也今年秋請告于國學國學白於禮部允其請士文即治行告别于師若友給事中丘君功近來言於某曰士文行有日贈之詩者已積巻軸敢求先生一言以序其首噫士文之學其知本也歟夫安於小成者必不能勝重任而為遠器何者其所就者淺故其所用者狹也彼夫躁進而不知其非取髙爵而不知其才之弗任揚揚大言曰我能為是我能為是吾将成事功於國也吾将大顯揚於親也曽㡬何時或以罷愞黜或以貪墨刑負國而辱親者比比焉斯固士文之所見也吾知其視以為戒而無慕羡之心矣士文其尚益勉忠孝之學以為設施之地成光明俊偉之業以無負於國光顯於親吾将於子焉卜之也送王徳常守韶州序國朝慎選郡守凡京官有材幹者輙不次擢居是職蓋用漢制也夫承流宣化而為民之師帥固一郡之頼以安者也强焉而抑之弱焉而植之戚焉而休之曲焉而直之有社稷山川之祀焉必思致其誠也有錢榖刑名之出内輕重有造作徴需之紛紏雜糅焉必思致其公與勤也令分其職於下而守總其任於上茍非其人則庶事弗集矣洪武十一年春有㫖命中書守令不拘資格選材而任之王君徳常為禮部員外郎以材幹稱於是出為韶州守韶雖居嶺表實昔賢張文獻公余襄公之故里而濓溪周先生過化之邦也流風餘澤猶有存者其民淳其俗簡政化之施者易入以徳常治之吾知不待數月其報政之譽已聞於上矣聖天子嚴慶讓之典方伯郡守之來朝功者有以榮之過者有以愧之治效之成正在今日徳常化行於韶明年入覲其将承寵光也必矣故於其行叙此以為贈送王徳章之官保寧序工部員外郎顔君某謂弼曰王徳章氏少與余同筆研秀爽而練逹佳士也今年秋以有司之薦登名銓曹授保寧司庾人咸卑之徳章竊自喜曰吾上世居蜀先壠在焉吾祖宦游江南遂占籍吴中吾不幸少孤藉先人之澤粗能樹立出游齊魯之墟僑居荏苒又數十載雖欲歸吾里不可得於蜀則又以險逺故欲一至而無其因松楸之思戚戚於懐今兹保寧之行道經遂得瞻拜先壠實大幸也職之崇卑奚擇焉聞者賢其孝各賦詩以華之幸先生為之序嗚呼世之宦游者昔彼而今此或定居成桑梓焉則安於是而遂忘其故鄉矣眉山蘇氏惟老泉先生歸葬於蜀東坡頴濱二先生皆葬於汝子孫居江南者雖汝猶未一至矧蜀乎宜夫徳章以獲道故里為幸也過家上塜烹肥擊鮮與一二族人追敘宗盟談舊故百年之思一日之見其為樂當何如耶徳章行矣司庾職在㑹計聖人固甞不卑而居之吾知徳章必不容心於是也送安陸學正劉謙亨序洪武己酉夏某被徴赴京道溫陵獲識劉君謙亨於友中言簡而禮度氣和而神朗余固知為儁偉之士也别來且十年聞謙亨分教邑庠於弟子員多所成又喜善於其職也今年秋用有司之薦來京師銓曹試以經學以謂校官以立師道必重其選於是謙亨得為安陸學正予觀君之儀矩足以為諸生之觀法君之文行足以為諸生之楷模其講授也必以周程張朱之學倡而明之吾知師道於是乎立矣昔者君子之教人也以身心師道之立者有其本也後世之教人也以口耳師道之不立者事其末也謙亨之教能以夲為務則夫人材之造就風俗之丕變當自兹始安陸楚之故都昔稱夷俗然江漢之徳化屈平宋玉之文風必有未冺者雖兵革廢墜之餘謙亨能作興而變化之則今昔殆不殊也勉之哉送國子聶荘歸省序贛之寧都余友荘君仲慈嘗令其邑能以禮樂為教予聞而喜之洎余來京師獲見國子聶荘氏乃其邑生而為畏友黄君致吉之弟子員也言從而貌恭神冲而氣充知其善叩其學而無凡近之習也他日國子多就試禮部而吏部輒官之予每與較其文聶明春秋學而未甞一試焉夫有學而不求售於有司則不以小成為安而能立矣有入仕之途而不茍於進取則無競名之心而能亷矣立而知所以勉亷而知所以擇君子之道孰先焉聶之所以能如是者必其教之有自而學之有素矣吾觀今之仕者道未能信學未及優而汲汲焉寵榮聲利之是競雖獲一資半級而以貪躁取敗者衆矣聶真可與言哉聶在館二年思父母定省之久闕也以歸覲告國允之予於是又知生之學知所重也故為序以道之庶俾學者有所勵焉送蘇用賔歸里序孟子嘗言君子之樂三一曰父母俱存兄弟無故係於天也二曰仰不愧於天俯不怍於人係於己也三曰得天下英才而教育之係於人也余每讀此未嘗不掩巻而歎曰嗟夫俱存無故樂於家不愧不怍樂於身教育英才樂於天下是皆人所深願而不可必得者茍皆有以得之其願足矣其為樂當何如信乎王天下之事有不足與存於此也吾於友生蘇用賔氏固有以幸之又有以勉之矣漳之山水惟東南虎溪為最勝而士族蘇氏最嚴整用賔大父瑶溪公以詩禮為家訓三子皆雅飭質諒知學好禮至用賔兄弟及諸從昆弟襲芳趾美益以敦確清俊聞鄉閭化之郡府有知用賔者延于學俾訓郡庠子弟員用賔慨然曰某藉世積之休天錫之慶父母夀康兄弟具翕某幸知讀書竊有聞先儒之緒論惟思克己以免愧怍而未能也為教於人将何以哉吾惟歸侍吾親以奉菽水斯至樂也廪食數月浩然以歸來言别曰敢求一言昔陽城為國子司業告館下諸生曰凡學所以為忠孝也諸生有久不省親者乎蓋以忠孝為學則必以忠孝為教用賔分教郡庠雖於國子小大有殊然其心每在親則其所以行於己者是即所以教於人者也夫三樂一不易得而用賔殆兼有焉宜其為人之歆艶慕望而不容己也抑余聞三樂以無愧怍為本使吾胸中多所愧怍則雖處父母兄弟之間固亦不得樂其樂雖得英才亦将何以為教而有此樂哉用賔其益敏於克己之功以至於心廣體胖則近而順乎親而有以樂一家之樂逺而及乎人而有以樂天下之樂矣用賔歸有日諸友咸賦詩以贈因書此以弁其端送贈傅希説序茍可以周己而施人者雖小道曲藝君子猶可與也藝莫貴乎周己昧於周己則失己矣道莫貴乎施人昧於施人則失人矣小道曲藝尚然况理之大者乎廣信傅生希説弱冠知讀書其燭理也明長遊四方其閲事也察嘗從方仲鈞先生㳺得六壬占法以十二時所值錯綜幹枝生尅推人禍福言輙竒中人神其術一日謂余曰窮逹夭夀天之所命非今可移吉凶悔吝聖人所以示人使不迷其途以順受其正者也後世占卜之法雖不必盡出於易舉不外乎隂陽變化之理而已昔東方曼倩諸葛武侯皆用是占以决出處之疑吾非能窺其微者庶幾行己之際知所修省以寡過耳古人之言亦非敢舍是以為説也余曰是非理之當然者與子之周己施人者固非局於小道曲藝也周己而不失己施人而不失人君子之所與者在是已子之游其有遇哉希説将為武林之行來求予言因書此以為贈送李宗仁秩蒲序晉安李君宗仁以茂才入官長漳龍江書院教成東歸博陵林唐臣走送東湖之上酌之酒而贈之言曰士之學也貴乎知道而仕也貴乎知職吾子讀朱子之書游朱子過化之地而典其祠事惓惓焉惟先哲之是景是慕規言規行恒恐有負其教殆庶㡬於道矣廟堂之弊也起其頺而完其缺廪入繁寡能樽節他費而奉祭飬士之用恒有贏焉於職蓋無愧矣夫必學而後仕未有不知道而能知職者也然道非一端愈進則愈髙職非一事盡乎此必能盡乎彼而後可吾子年富力强道之所造職之所任非止是而已精粗本末理無一之不窮則崇庫小大任無一之不精是故善學者觀其用力之初善仕者觀其施政之初今子有其初矣推是以往而能加勉以不替于厥終則聖賢之道可企雖廟堂之職亦舉此措之耳余困於學而拙于仕故敢以所難者為君朂也於是相送之友若干人咸請書之以華君歸遂不敢辭送指揮龎侯之燕山序國家於武臣必使其子孫世襲祖職勿替重報功也蓋開國之始實頼諸将臣折衝禦侮之力以成開拓疆土之功功懋懋賞固其宜也凡世其職者念前人之勞思國家之報其自勉於己者宜何如耶易曰王臣蹇蹇匪躬之故詩曰夙夜匪懈以事一人如此竭力供職庶乎不墜於前而克裕於後也廬江龎君士正襲伯父職為中山衛僉事改武昌䕶衛左右楚王既復調燕山中䕶衛夫䕶衛之職上不輕以畀人也必素所親信然後授之君以世功襲爵為公侯腹心既親信矣故一秩三遷于以見皇上恩眷特厚非尋常帶礪比也念前人之勞思國家之報正在今日勉之哉君年方富報於上者遠繼於前者大其鞠躬盡瘁以自顯庸於今為可卜矣故於其行書此以為贈林登州集巻十一
