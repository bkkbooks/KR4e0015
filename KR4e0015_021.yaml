body:
  text: 林登州集巻二十一明林弼撰墓表暉堂劉先生墓表自古有學藝徳行之士藴之於身而不獲見于時其昌而大者恒在其子孫焉蓋其積之既厚則發之必茂今日所以淑諸人者即異日所以起其家者也矧數世家學之澤涵淳演迤經前裕後其本深其條蕃固理之所必然者予於豐城劉先生暉堂而有徴焉先生諱闕字克暉先世蔡人五世祖曰充字實之宋名儒五舉不第授衡州監獄西山真先生為淮東提刑聞其賢薦授從仕郎提刑司幹官後宦遊豐城因徙居焉司幹三世而生元鈞皆領鄉薦為儒官元鈞生遇之建昌府監税監税子五人先生其長也㓜而秀慧髫齓親去聲知讀書稍長治舉子業為文富贍藻麗雅為時軰推讓再試有司不售即棄去授徒邑里間及其門者皆卓卓有立諸大姓争禮致之瑞州守秦侯遣史致書幣延為弟子員師廩食僅數月以母老辭監察御史實哩布哈分按江右特薦之先生曰吾知命者富貴非敢求也以他故辭弗就益聚徒講道誘誨不倦凡明經之士每以所業質焉其所可者必得雋塲屋否則黜因號為鐵眼先生言其識鑒之精明也進士張異徐邦憲未第時有所撰擬攜示考訂先生為評純類優劣莫不心醉而去自監稅公歴職于外家務悉付先生弟妹多㓜先生訓教有方婚聘以時諸弟出為郡縣吏假貸以資給之雖在外館必延明師以訓諸子嘗曰吾不求聞於時兒輩能勤于學以底于成天意或在兹乎性質諒無矯飾不茍言笑與人交重然諾鄉鄰事有疑難必請決焉先生熟思審處籌其成敗有若蓍蔡諸弟暨族黨事無大小必咨而後行對客終日危坐豐頥廣顙衣冠儼肅望而知為純篤君子也至正壬辰兵起往來避地以禍亂未平憂憤成疾竟以弗起先生生癸巳卒年六十是年九月二十三日葬于折桂鄉突塘之原祔先塋也配李氏生子三人長曰積以武功授昭信校尉義兵千戸次曰秩字伯序由國子典籖累遷奉訓大夫知崇明州事州有海堧田鹽場皆為海水所漂積年納米及鹽課伯序奏免海民感其惠立生祠祀焉優學達政所至有聲稱又次曰䄷蚤世女一人適南昌萬大用孫男四人長曰静字仲安今居遼東崇明子也崇明為同僚搆誣以罪静年十二直其父寃於朝誣者皆伏誅人稱之次曰謐字仲寧工詩仕至前五軍都督府都事曰太尉保孫女四弼在史館日適崇明事白嘗定交焉洎來豐城又其鄉邑也因以前進士朱自省行述請曰先人宰木拱矣秩以游宦江海墓隧之石未刻幸為文以表先行庶幾發幽光於九京而不重不孝之罪也嗚呼仁者必有後劉氏自司幹至于今八世矣雖官不大顯而書澤綿綿不斬其昌而大也已兆於崇明之兄弟繼自今若子若孫能世其學濬其澤以無墜厥祖之積則先生淑人之徳天之報施將未艾也是為表神道碑故開國輔運推誠宣力武臣榮禄大夫柱國東平侯加封鄆國公謚義安韓公神道碑自昔帝王之興豪傑之士能識真主雲從景附勇者効力智者効謀以戰則克以守則安用能懋著殊勲弼成大業蓋天生賢才以為真主之輔非偶然之故也洪惟皇上當元政不綱四海鼎沸之秋起自布衣提三尺劔削平羣雄戡定區宇有若鄆國韓公知天命之有在首謁軍門率衆來附効忠宣力以成大功以受上賞其亦豪傑之士哉公諱政字敏道始祖筠居兖之寧陽筠之四世孫驛宋進士及第仕至中書舍人九世孫諱青自寧陽徙居睢州是為公之曾祖以公貴贈中奉大夫山東等處行中書省參知政事䕶軍追封儀封縣子曽祖妣閻氏追封縣子夫人祖諱榮贈資善大夫山東等處行中書省右丞䕶軍追封高陽伯祖妣李氏追封高陽伯夫人父諱旺贈榮禄大夫山東等處行中書省平章政事柱國追封東平侯妣楊氏追封東平侯夫人公少負才畧尚氣節値元季之亂即集民為兵以保安豐甲辰内附有㫖授江淮等處行中書省平章政事鎮廬州未幾進兵克臨清又從大將軍信國徐公復安豐移鎮下邳繕城隍脩戰守之具招集流散民以靖安時王信駐兵沂州猶為元守下邳距敵境僅十里許公示敵以威撫其攜貳以恩信敵不敢犯境丁未冬大將軍北征公領麾下為前鋒下滕兖濟寧東昌臨清廣平順徳等郡縣十餘城洪武元年轉山東等處行中書省平章政事鎮濟寧公一以行於下邳者施之民大悦服既而領兵從信國公攻榆竹守將酈毅出城迎降師次梁成元右丞趙蠻子遁走其部將劉同知程僉院等皆降公奉命入城撫安其民悉安堵如故吳左丞等據蟻尖砦拒守大軍公領兵拔之歸附之民多外郡人公聞諸朝彰徳之民悉令入籍餘並聽還鄉里山東山西悉平召赴京師慰勞甚至三年從征虜副將軍北征上都招降興松全寧靖豐等州凱還上念將帥百戰之勞定行功賞上則公爵次則侯封各賜鐵劵金書傳示子孫俾世其禄於是授公開國輔運推誠宣力武臣榮禄大夫柱國東平侯食禄一千五百石十一年二月十九日以疾薨于京城賜第上聞之憫悼詔追封鄆國公諡曰義安公生于元延祐丙辰享年六十有三先娶張氏癸巳冬遇兵亂守義不辱投淮水而終追封東平侯夫人繼娶楚氏封東平侯夫人子男五人長英次進皆庶出次五兒次永安崇安夫人楚氏出也女三人長適謝原禮次適益其三尚幼是年四月初七日歸葬于睢縣北崗保杏岡闕之祖塋詔有司給喪葬之具及葬上親製宸翰為祭文躬臨奠焉復勑臣弼製為碑銘立諸神道臣不敢辭臣聞為將之道智信仁勇必備其徳惟公素稱長厚遭逢聖明年甫強仕見明識定足以有為其戰勝攻取未嘗敗衂皆其智而勇者為之也其推恩撫民所至乂安皆其仁而信者為之也昔光武稱冦恂有牧民禦衆之材公蓋庶幾焉故能享尊榮壽命考終官躋極品爵封上公皇上崇徳報功之意可謂至矣天之報施善人亦可謂厚矣臣既歴敘公之勲勞次第如右復稽首再拜而獻銘曰天命真主混一區宇必有賢輔雲龍風虎賢輔伊何炳於先機仗劔以從識所依歸肅肅鄆公有猷有守元綱解組兵保于壽皇上龍興疆土日開率衆以來帝曰俞哉授以節鉞作鎮淝水據淮上流濠壽風靡移鎮下邳墉壑既成我圉不驚我民載寧北征之役前驅無敵魯衞之墟破竹而克濟民既安送款源源爾民無畏將臣克寛撫其瘡痍歸其流徙仆者以起憂者以喜凱旋自北戎勞居多剖劵錫爵帶礪山河謂享太平保爾寵禄天胡不愸長逝弗復宸衷悼惜命返先塋生榮死哀五福並膺微臣作銘刻于貞石何千萬年永樂臣則傳元亞中大夫漳州府路達嚕噶齊徳侯傳侯諱徳哷穆蘓字子初西域哈拉衮氏世宿衞故占籍為燕人元制諸士分四部部有長官權視將相衛士有年勞力幹者其長薦聞即不次擢官或舉給事臺省未數年已踐華要侯自弱冠入侍禁闈信慎勤畏為衆推許君相所周知闕長官屢欲薦用輒遜曰某士齒長勞久宜先擢之某不敢越也他日復薦則又曰某固列中然吾母老重違晨昏寧後于仕不敢暫去膝下也中書叅知政事達爾瑪實哩與侯交誼最篤强侯共事侯曰君知我者亦見强耶服除年及强矣猶杜門無進取意東宫素器侯一日笑謂曰黒頭者多為公矣君年四十猶未仕將老宿衞耶命中書奏官之侯曰某初仕未練事幸卑散職遂授承直郎江浙行省宣政院崇教至正辛丑涉海進方物轉奉訓大夫杭州路治中九月改福州二十二年壬寅再以事至京拜福建行省理問官階陞奉議與平章政事揚珠布哈同赴任時盜劇省治不得入侯贊平章集外縣民為兵環城劇盜出戰輒敗城民饑侯恐民死非辜白公飛書許民間出出輒賑之盜勢益孤蹙因為闕東城圍使得奔即勒兵盡殱之閩人趨侯拜曰全我耋稚皆侯力也再陞朝列大夫長前職大兵逼閩二關侯以行省命與諸將議戰禦之䇿徃返者數十二關賴以不破二十六年轉是官以陳友諒專制閩省郡縣自設總制綜理之職而正官政不及不欲上省臣勉以行既至民喜曰是能父母我者屬兵餘民困朘剥愈急侯曰吾受千里生民之寄不忍坐視其死於是釐庶務之利病而興除之敏于吏事羣下不敢欺而務存忠厚不察察事苛細民甚安之大兵南畧陸下邵武水道取閩城省臣有遁至漳者吏請郊迓侯嘆曰吾無顔面見此輩既而驛報招諭使至侯朝服焚香望天西北拜曰某年四十始仕不數年而致身二千石國恩厚矣今力不能禦義不肯降惟有死以報國耳退就室屏僕從斫印去篆書所執笏曰大元臣子大元臣子置案上取佩刀刺喉外割絶咽遂死手執刀按膝上毅然如生民走哭聲振地共斂葬城東門外使者為泣下躬弔祭焉侯生至治壬戌死年四十有六祖曰瑪克蘓爾大都治中父曰黙哩瑪哈穆特安慶路治中夫人囘囘氏先卒子男二人長曰六十宿衞為舒固爾齊次曰布延特穆爾江西省通事孫男一人布拉克嗚呼死社稷常法也然夷考古人其所以處死或不能盡同者夫亦隨所寓而裁之耳故或戰而死或執辱而死蓋戰而不終則終被執辱也必矣侯戰則無兵而義不受辱也故自決以死而無二夫死等耳與其犯辱而死于他人之刅孰與未辱而自引決之為潔乎吁若侯之死可謂能處死也已故敘其死事而併及其世次踐歴庶幾當世能言君子或有采而表之者焉方簡夫義節傳方有臨字簡夫連江縣布衣士也以篤學勵行淑其鄉嘗慕馬新息之為人曰窮必堅老必壯至正壬辰盜掠其鄉方年七十餘被執盜以其信鄉人也欲先脅之以汚其餘方罵曰吾讀書明義有一死耳不能從女為逆盜直之未忍即殺方罵愈急子桂茂走盜所乞代父死盜方怒斫桂茂腦隨仆方復罵曰曷不殺我而移怨吾子盜遂斷其臂既而桂茂蘇而方已不救矣鄉人哀之共斂以葬桂茂與兄安世皆嘗薦于鄉孫驎亦知學云林唐臣曰士之死也就義焉爾矣位不足道也使死必以位則捨生取義專于貴者而凡布衣之士舉不得厠其列然乎否也簡夫大義炳中不以賤而移不以老而挫故陷難而能決死無二彼位所當死而未必死者視簡夫之為其賢不肖果何如耶漫客傳漫客不知其姓名或云穎川出也恒往來荆揚閩粤間至則輒留畱輒久凡風雲泉壑之勝故墟陳迹之遺不憚險逺必徧遊焉覽奇弔古發為詩文紓鬱偉宏人咸賞異願内交焉漫客不拒也性不喜飲微酣善劇談上下古今出入子傳移日亹亹忘倦理亂直囘必為欣戚奬抑或問所志曰雲月吾家也鷗鷺吾徒也圭組吾身外物也子何疑於漫客哉人知其藴才以玩世也故愈親而愈不敢狎之林先生曰予遊吳嘗識漫客于江湖之濵軀幹不踰中人而氣局英發精悍文藻議論往往超卓出流俗昔太史公周歴四方君子謂其文閎深雅健有得於遊覽之助吁漫客其亦志於若人者哉朱隱老傳朱隱老字子方南昌豐城人幼頴敏嗜學晝夜誦讀不輟母楊氏恐其成疾也少與膏燭至對月拾薪以繼父應岳奇之嘗語客曰是兒他日有身心之學甫長克自淬礪宋遺老姚江村洪泳齋趙冽泉皆以經學稱隱老迭從之游學益進廣州倅凃應雷嘉其清苦妻以女孫兄鎮孫以其不事作業也白母析財異居既不能禁即以田廬之良治者讓兄已日就貧窘弗恤也弱冠試藝有司弗售即屏去杜門絶世事潛心道徳性命之藴思有以羽翼道學嘗曰元興周程張朱之學表章於世固以大明邵子先天之學出於心傳未能闡其微㫖吾于横圖而有得于姤復焉於圓圖而有得于乾姤坤復之間焉於方圖而有得於震巽恒益之間焉皆從中起斯其心傳之所存乎又以經世書備物理性命之説而人莫之講於是著經世書説太極圖通書西銘朱子皆有注惟正䝉未備於是著正䝉書説易道無窮隨索隨有於是有易説儀禮經傳朱子以命勉齋黄幹幹以屬信齋楊復記錄雖詳而去取未當於是有禮説别著道徳經註與厯書二巻及門之士凡若干人其始見也畏其端嚴簡黙比至執經授業則俯就樂誨於理義密微毫分縷析莫不心醉焉蓋其教人以忠信為主明體以適用本内以達外一以聖賢為師故人於身心知所用力非徒口耳而已先是淮兵渡江所在盜起焚掠鄉落隱老猶左右圖書著述不廢盜初至則曰財物任自取之書非所用也屢至則曰吾財已盡無以給汝矣盜素聞其名皆謝去里賴以全山砦方相雄長詭隨者衆則戒子弟曰吾家世清白汝輩寧寒餓死毋汙不道也至正丁酉十二月遘疾八日呼子善謂曰吾疾無甚苦但覺氣漸微以至於盡吾以數推之明年江西有大變汝善防以免難所著書多未脫稿編緝芟補皆汝責矣語竟而逝年七十有四學者號曰灊峰先生善字備萬邃於經學能文章嘗構堂以祀隱老推其祖應岳伯祖應闕名之曰灊峰精舍蓋世其儒業為鄉先生云外史氏曰羲文周孔之心法易書具矣後世學易之士論數者昧理泥象者遺辭邵雍氏出即圖為書得理數之源象辭兼舉不遺矣横圖與圓方二圖皆自易繫而推演其奥經世一書亦以四象而起者也張子正䝉雖本諸易然其明正道以正人心用意深而措詞嚴所謂無子厚筆力者隱老乃能㑹而通之可謂忠於諸子而有功於易也元世道學之士北有魯齋許衡静修劉因南有仁山金履祥草廬吳澄白雲許謙退齋熊禾若隱老者夫豈可少也哉蕭昶傳蕭昶字渶飛廬陵人幼穎邁異羣兒十歲失恃父某繼娶劉氏不慈數虐之身無完衣隆冬跣行雪中每以不能事母自咎畧無恚意伯母憐之撫育于家劉誣訐伯父母俾無所容昶恐貽怒於父乃去游荆湘間遇異藝術輒學之而尤潛心於醫僑江陵逾年父思之遣价迎以歸昶以業未成不欲遽還已而思親命不可違遂歸父母大悦居亡何再遊湖南時翰林學士承㫖歐陽公𤣥聞其能延見之因為書翼雲二大字又作文以遺之薦為瀏陽醫學官以親老弟幼辭鄉族舊故歸美於伯父母繼母自悔遂成慈母汝顯兵亂延禍江右草竊乘間攘敓昶義倡鄉兵以禦之間關十戰昶素習武事賊畏之不敢侵掠里頼以全父喪哭踊幾絶喪事盡禮既葬母乃分財産昶獨不受悉歸遺母及其弟慨然曰男兒當自樹立寧能屑屑先業耶母聞兵亂挈財物依其姊家夜失路墜井死昶倉皇募人縋井挽屍以出禮葬如父父嘗構樓為藏修之地昶承先志益崇飾之進士李祁扁曰會昌蓄琴書延師以誨其子凡名儒碩學皆館於其家焉以他累謫耕濠梁暇則以醫濟人貧者投以劑不求償富者酧以金帛亦必審於義而後受之謫耕者多貧不能具牛種督者將寘之死昶賑以錢輒焚其劵得不死者幾千人林先生曰予行江淮間言孝義者必稱昶嗚呼患難相恤已不之暇而厚義薄利周人之急有若昶者誠未易能也稼軒高士傳稼軒高士姓髙氏隱華川郭南善治稼以稼名其軒人因目曰稼軒高士云或問稼之説高士曰善稼者力吾力時其時焉耳矣不力則人虧不時則天違力虧時違而望其稼之成譬猶解裘以求温縶馬而使馳其能有得乎哉自吾祖父厥既敷菑以遺我後人蓋有望乎不棄其基也播而穫之我其敢怠于兹思昔成周盛世人知力本主伯亞旅罔或不勤固見於載芟之詩而吾有弟三人皆能以稼為務吾不敢鹵莽而耕滅裂而耨也則力焉者必有以報吾力也吾不敢越春而種過夏而耘也則時焉者乃所以穫之時也是故闔門百指不憂饑寒兄弟具爾怡怡以嬉其視車塵馬足擾擾奔走廩食僅三餐而紅朽且萬斛者未嘗不深為之悲也聞其言者尚其操而闕其名實稱其情焉林先生曰稼軒之言非徒稼焉而已力之云其盡己者歟時之云其審勢者歟力於所傳而友其所同産闕者矣昔徐稚非其力不食世以高士稱之稼軒真其流也耶烈婦翁氏傳翁氏諱壽安奉訓大夫福寧貳守觀達之女幼慧知學好讀女誡女則等篇笄而擇配建安朱塡齊國文公六世孫也塡令長泰上甫三日以公事入郡冦卒起圍郡城塡不歸長泰遂陷翁方盛年而二女俱及笄有令姿度不能免禍則誡女曰女以貞潔為節寧死不可辱長先赴井季繼之賊急舉以出則長股以折翁氏知入井不得遂死即引刀自刎尋絶賊相與駭嘆因全其子鎬贊曰淮汝盜起所在陷没固有綰符仗節屈膝臣賊者其於所天為負多矣翁氏以一女子的然知不更二夫之為義決一死於俄頃嗚呼其齊國流風之存歟抑知學明理之助也與噫烈矣誄櫟山張先生誄士之生兮孰尚以貴徳彌中兮外負材器禮以為閑兮幹以義理之周兮責斯備人親二兮我有四均吾心兮孝畢至天造之屯兮余心之好貧恐余之志行兮不若古人彼猘之狂兮角且羽我袪其害兮不怯以武詎埀堂之昧我兮陋忠信之無取人之窮兮我實悲茍有所濟兮何必於大施國之表兮翳家之規氣則正兮神則怡康壽考兮理則宜雖隱猶顯兮子揚其輝為仁有後兮天有知嗟嗟來裔兮尚徴誄辭些蓉峰宋先生些辭宋濓溪之父也伊天之生人賢一愚百些匪賢之履愚曷即些嗟若徳人徳則碩些韜珠之光韞白璧些鶩鶬競飽鸞鳯斂翼些圭組之華章逢靡易些仁讓于里猶及國些有暴如虎我手扼些我經在堂惟聖則些賢子是承聲華籍些炳乎前先綿後澤些彼世之狂不務積些薄施已窮敦厚克些暫榮萎􅌲槿朝夕些嗟若徳人揚若抑些朝豈為豐野匪嗇些蓉峰頽矣哲人厄些懷仰人人曷其有極些墓門有栢文貞石些載搜哀詞永無泐些祭文祭前元嗣君文百年運兮告終嗟朔漠兮逺土中隆替兮有時孰致語兮蒼穹赫大明兮中天知爝火兮自息命一去兮不復畱君胡為兮能國皇仁聖兮埀慈爾祖有祀兮繼宗者誰正首丘兮先陵是依心所安兮其亦曷悲祭公使人陳明身有庸役在官年方富不憚難我使南汝所歡勤左右不欲殫瘴癘起為爾患竟爾天良可嘆天萬里路漫漫歸汝骨魂其安祭周先生文維年月日門人貢生林某謹用清酌庶羞之奠致告于故貢元宗濓先生周公之靈曰於虖道之明者文必華文之華者名必鉅世固有是言矣然而道雖明而不得行以經綸於聖治文雖華而不得試以黼黻於皇猷名雖鉅而不得實以縉紳於朝著愚於先生重有感焉髫齓知學弱冠明經極深研幾探幽索𤣥居家稱孝友接物過謙厚教人先忠信先生之於道可謂明矣上窮丘索下搜子史含英咀華出奇入恠有春秋會通以明褒貶有邊臣近鑒以訓忠義有知非槀以述志業先生之於文可謂華矣兩舉鄉薦一魁文闈聲名之起風馳雷奮閣老稱其史才諸生仰其徳望先生之於名亦可謂鉅矣柰何道明於中而未遂政理之施文華於外而僅膺科舉之選名聞於逺而獨區區於文校之官則所行所試與其所實者何若是其寥寥耶愚於造物者益有憾矣嗚呼哀哉時耶命耶父訃方奔而妻亡母制未終而身殁年嗇中壽喪無主嗣箕箒有艾妾襁褓有幼女㷀㷀何恃孑孑相弔天其忍此也耶天其忍此也耶某自弱冠之年及門承教秋闈較藝忝聯榜末每念左右道途扶持疾病耳提面命情親心契涕泗交集不知所云先生己矣不可作矣唯當收先生之文以傳於世推先生之訓以淑諸人庶幾先生道之明文之華名之鉅者猶存其萬一也心喪無期禮奠弗腆先生有靈尚鑒兹悃嗚呼哀哉林登州集巻二十一
