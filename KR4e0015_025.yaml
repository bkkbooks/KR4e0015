front:
  text: 林登州集後跋先登州公以經術鳴盛於洪武間其詩歌古文辭實為明初閩南文苑之冠同時如宋文憲公王忠文公皆一代大儒雅相推許今見於志序者可考而知也崇禎中同郡王中丞而𢎞先生曾為校刋行世洎遭兵燹遂失其版小子興於家傳故簏中搜得一帙珍奉藏之久思重梓以傳焉適節使大中丞長山李公來撫吾閩興幸𨽻麾下公餘進見謹呈是編䝉公一見嗟賞慨然作序兼為訂其訛闕凡魯魚亥豕一一讐勘不使有字畫之差我公表章盛心亦良至矣小子興敬受而付剞劂庶幾先人墜緒於湮沒之餘得以復耀皆大君子嘉惠之德也豈特小子興有厚幸哉工既竣不揣固陋謹盥手而識之末簡康熙丙戌仲冬裔孫興恭跋
